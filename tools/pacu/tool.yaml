name: pacu
version: "1.7"
description: "AWS exploitation framework via Rhino Security Labs Pacu v1.7. 4 methods: list_modules (list 50+ attack modules), run_module (execute any Pacu module with AWS credentials), privesc_scan (scan for 21+ IAM privilege escalation paths), whoami (identify current AWS identity and permissions). Modules cover IAM privesc, Lambda exploitation, EC2 instance compromise, S3 exfiltration, CloudTrail evasion, persistence, and lateral movement. For raw AWS API access use aws. For attack path analysis use cloudfox."
image: "ghcr.io/silicon-works/mcp-tools-pacu:latest"
image_size_mb: 600
timeout_seconds: 600

capabilities:
  - aws_exploitation
  - iam_privilege_escalation
  - aws_persistence
  - aws_enumeration

phases:
  - enumeration
  - exploitation
  - post-exploitation

requirements:
  network: true
  privileged: false

resources:
  memory_mb: 512
  cpu: 1.0

routing:
  use_for:
    - "scan for IAM privilege escalation paths in AWS"
    - "enumerate IAM users, roles, policies, and permissions comprehensively"
    - "exploit AWS misconfigurations (Lambda backdoors, EC2 instance compromise)"
    - "establish persistence in AWS (IAM backdoor, cross-account roles)"
    - "evade CloudTrail and GuardDuty detection"
  never_use_for:
    - "raw AWS CLI commands (use aws — pacu is for exploitation modules)"
    - "AWS compliance auditing (use prowler)"
    - "S3 bucket brute-force (use s3scanner)"
  triggers:
    - pacu
    - IAM privesc
    - AWS privilege escalation
    - AWS exploitation
    - AWS persistence
    - AWS enumeration
    - cloud exploitation
  prefer_over: []

see_also:
  - tool: aws
    reason: aws gives raw API access for manual commands. pacu provides pre-built exploitation modules with embedded knowledge of 21+ privesc techniques.
  - tool: cloudfox
    reason: cloudfox does cross-service attack path analysis (read-only). pacu actively exploits the discovered paths.
  - tool: prowler
    reason: prowler finds misconfigurations (defensive). pacu exploits them (offensive).

methods:
  list_modules:
    description: "List all available Pacu exploitation modules (50+)."
    when_to_use: "Reference — discover which modules are available for enumeration, exploitation, persistence, and evasion."
    params: {}
    returns:
      modules:
        type: array
        description: "Available module names."
      module_count:
        type: integer
        description: "Total modules."

  run_module:
    description: "Execute a specific Pacu module with AWS credentials."
    when_to_use: "After identifying a module to run from list_modules. Provide AWS credentials and the module name."
    params:
      access_key_id:
        type: string
        required: true
        description: "AWS access key ID."
      secret_access_key:
        type: string
        required: true
        description: "AWS secret access key."
      module:
        type: string
        required: true
        description: "Module name (e.g., 'iam__enum_permissions', 'lambda__enum', 's3__enum')."
      module_args:
        type: string
        description: "Module-specific arguments."
      timeout:
        type: integer
        default: 300
        description: "Execution timeout in seconds."
    returns: {}

  privesc_scan:
    description: "Scan for IAM privilege escalation paths using Pacu's iam__privesc_scan module. Checks 21+ privesc techniques."
    when_to_use: "After obtaining AWS credentials — check if the compromised identity can escalate to higher privileges."
    params:
      access_key_id:
        type: string
        required: true
        description: "AWS access key ID."
      secret_access_key:
        type: string
        required: true
        description: "AWS secret access key."
      timeout:
        type: integer
        default: 300
        description: "Scan timeout."
    returns:
      privesc_found:
        type: boolean
        description: "Whether privilege escalation paths were found."

  whoami:
    description: "Identify the current AWS identity and enumerate basic permissions."
    when_to_use: "First step after obtaining AWS credentials — understand who you are and what you can do."
    params:
      access_key_id:
        type: string
        required: true
        description: "AWS access key ID."
      secret_access_key:
        type: string
        required: true
        description: "AWS secret access key."
    returns: {}
