name: sqlmap
version: "2.0"
description: "Automatic SQL injection detection and exploitation tool (v1.10#stable). Supports 6 injection techniques: Boolean-based blind (B), Error-based (E), Union query-based (U), Stacked queries (S), Time-based blind (T), Inline queries (Q). Detects and exploits MySQL, PostgreSQL, Oracle, MSSQL, SQLite, DB2, MariaDB, and more. Beyond database enumeration, provides OS command execution (--os-cmd/--os-shell), file read/write on the target server, raw SQL query execution, and password hash dumping. Includes 60+ WAF bypass tamper scripts. Handles CSRF tokens, HTTP auth, custom HTTP methods, second-order injection. Streams progress notifications during long-running operations. Runs non-interactively with --batch flag."
image: "ghcr.io/silicon-works/mcp-tools-sqlmap:latest"
image_size_mb: 150
timeout_seconds: 7200

capabilities:
  - sql_injection
  - database_enumeration
  - data_extraction
  - os_shell

# Routing hints for tool selection
routing:
  use_for:
    - "SQL injection detection and exploitation"
    - "test GET POST parameters for SQL injection vulnerabilities"
    - "enumerate databases tables columns via SQL injection"
    - "dump database contents through SQL injection"
    - "OS command execution via SQL injection"
    - "read files from target server via SQL injection"
    - "write files webshells to target via SQL injection"
    - "extract password hashes from database via SQL injection"
    - "boolean error union stacked time-based blind injection"
    - "WAF bypass with tamper scripts for SQL injection"
    - "execute custom SQL queries through injection"
    - "second-order injection testing"
    - "CSRF-protected forms with SQL injection"
    - "HTTP Basic Digest NTLM authenticated SQL injection"
  never_use_for:
    - "NoSQL injection (use nosqlmap)"
    - "MongoDB (use mongodb or nosqlmap)"
    - "directory enumeration (use ffuf)"
  triggers:
    - "sql injection"
    - "sqli"
    - "sqlmap"
    - "database dump"
    - "union injection"
    - "blind injection"
    - "sql query"
    - "second-order injection"
    - "csrf sql injection"
    - "http auth sql injection"
  prefer_over: []

phases:
  - exploitation

requirements:
  network: true
  privileged: false

resources:
  memory_mb: 512
  cpu: 0.5

# ── Common params shared by all methods ───────────────────────────────────
_common_params: &common_params
  data:
    type: string
    description: "POST request body data. Switches sqlmap to POST method. Format: 'param1=value1&param2=value2'. Use * to mark injection point in POST data: 'username=admin&password=*'."
  cookie:
    type: string
    description: "HTTP Cookie header value (e.g., 'PHPSESSID=abc123; session=xyz'). Required for testing authenticated endpoints. At level >= 2, sqlmap also tests cookie values for injection."
  headers:
    type: string
    description: "Additional HTTP headers, semicolon-separated (e.g., 'Authorization: Bearer eyJ...;X-Custom: value')."
  method:
    type: enum
    values: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    description: "Force HTTP method. By default sqlmap uses GET (or POST if --data is set). Use for REST APIs that require PUT/PATCH/DELETE."
  auth_type:
    type: enum
    values: ["Basic", "Digest", "NTLM", "PKI"]
    description: "HTTP authentication type. Use with auth_cred."
  auth_cred:
    type: string
    description: "HTTP authentication credentials. Format: 'user:password'. Use with auth_type."
  csrf_token:
    type: string
    description: "Parameter name holding the anti-CSRF token (e.g., 'csrf_token', '_token'). Sqlmap auto-fetches a fresh token before each request."
  csrf_url:
    type: string
    description: "URL to fetch the anti-CSRF token from, if different from the target URL."
  dbms:
    type: string
    description: "Force DBMS type to skip detection (e.g., 'MySQL', 'PostgreSQL', 'Microsoft SQL Server'). Speeds up exploitation when DBMS is known."
  ignore_code:
    type: string
    description: "Ignore problematic HTTP status codes (e.g., '401' or '401,500'). Critical when the target endpoint returns non-200 status — without this, sqlmap may refuse to test. Use for endpoints behind authentication that return 401/403."
  string:
    type: string
    description: "String that is always present in TRUE responses (boolean-based detection). Dramatically speeds up blind injection when set correctly. Example: if successful queries show 'Welcome', set string='Welcome'."
  not_string:
    type: string
    description: "String that is always present in FALSE responses. The inverse of --string."
  code:
    type: integer
    description: "HTTP status code that indicates TRUE response (e.g., 200). Alternative to --string for boolean-based detection."
  text_only:
    type: boolean
    default: false
    description: "Compare pages based only on textual content (strip HTML tags). Useful when pages have dynamic non-text content (ads, JS, etc.)."
  titles:
    type: boolean
    default: false
    description: "Compare pages based only on their titles. Useful when page body is highly dynamic but title changes predictably."
  level:
    type: integer
    default: 1
    description: "Test level 1-5. Level 1: tests GET/POST params. Level 2: adds Cookie testing. Level 3: adds User-Agent/Referer testing. Level 4-5: adds more payloads. Higher = slower but more thorough. Start with 1, increase if no results."
  risk:
    type: integer
    default: 1
    description: "Risk level 1-3. Risk 1: safe tests only. Risk 2: adds heavy time-based tests. Risk 3: adds OR-based tests (can modify/delete data — use with caution). For CTF/HTB use risk=2 freely, risk=3 on non-production targets only."
  technique:
    type: string
    default: "BEUSTQ"
    description: "SQL injection techniques to test. B=Boolean-based blind, E=Error-based, U=Union query, S=Stacked queries (needed for os_shell/file_write), T=Time-based blind, Q=Inline queries. Default 'BEUSTQ' tests all. Use 'BEU' for faster testing if you don't need stacked queries. Use 'T' alone for time-based only when other methods fail."
  param:
    type: string
    description: "Specific parameter to test (e.g., 'id'). Without this, sqlmap tests all parameters."
  tamper:
    type: string
    description: "Tamper script(s) for WAF bypass. Comma-separated. Common: 'space2comment' (spaces→/**/), 'between' (>→BETWEEN), 'charencode' (URL-encode), 'randomcase' (random keyword case). Use multiple for layered bypass."
  prefix:
    type: string
    description: "Injection payload prefix (e.g., \"')\"). Use when you know the exact SQL context from manual testing."
  suffix:
    type: string
    description: "Injection payload suffix (e.g., '-- -'). Use when you know the exact SQL context."
  union_cols:
    type: string
    description: "Range of columns to test for UNION query injection (e.g., '5-10'). Narrows search when you know approximate column count from manual testing."
  second_url:
    type: string
    description: "URL where the injection result appears (second-order injection). The injection is sent to the target URL but the result is read from this URL."
  eval:
    type: string
    description: "Python code evaluated before each request (e.g., \"import hashlib; token=hashlib.md5(id.encode()).hexdigest()\"). Use for computed parameters."
  time_sec:
    type: integer
    default: 5
    description: "Seconds to delay for time-based blind injection. Increase to 10-15 on high-latency targets to avoid false negatives."
  threads:
    type: integer
    default: 4
    description: "Number of concurrent HTTP requests (1-10). Default 4. Increase for faster extraction on stable targets. Reduce to 1 if target has rate limiting."
  delay:
    type: number
    default: 0
    description: "Delay in seconds between each HTTP request. Use 1-3 to avoid rate limiting or WAF bans."
  retries:
    type: integer
    default: 3
    description: "Retries on connection failure."
  safe_url:
    type: string
    description: "URL to visit between injection requests to keep session alive or avoid detection patterns."
  safe_freq:
    type: integer
    description: "How often to visit --safe-url (every N requests)."
  null_connection:
    type: boolean
    default: false
    description: "Use HTTP Range/HEAD to detect boolean responses without downloading full pages. Faster but may not work on all targets."
  proxy:
    type: string
    description: "HTTP/SOCKS proxy (e.g., 'http://127.0.0.1:8080', 'socks5://127.0.0.1:1080'). Use for scanning through tunnels or Burp interception."
  random_agent:
    type: boolean
    default: false
    description: "Use random HTTP User-Agent to avoid WAF detection. Sqlmap's default UA is commonly blocked."
  flush_session:
    type: boolean
    default: false
    description: "Clear cached session data and re-test from scratch."

methods:
  test_injection:
    description: "Test URL parameters for SQL injection vulnerabilities using sqlmap's detection engine. Runs with --batch (non-interactive) and 4 threads by default. Tests all 6 injection techniques by default (BEUSTQ). Parses output for vulnerability confirmation, injectable parameters, injection types, and detected DBMS. Sqlmap caches results in session files — subsequent calls to the same URL skip already-tested parameters. Sends progress notifications for [INFO]/[WARNING]/[CRITICAL] lines."
    when_to_use: "When you've identified a potentially injectable parameter in a web application — either from manual testing, web fuzzing (ffuf), or source code review. Mark the injection point with * in the URL (e.g., 'http://target/page?id=1*') or let sqlmap auto-detect GET parameters. For POST injection, use the data parameter. Start with level=1/risk=1 (default), increase to level=3/risk=2 if no results, and level=5/risk=3 as last resort (risk=3 may use OR-based tests that can modify data). If the target uses a WAF, use tamper scripts. Use param to test a specific parameter and skip others. If the endpoint returns 401/500, use ignore_code to prevent sqlmap from refusing to test. Use string/code for faster boolean-based detection when you know the TRUE response signature."
    params:
      url:
        type: string
        required: true
        description: "Target URL with parameters. Use * to mark specific injection point (e.g., 'http://target/page?id=1*'). Without *, sqlmap tests all GET parameters. For REST-style URLs: 'http://target/api/users/1*/profile'."
      <<: *common_params
      timeout:
        type: integer
        default: 1800
        description: "Process timeout in seconds. Full level=1 testing typically takes 1-5 minutes. Level=3+ or slow targets may take 15-30 minutes. Default 1800s (30 min)."
    returns:
      vulnerable:
        type: boolean
        description: "Whether SQL injection was confirmed"
      injection_type:
        type: string
        description: "Type of injection found (e.g., 'boolean-based blind', 'UNION query', 'time-based blind')"
      dbms:
        type: string
        description: "Detected DBMS (e.g., 'MySQL >= 5.0', 'PostgreSQL', 'Microsoft SQL Server 2019')"
      parameters:
        type: array
        description: "List of injectable parameter names"
      details:
        type: array
        description: "Relevant detail lines from sqlmap output (injection info, payloads, techniques)"

  enumerate_dbs:
    description: "Enumerate all databases on a confirmed vulnerable target using sqlmap's --dbs flag. Sqlmap reuses the cached injection point and technique from prior test_injection calls (stored in session files), so no re-detection is needed. Parses the '[*] database_name' output lines. Sends progress notifications during extraction."
    when_to_use: "Immediately after test_injection confirms SQL injection. This is the standard next step in the SQL injection exploitation workflow: test_injection → enumerate_dbs → dump_table. The URL must be the same one used in test_injection so sqlmap can reuse its cached session. System databases (information_schema, mysql, master, postgres, etc.) are normal — look for application databases."
    params:
      url:
        type: string
        required: true
        description: "Target URL — must be the same URL used in test_injection so sqlmap reuses the cached injection session."
      <<: *common_params
      timeout:
        type: integer
        default: 1800
        description: "Process timeout in seconds. Database enumeration is usually fast (under 1 minute) for error-based and UNION injection. Time-based blind may take 5-15 minutes. Default 1800s."
    returns:
      databases:
        type: array
        description: "List of database name strings (e.g., ['information_schema', 'mysql', 'webapp'])"
      count:
        type: integer
        description: "Number of databases found"

  enumerate_tables:
    description: "List all tables in a database using sqlmap's --tables flag with -D (database). Parses pipe-delimited table name output. Sqlmap reuses cached injection from prior test_injection calls."
    when_to_use: "After enumerate_dbs identifies databases, use this to discover table names before dumping data. The workflow: test_injection → enumerate_dbs → enumerate_tables → dump_table. Look for high-value tables: 'users', 'accounts', 'credentials', 'config', 'sessions', 'wp_users'."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      database:
        type: string
        required: true
        description: "Database name from enumerate_dbs results."
      <<: *common_params
      timeout:
        type: integer
        default: 1800
        description: "Process timeout in seconds."
    returns:
      tables:
        type: array
        description: "List of table name strings"
      count:
        type: integer
        description: "Number of tables found"

  dump_table:
    description: "Dump contents of a specific database table using sqlmap's --dump flag with -D (database) and -T (table). Uses --dump-format CSV for structured output. Parses the pipe-delimited table output into column names and row dictionaries. Supports column selection (-C), row limiting (--stop), and WHERE clause (--where) for targeted extraction. Sends progress notifications during long-running blind extractions."
    when_to_use: "After enumerate_tables lists tables, use this to extract data. Workflow: enumerate_dbs → enumerate_tables → dump_table on high-value tables like 'users', 'accounts', 'credentials'. Use the columns parameter to extract only credential fields ('username,password,email'). Use where for targeted extraction (e.g., \"role='admin'\") instead of full table dumps. For blind injection, each row/cell requires separate requests, so limiting columns/rows/where dramatically reduces extraction time."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      database:
        type: string
        required: true
        description: "Database name from enumerate_dbs results. Case-sensitive on some DBMS."
      table:
        type: string
        required: true
        description: "Table name to dump. Common targets: 'users', 'accounts', 'admins', 'credentials', 'config'. Case-sensitive on MySQL/PostgreSQL with Linux."
      columns:
        type: string
        description: "Comma-separated column names to extract (e.g., 'username,password,email'). Omit to dump all columns. Fewer columns = much faster for blind injection."
      limit:
        type: integer
        default: 100
        description: "Maximum rows to extract (maps to sqlmap --stop). For blind injection, use 10-20 for initial sampling. For UNION/error-based, 100+ is fine."
      where:
        type: string
        description: "SQL WHERE clause for targeted extraction (e.g., \"role='admin'\", \"id>100\"). Reduces extraction time vs full table dump."
      <<: *common_params
      timeout:
        type: integer
        default: 3600
        description: "Process timeout in seconds. UNION/error-based dumps are fast (1-2 min). Blind injection of 100 rows can take 30-60+ minutes. Default 3600s (1 hour)."
    returns:
      columns:
        type: array
        description: "List of column name strings from the parsed table header"
      rows:
        type: array
        description: "List of row dictionaries, each mapping column name to cell value"
      row_count:
        type: integer
        description: "Number of rows extracted"

  dump_all:
    description: "Dump all tables from a database at once using sqlmap's --dump-all flag with -D (database). Iterates through every table and extracts all rows. Returns an unstructured status message. For blind injection, this can take hours."
    when_to_use: "When you need everything from a database and have fast injection (UNION or error-based). Prefer dump_table for targeted extraction of specific high-value tables. Use dump_all as a last resort or when the database is small."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      database:
        type: string
        required: true
        description: "Database name to dump entirely."
      <<: *common_params
      timeout:
        type: integer
        default: 7200
        description: "Process timeout in seconds. Default 7200s (2 hours). UNION/error-based may complete in 2-5 minutes. Blind injection will need more."
    returns:
      database:
        type: string
        description: "Name of the database that was dumped"
      message:
        type: string
        description: "Status message. Actual table data is in raw_output."

  dump_passwords:
    description: "Dump database user password hashes using sqlmap's --passwords flag. Extracts DBMS user accounts and their password hashes. For MySQL: mysql.user. For MSSQL: master.sys.sql_logins. For PostgreSQL: pg_shadow."
    when_to_use: "After confirming SQL injection, use this to extract database user password hashes for offline cracking. Useful for finding reused passwords or getting direct DB access."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      <<: *common_params
      timeout:
        type: integer
        default: 3600
        description: "Process timeout in seconds. Default 3600s."
    returns:
      hashes:
        type: array
        description: "List of {user, hash} objects with DBMS username and password hash"
      count:
        type: integer
        description: "Number of hashes extracted"

  os_shell:
    description: "Execute an OS command on the target server via SQL injection using sqlmap's --os-cmd flag. Mechanism depends on DBMS: MySQL uses UDF (requires FILE privilege), MSSQL uses xp_cmdshell, PostgreSQL uses COPY TO/FROM or PL/Python. Single-command execution, not a persistent shell."
    when_to_use: "When you need RCE through confirmed SQL injection. Requirements: stacked queries or specific DBMS features + sufficient privileges. Common first commands: 'id', 'whoami', 'hostname'. For a reverse shell, execute a shell payload."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      command:
        type: string
        required: true
        description: "OS command to execute on the target server."
      <<: *common_params
      timeout:
        type: integer
        default: 600
        description: "Process timeout in seconds. Default 600s."
    returns:
      command:
        type: string
        description: "The command that was executed"
      output:
        type: string
        description: "Command stdout as captured by sqlmap."

  file_read:
    description: "Read a file from the target server's filesystem via SQL injection using sqlmap's --file-read flag. Mechanism depends on DBMS: MySQL uses LOAD_FILE(), PostgreSQL uses pg_read_file(), MSSQL uses OPENROWSET(BULK)."
    when_to_use: "When you need to read files through SQL injection — config files, source code, /etc/passwd, SSH keys. Requires database FILE privilege on MySQL."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      file_path:
        type: string
        required: true
        description: "Absolute path to the file on the target server."
      <<: *common_params
      timeout:
        type: integer
        default: 600
        description: "Process timeout in seconds. Default 600s."
    returns:
      file_path:
        type: string
        description: "The path of the file that was read"
      content:
        type: string
        description: "File contents as text."

  file_write:
    description: "Write a file to the target server's filesystem via SQL injection using sqlmap's --file-write and --file-dest flags. MySQL uses SELECT INTO OUTFILE, MSSQL uses xp_cmdshell, PostgreSQL uses COPY TO."
    when_to_use: "When you need to upload files through SQL injection — primary use case is webshell upload. Requires database FILE privilege and writable destination directory."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      local_file:
        type: string
        required: true
        description: "Either a local file path to upload, or raw file content as a string."
      remote_path:
        type: string
        required: true
        description: "Absolute destination path on the target server."
      <<: *common_params
      timeout:
        type: integer
        default: 600
        description: "Process timeout in seconds. Default 600s."
    returns:
      remote_path:
        type: string
        description: "The destination path where the file was written"
      written:
        type: boolean
        description: "Whether the write succeeded."

  sql_query:
    description: "Execute a raw SQL query via injection using sqlmap's --sql-query flag. Returns the query result text. Supports any SELECT query the DBMS allows. For INSERT/UPDATE/DELETE, use stacked queries technique."
    when_to_use: "When you need to run a specific SQL query that doesn't fit the enumerate/dump workflow — e.g., 'SELECT @@version', 'SELECT user()', 'SELECT load_file(\"/etc/passwd\")', or custom JOINs across tables. Also useful for verifying injection or checking DBMS-specific variables. More flexible than dump_table for complex queries."
    params:
      url:
        type: string
        required: true
        description: "Target URL — same URL used in test_injection."
      query:
        type: string
        required: true
        description: "SQL query to execute (e.g., 'SELECT @@version', 'SELECT user,password FROM mysql.user', 'SELECT table_name FROM information_schema.tables WHERE table_schema=db()')."
      <<: *common_params
      timeout:
        type: integer
        default: 1800
        description: "Process timeout in seconds. Default 1800s."
    returns:
      query:
        type: string
        description: "The SQL query that was executed"
      result:
        type: string
        description: "Query result text as returned by sqlmap. May be a single value, table, or multi-line output depending on the query."
