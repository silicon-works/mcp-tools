        type: string
        description: "Target hostname/IP"
      protocol:
        type: string
        description: "Protocol used"
      reset:
        type: boolean
        description: "Whether force-reset was used"

  addspn:
    required_ports: [389]
    description: "Add or remove a Service Principal Name (SPN) on an Active Directory account via LDAP"
    when_to_use: "When you have WriteProperty on a computer or user account and need to add an SPN for Kerberos delegation abuse (SPN jacking). Common in constrained delegation attacks where you control an account with delegation rights and need to modify the target's SPNs."
