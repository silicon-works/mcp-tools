  # ── ACL Attacks ────────────────────────────────────────────────────────

  dacledit:
    required_ports: [389]
    description: "Edit DACLs on Active Directory objects. Read, write, remove, backup, or restore ACEs for a principal on a target object. Useful for abusing WriteDACL permissions."
    when_to_use: "When you have WriteDACL permission on an AD object and need to grant yourself or another principal additional rights (e.g., DCSync, ResetPassword, FullControl). Also for reading existing DACLs during enumeration."
    params:
      target:
        type: string
        required: true
        description: "Domain Controller IP or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      action:
        type: enum
        values: [read, write, remove, backup, restore]
        default: read
        description: "Action: read (view DACL), write (add ACE), remove (delete ACE), backup (save DACL to file), restore (load DACL from file)"
      principal:
        type: string
        description: "sAMAccountName of the attacker-controlled principal to add/remove in the ACE"
      principal_sid:
