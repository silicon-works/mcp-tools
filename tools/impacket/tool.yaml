name: impacket
version: "2.0"
description: "Windows/Active Directory exploitation toolkit (Impacket 0.12). 50 methods in 10 categories: remote execution (psexec, wmiexec, smbexec, dcomexec, atexec), credential dumping (secretsdump), Kerberos attacks (kerberoast, asreproast, get_tgt, get_st, ticketer, ticket_converter, describe_ticket, get_pac), SMB operations (smb_shares, smb_get, smb_put), AD enumeration (get_ad_users, get_ad_computers, lookupsid, samrdump, rpcdump, rpcmap, dump_ntlm_info, machine_role, get_arch), delegation abuse (addcomputer, find_delegation, rbcd), account modification (changepasswd, addspn), ACL attacks (dacledit, owneredit), credential extraction (get_laps_password, get_gpp_password, dpapi_backupkeys, keylistattack), services & remote management (services, reg, net, mssqlclient, mssqlinstance, wmiquery, wmipersist, tstool, exchanger, rdp_check), privilege escalation (golden_pac, raise_child), custom scripts (run_custom). All methods support password, NTLM hash (pass-the-hash), Kerberos, and AES key authentication."
image: "ghcr.io/silicon-works/mcp-tools-impacket:latest"
image_size_mb: 900
timeout_seconds: 300
idle_timeout: 1800

capabilities:
  - remote_execution
  - credential_dumping
  - pass_the_hash
  - kerberos_attacks
  - smb_operations
  - ad_enumeration
  - rbcd_delegation
  - password_reset
  - spn_manipulation
  - acl_attacks
  - golden_ticket
  - silver_ticket
  - laps_extraction
  - gpp_password
  - service_manipulation
  - registry_manipulation
  - wmi_queries
  - mssql_client
  - rpc_enumeration
  - dpapi_keys
  - terminal_services
  - exchange_abuse
  - privilege_escalation
  - custom_scripts

phases:
  - enumeration
  - exploitation
  - post-exploitation

requirements:
  network: true
  privileged: false

resources:
  memory_mb: 512
  cpu: 0.5

routing:
  use_for:
    - "Windows remote command execution"
    - "pass-the-hash authentication"
    - "NTLM hash pass-the-hash"
    - "credential dumping from Windows"
    - "SAM database extraction"
    - "NTDS.dit dump"
    - "secretsdump"
    - "kerberoasting"
    - "AS-REP roasting"
    - "SMB share enumeration"
    - "SMB file transfer"
    - "Active Directory user enumeration"
    - "SID enumeration"
    - "Kerberos TGT request"
    - "Windows lateral movement"
    - "psexec wmiexec smbexec"
    - "constrained delegation abuse"
    - "S4U2Self S4U2Proxy service ticket"
    - "RBCD resource-based constrained delegation"
    - "create machine account for delegation attack"
    - "enumerate delegation settings across domain"
    - "getST impersonation via delegation"
  never_use_for:
    - "Linux-only targets"
    - "port scanning"
    - "web application testing"
    - "SQL injection"
    - "password brute-forcing (use hydra instead)"
    - "vulnerability scanning"
  triggers:
    - "impacket"
    - "psexec"
    - "wmiexec"
    - "smbexec"
    - "dcomexec"
    - "atexec"
    - "secretsdump"
    - "kerberoast"
    - "asreproast"
    - "pass-the-hash"
    - "pass the hash"
    - "pth"
    - "ntlm hash"
    - "GetUserSPNs"
    - "GetNPUsers"
    - "GetADUsers"
    - "lookupsid"
    - "getTGT"
    - "getST"
    - "addcomputer"
    - "findDelegation"
    - "constrained delegation"
    - "unconstrained delegation"
    - "RBCD"
    - "S4U"
    - "machine account"
    - "rbcd.py"
    - "changepasswd"
    - "ForceChangePassword"
    - "addspn"
    - "SPN injection"
    - "password reset"
    - "dacledit"
    - "owneredit"
    - "WriteDACL"
    - "WriteOwner"
    - "ticketer"
    - "golden ticket"
    - "silver ticket"
    - "ticket_converter"
    - "describeTicket"
    - "getPac"
    - "LAPS password"
    - "GetLAPSPassword"
    - "GPP password"
    - "cpassword"
    - "DPAPI backup key"
    - "keylistattack"
    - "RODC"
    - "samrdump"
    - "rpcdump"
    - "rpcmap"
    - "DumpNTLMInfo"
    - "GetADComputers"
    - "services"
    - "sc.exe"
    - "reg query"
    - "registry"
    - "net user"
    - "mssqlclient"
    - "mssqlinstance"
    - "wmiquery"
    - "WQL"
    - "wmipersist"
    - "tstool"
    - "qwinsta"
    - "exchanger"
    - "NSPI"
    - "goldenPac"
    - "MS14-068"
    - "raiseChild"
    - "forest trust"
    - "rdp_check"
    - "machine_role"
    - "getArch"
    - "add new impacket method"
    - "create impacket recipe"
    - "extend impacket"
    - "custom impacket binary"
  prefer_over: []

see_also:
  - tool: netexec
    reason: "Alternative for credential validation and authenticated execution"
  - tool: evil-winrm
    reason: "Alternative for WinRM shell access"
  - tool: kerbrute
    reason: "Use kerbrute for Kerberos username enumeration via AS-REQ — discovers unknown usernames without credentials. Impacket's lookupsid needs SMB null session."
  - tool: bloodhound
    reason: "Use bloodhound for AD relationship mapping and attack path discovery after obtaining initial credentials."
  - tool: certipy
    reason: "Use certipy for AD Certificate Services (ADCS) enumeration and exploitation — covers ESC1-8 vulnerabilities."

methods:
  psexec:
    required_ports: [445]
    description: "Execute commands on a remote Windows host via PsExec (creates a service, most reliable but noisy)"
    when_to_use: "When reliable remote execution is needed and stealth is not critical. Uses SMB service creation."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      command:
        type: string
        description: "Command to execute (omit for interactive shell)"
      service_name:
        type: string
        description: "Custom service name for stealth"
      remote_binary_name:
        type: string
        description: "Custom name for the uploaded executable on the target"
      upload_file:
        type: string
        description: "Local file to upload and execute on the target (use command param for arguments)"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string (e.g., '-path C:\\Windows -debug')"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (psexec)"
      output:
        type: string
        description: "Command output"
      info:
        type: array
        description: "Informational messages"
      warnings:
        type: array
        description: "Warning messages"

  wmiexec:
    required_ports: [135]
    description: "Execute commands on a remote Windows host via WMI (stealthier than psexec, no service creation)"
    when_to_use: "When stealth matters - no service creation, uses WMI for execution. Preferred for lateral movement."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port (default: 135 for WMI)"
      command:
        type: string
        description: "Command to execute"
      nooutput:
        type: boolean
        default: false
        description: "Do not retrieve command output (blind execution)"
      shell_type:
        type: string
        enum: [cmd, powershell]
        description: "Shell type for semi-interactive mode (cmd or powershell)"
      silentcommand:
        type: boolean
        default: false
        description: "Skip cmd.exe wrapper — directly execute via WMI (no output possible)"
      share:
        type: string
        description: "Share for output retrieval (default: ADMIN$)"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (wmiexec)"
      output:
        type: string
        description: "Command output"

  smbexec:
    required_ports: [445]
    description: "Execute commands on a remote Windows host via SMB (native commands, no binary upload needed)"
    when_to_use: "When other methods fail or when you want native command execution without uploading binaries"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      command:
        type: string
        description: "Command to execute"
      share:
        type: string
        default: "C$"
        description: "Writable share for output"
      mode:
        type: enum
        values: [SHARE, SERVER]
        default: SHARE
        description: "Execution mode"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (smbexec)"
      output:
        type: string
        description: "Command output"

  dcomexec:
    required_ports: [135]
    description: "Execute commands on a remote Windows host via DCOM objects (MMC20, ShellWindows, ShellBrowserWindow)"
    when_to_use: "Alternative lateral movement using DCOM. Useful when SMB-based methods are blocked."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port (default: 135 for DCOM)"
      command:
        type: string
        description: "Command to execute"
      dcom_object:
        type: enum
        values: [MMC20, ShellWindows, ShellBrowserWindow]
        default: MMC20
        description: "DCOM object to use for execution"
      nooutput:
        type: boolean
        default: false
        description: "Do not retrieve command output"
      silentcommand:
        type: boolean
        default: false
        description: "Skip cmd.exe wrapper (direct execution, no output)"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (dcomexec)"
      object:
        type: string
        description: "DCOM object used"
      output:
        type: string
        description: "Command output"

  atexec:
    required_ports: [445]
    description: "Execute commands on a remote Windows host via Task Scheduler (scheduled task based execution)"
    when_to_use: "When other execution methods are blocked. Uses Windows Task Scheduler for command execution."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      command:
        type: string
        required: true
        description: "Command to execute via scheduled task"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (atexec)"
      output:
        type: string
        description: "Command output"

  secretsdump:
    required_ports: [445]
    description: "Dump credentials from a Windows host (SAM, LSA secrets, cached creds, NTDS.dit via DRSUAPI/VSS)"
    when_to_use: "After gaining admin access to dump password hashes. Use -just-dc on domain controllers for NTDS.dit."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication (needs admin privileges)"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      just_dc:
        type: boolean
        default: false
        description: "Only extract NTDS.dit data via DRSUAPI (DC only, much faster)"
      just_dc_ntlm:
        type: boolean
        default: false
        description: "Only extract NTLM hashes from NTDS.dit"
      just_dc_user:
        type: string
        description: "Extract only this user's hash from NTDS.dit"
      use_vss:
        type: boolean
        default: false
        description: "Use Volume Shadow Copy instead of DRSUAPI"
      exec_method:
        type: enum
        values: [smbexec, wmiexec, mmcexec]
        description: "Remote execution method for VSS"
      history:
        type: boolean
        default: false
        description: "Dump password history and LSA secrets OldVal"
      pwd_last_set:
        type: boolean
        default: false
        description: "Show pwdLastSet attribute for each NTDS.dit account"
      user_status:
        type: boolean
        default: false
        description: "Display whether each user is disabled"
      skip_sam:
        type: boolean
        default: false
        description: "Do NOT parse the SAM hive on remote system"
      use_keylist:
        type: boolean
        default: false
        description: "Use Kerb-Key-List method instead of DRSUAPI"
      ldapfilter:
        type: string
        description: "LDAP filter for DRSUAPI extraction (e.g., '(sAMAccountName=admin*)')"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 600
        description: "Timeout in seconds (credential dumping can be slow)"
    returns:
      sam_hashes:
        type: array
        description: "Local SAM hashes (user:rid:lm:nt:::)"
      lsa_secrets:
        type: array
        description: "LSA secrets"
      cached_creds:
        type: array
        description: "Domain cached credentials"
      ntds_hashes:
        type: array
        description: "NTDS.dit hashes (domain controller)"
      kerberos_keys:
        type: array
        description: "Kerberos encryption keys"
      total_hashes:
        type: integer
        description: "Total number of hashes extracted"

  kerberoast:
    required_ports: [88]
    description: "Kerberoasting attack - extract TGS service ticket hashes for offline cracking (targets accounts with SPNs)"
    when_to_use: "With any valid domain credentials to extract service account hashes for offline cracking"
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP (format: domain/user:pass@dc_ip or just dc_ip)"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      request_user:
        type: string
        description: "Target a specific user's SPN"
      output_format:
        type: enum
        values: [hashcat, john]
        default: hashcat
        description: "Hash output format for cracking"
      target_domain:
        type: string
        description: "Target a different domain (Kerberoasting across trusts)"
      stealth:
        type: boolean
        default: false
        description: "Remove (servicePrincipalName=*) from LDAP query for stealth (may use more memory)"
      no_preauth:
        type: string
        description: "Account that does not require preauth (obtain TGS via AS-REQ without credentials)"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      hashes:
        type: array
        description: "TGS hashes in requested format (hashcat/john)"
      hash_count:
        type: integer
        description: "Number of hashes extracted"
      users_with_spns:
        type: array
        description: "Users with SPNs (spn, username, member_of, pwd_last_set)"
      user_count:
        type: integer
        description: "Number of users with SPNs found"

  asreproast:
    required_ports: [88]
    description: "AS-REP Roasting - extract hashes for accounts with Kerberos pre-authentication disabled"
    when_to_use: "To find accounts without Kerberos pre-authentication and extract their hashes for cracking"
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username (or blank for unauthenticated with usersfile)"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      usersfile:
        type: string
        description: "File with list of usernames to test (one per line)"
      output_format:
        type: enum
        values: [hashcat, john]
        default: hashcat
        description: "Hash output format for cracking"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      hashes:
        type: array
        description: "AS-REP hashes in requested format"
      hash_count:
        type: integer
        description: "Number of hashes extracted"
      vulnerable_users:
        type: array
        description: "Users without pre-authentication"

  smb_shares:
    required_ports: [445]
    description: "List SMB shares on a remote Windows host with access permissions"
    when_to_use: "To enumerate available SMB shares before accessing files"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      shares:
        type: array
        description: "Available shares with name, type, and comment"
      share_count:
        type: integer
        description: "Number of shares found"

  smb_get:
    required_ports: [445]
    description: "Download a file from an SMB share"
    when_to_use: "To retrieve files from Windows shares (config files, scripts, sensitive data)"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      share:
        type: string
        required: true
        description: "Share name (e.g., 'C$', 'Users', 'SYSVOL')"
      remote_path:
        type: string
        required: true
        description: "Path within the share"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      content:
        type: string
        description: "File content"
      size:
        type: integer
        description: "File size in bytes"

  smb_put:
    required_ports: [445]
    description: "Upload content to an SMB share"
    when_to_use: "To upload files to Windows shares (payloads, scripts, tools)"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      share:
        type: string
        required: true
        description: "Share name (e.g., 'C$', 'Users')"
      remote_path:
        type: string
        required: true
        description: "Destination path within the share"
      content:
        type: string
        required: true
        description: "Content to upload"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
