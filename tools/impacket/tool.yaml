      altservice:
        type: string
        description: "Alternative service name for the ticket"
      u2u:
        type: boolean
        default: false
        description: "Use User-to-User (U2U) Kerberos extension. Required for RBCD against accounts without SPNs."
      self_only:
        type: boolean
        default: false
        description: "Only perform S4U2Self, skip S4U2Proxy. Gets a ticket for the impersonated user to the requesting account."
      dmsa:
        type: boolean
        default: false
        description: "Use Delegated Managed Service Accounts (DMSA) for ticket request."
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      ccache_file:
        type: string
        description: "Path to saved ccache file (in /session/credentials/ for persistence)"
      ccache_exists:
        type: boolean
        description: "Whether ccache file was saved successfully"
      hint:
        type: string
        description: "Usage hint for the ccache file"

  addcomputer:
    required_ports: [445]
    description: "Create a machine account in Active Directory for RBCD and other delegation attacks"
    when_to_use: "When setting up RBCD (resource-based constrained delegation) — create a machine account you control, then set msDS-AllowedToActOnBehalfOfOtherIdentity on the target to allow your machine to delegate. Requires MachineAccountQuota > 0 (default: 10). Workflow: addcomputer → rbcd.py (set delegation) → get_st -impersonate Administrator."
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
