recipe_schema:
  description: |
    The impacket MCP server supports dynamic recipes. To add a new impacket
    method during an engagement, write a Python file to /session/recipes/impacket/
    following this format. The method will be available immediately.
  format: |
    RECIPE = {
        "name": "method_name",           # required: MCP method name
        "description": "What it does",   # required: for agent understanding
        "auth": "domain",                # required: "domain", "target", or "none"
        "binary": "impacket-toolname",   # use for installed impacket binaries
        # OR
        "script": "/session/impacket-scripts/custom.py",  # use for custom scripts
        "params": {                      # tool-specific params (auth params added automatically)
            "param_name": {
                "type": "string",        # string, integer, boolean
                "required": True,
                "description": "What this param does"
            }
        }
    }
  location: /session/recipes/impacket/
  auth_styles:
    domain: "Builds domain/user:pass + -dc-ip (for AD tools like dacledit, owneredit)"
    target: "Builds domain/user:pass@target (for remote exec tools like psexec)"
    none: "No auth args built (for offline tools like describeTicket)"
  notes:
    - Auth params (target, username, password, domain, hashes, kerberos, dc_ip, aes_key, ccache_path) are added automatically based on auth style
    - extra_args param is added automatically to every recipe method
    - Recipes are hot-reloaded on every tool call
    - Recipes cannot overwrite built-in methods
    - Bad recipes are logged and skipped
