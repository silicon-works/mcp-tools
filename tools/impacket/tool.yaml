        description: "Use LDAPS instead of LDAP"
      file:
        type: string
        description: "Filename for backup/restore actions"
      extra_args:
        type: string
        description: "Additional CLI flags as a single string"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"

  owneredit:
    required_ports: [389]
    description: "Read or modify the owner of an Active Directory object. Useful for abusing WriteOwner permissions to take ownership of objects."
    when_to_use: "When you have WriteOwner permission on an AD object. Take ownership first, then use dacledit to grant yourself additional rights. Common ACL abuse chain: WriteOwner -> owneredit (take ownership) -> dacledit (grant DCSync)."
    params:
      target:
        type: string
        required: true
        description: "Domain Controller IP or hostname"
