        description: "Account to modify SPNs on (e.g., 'DC01$', 'svc_sql')"
      spn:
        type: string
        required: true
        description: "SPN to add/remove (e.g., 'cifs/DC01.pirate.htb', 'http/web01.corp.local')"
      action:
        type: enum
        values: [add, remove]
        default: add
