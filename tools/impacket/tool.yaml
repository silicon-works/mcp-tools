  get_st:
    required_ports: [88]
    description: "Request a Kerberos service ticket (TGS) via S4U2Self/S4U2Proxy for constrained delegation abuse. Saves ccache to /session/ for persistence."
    when_to_use: "After discovering constrained delegation (via find_delegation) or RBCD setup — request a service ticket impersonating a privileged user. Workflow: find_delegation → identify constrained delegation → get_st with -impersonate Administrator -spn cifs/target. Also used after RBCD: addcomputer → set msDS-AllowedToActOnBehalfOfOtherIdentity → get_st."
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Username of the account with delegation rights"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      spn:
        type: string
        required: true
        description: "Target SPN (e.g., 'cifs/dc.corp.local', 'http/web.corp.local')"
      impersonate:
        type: string
        required: true
        description: "User to impersonate (e.g., 'Administrator')"
      additional_ticket:
        type: string
        description: "Path to additional ticket for S4U2Proxy (from RBCD setup)"
