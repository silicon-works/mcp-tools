name: impacket
version: "0.12"
description: "Windows/Active Directory exploitation toolkit (Impacket 0.12). 20 methods in 6 categories: remote execution (psexec, wmiexec, smbexec, dcomexec, atexec — 5 execution methods with different stealth/reliability tradeoffs), credential dumping (secretsdump — SAM, LSA, NTDS.dit via DRSUAPI or VSS), Kerberos attacks (kerberoast, asreproast, get_tgt, get_st), delegation abuse (addcomputer, find_delegation, rbcd), RBCD & account modification (rbcd, changepasswd, addspn), SMB operations (smb_shares, smb_get, smb_put), AD enumeration (get_ad_users, lookupsid). All methods support password, NTLM hash (pass-the-hash), Kerberos, and AES key authentication."
image: "ghcr.io/silicon-works/mcp-tools-impacket:latest"
image_size_mb: 900
timeout_seconds: 300
idle_timeout: 1800

capabilities:
  - remote_execution
  - credential_dumping
  - pass_the_hash
  - kerberos_attacks
  - smb_operations
  - ad_enumeration
  - rbcd_delegation
  - password_reset
  - spn_manipulation

phases:
  - enumeration
  - exploitation
  - post-exploitation

requirements:
  network: true
  privileged: false

resources:
  memory_mb: 512
  cpu: 0.5

routing:
  use_for:
    - "Windows remote command execution"
    - "pass-the-hash authentication"
    - "NTLM hash pass-the-hash"
    - "credential dumping from Windows"
    - "SAM database extraction"
    - "NTDS.dit dump"
    - "secretsdump"
    - "kerberoasting"
    - "AS-REP roasting"
    - "SMB share enumeration"
    - "SMB file transfer"
    - "Active Directory user enumeration"
    - "SID enumeration"
    - "Kerberos TGT request"
    - "Windows lateral movement"
    - "psexec wmiexec smbexec"
    - "constrained delegation abuse"
    - "S4U2Self S4U2Proxy service ticket"
    - "RBCD resource-based constrained delegation"
    - "create machine account for delegation attack"
    - "enumerate delegation settings across domain"
    - "getST impersonation via delegation"
  never_use_for:
    - "Linux-only targets"
    - "port scanning"
    - "web application testing"
    - "SQL injection"
    - "password brute-forcing (use hydra instead)"
    - "vulnerability scanning"
  triggers:
    - "impacket"
    - "psexec"
    - "wmiexec"
    - "smbexec"
    - "dcomexec"
    - "atexec"
    - "secretsdump"
    - "kerberoast"
    - "asreproast"
    - "pass-the-hash"
    - "pass the hash"
    - "pth"
    - "ntlm hash"
    - "GetUserSPNs"
    - "GetNPUsers"
    - "GetADUsers"
    - "lookupsid"
    - "getTGT"
    - "getST"
    - "addcomputer"
    - "findDelegation"
    - "constrained delegation"
    - "unconstrained delegation"
    - "RBCD"
    - "S4U"
    - "machine account"
    - "rbcd.py"
    - "changepasswd"
    - "ForceChangePassword"
    - "addspn"
    - "SPN injection"
    - "password reset"
  prefer_over: []

see_also:
  - tool: netexec
    reason: "Alternative for credential validation and authenticated execution"
  - tool: evil-winrm
    reason: "Alternative for WinRM shell access"
  - tool: kerbrute
    reason: "Use kerbrute for Kerberos username enumeration via AS-REQ — discovers unknown usernames without credentials. Impacket's lookupsid needs SMB null session."
  - tool: bloodhound
    reason: "Use bloodhound for AD relationship mapping and attack path discovery after obtaining initial credentials."
  - tool: certipy
    reason: "Use certipy for AD Certificate Services (ADCS) enumeration and exploitation — covers ESC1-8 vulnerabilities."

methods:
  psexec:
    required_ports: [445]
    description: "Execute commands on a remote Windows host via PsExec (creates a service, most reliable but noisy)"
    when_to_use: "When reliable remote execution is needed and stealth is not critical. Uses SMB service creation."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      command:
        type: string
        description: "Command to execute (omit for interactive shell)"
      service_name:
        type: string
        description: "Custom service name for stealth"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (psexec)"
      output:
        type: string
        description: "Command output"
      info:
        type: array
        description: "Informational messages"
      warnings:
        type: array
        description: "Warning messages"

  wmiexec:
    required_ports: [135]
    description: "Execute commands on a remote Windows host via WMI (stealthier than psexec, no service creation)"
    when_to_use: "When stealth matters - no service creation, uses WMI for execution. Preferred for lateral movement."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port (default: 135 for WMI)"
      command:
        type: string
        description: "Command to execute"
      nooutput:
        type: boolean
        default: false
        description: "Do not retrieve command output (blind execution)"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (wmiexec)"
      output:
        type: string
        description: "Command output"

  smbexec:
    required_ports: [445]
    description: "Execute commands on a remote Windows host via SMB (native commands, no binary upload needed)"
    when_to_use: "When other methods fail or when you want native command execution without uploading binaries"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      command:
        type: string
        description: "Command to execute"
      share:
        type: string
        default: "C$"
        description: "Writable share for output"
      mode:
        type: enum
        values: [SHARE, SERVER]
        default: SHARE
        description: "Execution mode"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (smbexec)"
      output:
        type: string
        description: "Command output"

  dcomexec:
    required_ports: [135]
    description: "Execute commands on a remote Windows host via DCOM objects (MMC20, ShellWindows, ShellBrowserWindow)"
    when_to_use: "Alternative lateral movement using DCOM. Useful when SMB-based methods are blocked."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port (default: 135 for DCOM)"
      command:
        type: string
        description: "Command to execute"
      dcom_object:
        type: enum
        values: [MMC20, ShellWindows, ShellBrowserWindow]
        default: MMC20
        description: "DCOM object to use for execution"
      nooutput:
        type: boolean
        default: false
        description: "Do not retrieve command output"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (dcomexec)"
      object:
        type: string
        description: "DCOM object used"
      output:
        type: string
        description: "Command output"

  atexec:
    required_ports: [445]
    description: "Execute commands on a remote Windows host via Task Scheduler (scheduled task based execution)"
    when_to_use: "When other execution methods are blocked. Uses Windows Task Scheduler for command execution."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      command:
        type: string
        required: true
        description: "Command to execute via scheduled task"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      codec:
        type: string
        default: "utf-8"
        description: "Output codec"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      method:
        type: string
        description: "Execution method used (atexec)"
      output:
        type: string
        description: "Command output"

  secretsdump:
    required_ports: [445]
    description: "Dump credentials from a Windows host (SAM, LSA secrets, cached creds, NTDS.dit via DRSUAPI/VSS)"
    when_to_use: "After gaining admin access to dump password hashes. Use -just-dc on domain controllers for NTDS.dit."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication (needs admin privileges)"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      just_dc:
        type: boolean
        default: false
        description: "Only extract NTDS.dit data via DRSUAPI (DC only, much faster)"
      just_dc_ntlm:
        type: boolean
        default: false
        description: "Only extract NTLM hashes from NTDS.dit"
      just_dc_user:
        type: string
        description: "Extract only this user's hash from NTDS.dit"
      use_vss:
        type: boolean
        default: false
        description: "Use Volume Shadow Copy instead of DRSUAPI"
      exec_method:
        type: enum
        values: [smbexec, wmiexec, mmcexec]
        description: "Remote execution method for VSS"
      timeout:
        type: integer
        default: 600
        description: "Timeout in seconds (credential dumping can be slow)"
    returns:
      sam_hashes:
        type: array
        description: "Local SAM hashes (user:rid:lm:nt:::)"
      lsa_secrets:
        type: array
        description: "LSA secrets"
      cached_creds:
        type: array
        description: "Domain cached credentials"
      ntds_hashes:
        type: array
        description: "NTDS.dit hashes (domain controller)"
      kerberos_keys:
        type: array
        description: "Kerberos encryption keys"
      total_hashes:
        type: integer
        description: "Total number of hashes extracted"

  kerberoast:
    required_ports: [88]
    description: "Kerberoasting attack - extract TGS service ticket hashes for offline cracking (targets accounts with SPNs)"
    when_to_use: "With any valid domain credentials to extract service account hashes for offline cracking"
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP (format: domain/user:pass@dc_ip or just dc_ip)"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      request_user:
        type: string
        description: "Target a specific user's SPN"
      output_format:
        type: enum
        values: [hashcat, john]
        default: hashcat
        description: "Hash output format for cracking"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      hashes:
        type: array
        description: "TGS hashes in requested format (hashcat/john)"
      hash_count:
        type: integer
        description: "Number of hashes extracted"
      users_with_spns:
        type: array
        description: "Users with SPNs (spn, username, member_of, pwd_last_set)"
      user_count:
        type: integer
        description: "Number of users with SPNs found"

  asreproast:
    required_ports: [88]
    description: "AS-REP Roasting - extract hashes for accounts with Kerberos pre-authentication disabled"
    when_to_use: "To find accounts without Kerberos pre-authentication and extract their hashes for cracking"
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username (or blank for unauthenticated with usersfile)"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      usersfile:
        type: string
        description: "File with list of usernames to test (one per line)"
      output_format:
        type: enum
        values: [hashcat, john]
        default: hashcat
        description: "Hash output format for cracking"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      hashes:
        type: array
        description: "AS-REP hashes in requested format"
      hash_count:
        type: integer
        description: "Number of hashes extracted"
      vulnerable_users:
        type: array
        description: "Users without pre-authentication"

  smb_shares:
    required_ports: [445]
    description: "List SMB shares on a remote Windows host with access permissions"
    when_to_use: "To enumerate available SMB shares before accessing files"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      shares:
        type: array
        description: "Available shares with name, type, and comment"
      share_count:
        type: integer
        description: "Number of shares found"

  smb_get:
    required_ports: [445]
    description: "Download a file from an SMB share"
    when_to_use: "To retrieve files from Windows shares (config files, scripts, sensitive data)"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      share:
        type: string
        required: true
        description: "Share name (e.g., 'C$', 'Users', 'SYSVOL')"
      remote_path:
        type: string
        required: true
        description: "Path within the share"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      content:
        type: string
        description: "File content"
      size:
        type: integer
        description: "File size in bytes"

  smb_put:
    required_ports: [445]
    description: "Upload content to an SMB share"
    when_to_use: "To upload files to Windows shares (payloads, scripts, tools)"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      share:
        type: string
        required: true
        description: "Share name (e.g., 'C$', 'Users')"
      remote_path:
        type: string
        required: true
        description: "Destination path within the share"
      content:
        type: string
        required: true
        description: "Content to upload"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      size:
        type: integer
        description: "Uploaded content size in bytes"

  get_ad_users:
    required_ports: [389]
    description: "Enumerate Active Directory users via LDAP (requires domain credentials)"
    when_to_use: "During enumeration phase to discover domain users for targeting"
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target LDAP port"
      all:
        type: boolean
        default: false
        description: "Return all user attributes (verbose)"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      users:
        type: array
        description: "AD users with name, email, and creation date"
      user_count:
        type: integer
        description: "Number of users found"

  lookupsid:
    required_ports: [445]
    description: "Brute-force SID enumeration to discover domain users, groups, and aliases"
    when_to_use: "To enumerate domain objects when LDAP is restricted or for initial domain recon"
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target SMB port (default: 445)"
      max_rid:
        type: integer
        default: 4000
        description: "Maximum RID to enumerate"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      domain_sid:
        type: string
        description: "Domain SID"
      users:
        type: array
        description: "Discovered users with RID, name, and type"
      groups:
        type: array
        description: "Discovered groups"
      aliases:
        type: array
        description: "Discovered aliases"
      total:
        type: integer
        description: "Total objects discovered"

  get_tgt:
    required_ports: [88]
    description: "Request a Kerberos TGT and save the ccache file for pass-the-ticket attacks"
    when_to_use: "To obtain a TGT for Kerberos-based attacks or when needing to authenticate via tickets"
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      ccache_file:
        type: string
        description: "Path to saved ccache file"
      ccache_exists:
        type: boolean
        description: "Whether ccache file was saved successfully"
      hint:
        type: string
        description: "Usage hint for the ccache file"

  get_st:
    required_ports: [88]
    description: "Request a Kerberos service ticket (TGS) via S4U2Self/S4U2Proxy for constrained delegation abuse. Saves ccache to /session/ for persistence."
    when_to_use: "After discovering constrained delegation (via find_delegation) or RBCD setup — request a service ticket impersonating a privileged user. Workflow: find_delegation → identify constrained delegation → get_st with -impersonate Administrator -spn cifs/target. Also used after RBCD: addcomputer → set msDS-AllowedToActOnBehalfOfOtherIdentity → get_st."
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Username of the account with delegation rights"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      spn:
        type: string
        required: true
        description: "Target SPN (e.g., 'cifs/dc.corp.local', 'http/web.corp.local')"
      impersonate:
        type: string
        required: true
        description: "User to impersonate (e.g., 'Administrator')"
      additional_ticket:
        type: string
        description: "Path to additional ticket for S4U2Proxy (from RBCD setup)"
      force_forwardable:
        type: boolean
        default: false
        description: "Force the service ticket to be forwardable"
      altservice:
        type: string
        description: "Alternative service name for the ticket"
      u2u:
        type: boolean
        default: false
        description: "Use User-to-User (U2U) Kerberos extension. Required for RBCD against accounts without SPNs."
      self_only:
        type: boolean
        default: false
        description: "Only perform S4U2Self, skip S4U2Proxy. Gets a ticket for the impersonated user to the requesting account."
      dmsa:
        type: boolean
        default: false
        description: "Use Delegated Managed Service Accounts (DMSA) for ticket request."
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      ccache_file:
        type: string
        description: "Path to saved ccache file (in /session/credentials/ for persistence)"
      ccache_exists:
        type: boolean
        description: "Whether ccache file was saved successfully"
        type: string
        description: "Usage hint for the ccache file"

  addcomputer:
    required_ports: [445]
    description: "Create a machine account in Active Directory for RBCD and other delegation attacks"
    when_to_use: "When setting up RBCD (resource-based constrained delegation) — create a machine account you control, then set msDS-AllowedToActOnBehalfOfOtherIdentity on the target to allow your machine to delegate. Requires MachineAccountQuota > 0 (default: 10). Workflow: addcomputer → rbcd.py (set delegation) → get_st -impersonate Administrator."
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      computer_name:
        type: string
        description: "Name for new machine account (default: random). Do NOT include trailing '$'."
      computer_pass:
        type: string
        description: "Password for new machine account (default: random)"
      method:
        type: enum
        values: [SAMR, LDAPS]
        default: SAMR
        description: "Creation method: SAMR (SMB) or LDAPS (LDAP over TLS)"
      base_dn:
        type: string
        description: "Base DN for LDAPS method (auto-derived from domain if omitted)"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      computer_name:
        type: string
        description: "Name of the created machine account"
      computer_pass:
        type: string
        description: "Password of the created machine account"
      method:
        type: string
        description: "Creation method used"

  find_delegation:
    required_ports: [389]
    description: "Enumerate delegation settings (unconstrained, constrained, RBCD) across all domain accounts"
    when_to_use: "During enumeration to discover delegation misconfigurations. Finds accounts with unconstrained delegation (full impersonation), constrained delegation (limited to specific SPNs), and RBCD. Results feed directly into get_st for exploitation."
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      timeout:
        type: integer
        default: 120
        description: "Timeout in seconds"
    returns:
      delegations:
        type: array
        description: "Delegation entries with account_name, account_type, delegation_type, delegation_rights_to"
      delegation_count:
        type: integer
        description: "Number of delegation entries found"

  rbcd:
    required_ports: [389]
    description: "Read, write, or clear Resource-Based Constrained Delegation (RBCD) on a computer account's msDS-AllowedToActOnBehalfOfOtherIdentity attribute"
    when_to_use: "After creating a machine account with addcomputer, use rbcd to set msDS-AllowedToActOnBehalfOfOtherIdentity on the target computer. Workflow: addcomputer → rbcd (write) → get_st (impersonate). Also use to read or clear existing RBCD settings during enumeration."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      delegate_from:
        type: string
        description: "Machine account allowed to delegate (e.g., 'FAKEMACHINE$')"
      delegate_to:
        type: string
        required: true
        description: "Target computer to set RBCD on (e.g., 'WEB01$')"
      action:
        type: enum
        values: [read, write, remove, flush]
        default: read
        description: "Action: write (add delegation), read (list current), remove (remove specific), flush (clear all)"
      use_ldaps:
        type: boolean
        default: false
        description: "Use LDAPS instead of LDAP"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      target:
        type: string
        description: "Target hostname/IP"
      delegate_from:
        type: string
        description: "Machine account set for delegation"
      delegate_to:
        type: string
        description: "Computer with RBCD configured"
      action:
        type: string
        description: "Action performed"

  changepasswd:
    required_ports: [445]
    description: "Change or force-reset a domain user's password via SMB-SAMR, RPC-SAMR, Kerberos kpasswd, or LDAP"
    when_to_use: "When you have ForceChangePassword ACL over a target user. Common in ACL abuse chains: compromise user A who has ForceChangePassword on user B → reset B's password → use B's new credentials. Use -reset flag with -altuser for privilege-based resets."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username of user whose password is being changed"
      password:
        type: string
        description: "Current password of the target user (omit for force-reset)"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash of the target user in LM:NT format"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      new_password:
        type: string
        required: true
        description: "New password to set"
      altuser:
        type: string
        description: "Privileged user performing the reset (for ForceChangePassword ACL abuse). Format: domain/user"
      altpass:
        type: string
        description: "Password of the privileged user"
      althash:
        type: string
        description: "NT hash of the privileged user"
      reset:
        type: boolean
        default: false
        description: "Force-reset password with privileges (bypasses some password policies)"
      protocol:
        type: enum
        values: [smb-samr, rpc-samr, kpasswd, ldap]
        default: smb-samr
        description: "Protocol for password change/reset"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      target:
        type: string
        description: "Target hostname/IP"
      protocol:
        type: string
        description: "Protocol used"
      reset:
        type: boolean
        description: "Whether force-reset was used"

  addspn:
    required_ports: [389]
    description: "Add or remove a Service Principal Name (SPN) on an Active Directory account via LDAP"
    when_to_use: "When you have WriteProperty on a computer or user account and need to add an SPN for Kerberos delegation abuse (SPN jacking). Common in constrained delegation attacks where you control an account with delegation rights and need to modify the target's SPNs."
    params:
      target:
        type: string
        required: true
        description: "Target DC IP address or hostname"
      username:
        type: string
        description: "Username for LDAP authentication"
      password:
        type: string
        description: "Password for authentication"
      domain:
        type: string
        description: "Active Directory domain name"
      hashes:
        type: string
        description: "NTLM hash in LM:NT format for pass-the-hash"
      kerberos:
        type: boolean
        default: false
        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      target_account:
        type: string
        required: true
        description: "Account to modify SPNs on (e.g., 'DC01$', 'svc_sql')"
      spn:
        type: string
        required: true
        description: "SPN to add/remove (e.g., 'cifs/DC01.pirate.htb', 'http/web01.corp.local')"
      action:
        type: enum
        values: [add, remove]
        default: add
        description: "Whether to add or remove the SPN"
      timeout:
        type: integer
        default: 60
        description: "Timeout in seconds"
    returns:
      target:
        type: string
        description: "Target DC hostname/IP"
      target_account:
        type: string
        description: "Account modified"
      spn:
        type: string
        description: "SPN added/removed"
      action:
        type: string
        description: "Action performed (add/remove)"
