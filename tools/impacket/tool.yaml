        description: "Use Kerberos authentication"
      dc_ip:
        type: string
        description: "Domain Controller IP"
      aes_key:
        type: string
        description: "AES key for Kerberos authentication"
      port:
        type: integer
        description: "Target port"
      computer_name:
        type: string
        description: "Name for new machine account (default: random). Do NOT include trailing '$'."
      computer_pass:
        type: string
        description: "Password for new machine account (default: random)"
      method:
        type: enum
        values: [SAMR, LDAPS]
        default: SAMR
        description: "Creation method: SAMR (SMB) or LDAPS (LDAP over TLS)"
