        type: string
        description: "Name of the created machine account"
      computer_pass:
        type: string
        description: "Password of the created machine account"
      method:
        type: string
        description: "Creation method used"

  find_delegation:
    required_ports: [389]
    description: "Enumerate delegation settings (unconstrained, constrained, RBCD) across all domain accounts"
    when_to_use: "During enumeration to discover delegation misconfigurations. Finds accounts with unconstrained delegation (full impersonation), constrained delegation (limited to specific SPNs), and RBCD. Results feed directly into get_st for exploitation."
    params:
      target:
        type: string
        required: true
        description: "Target domain or DC IP"
      username:
        type: string
        description: "Domain username"
      password:
        type: string
        description: "Domain password"
