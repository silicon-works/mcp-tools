      delegation_count:
        type: integer
        description: "Number of delegation entries found"

  rbcd:
    required_ports: [389]
    description: "Read, write, or clear Resource-Based Constrained Delegation (RBCD) on a computer account's msDS-AllowedToActOnBehalfOfOtherIdentity attribute"
    when_to_use: "After creating a machine account with addcomputer, use rbcd to set msDS-AllowedToActOnBehalfOfOtherIdentity on the target computer. Workflow: addcomputer → rbcd (write) → get_st (impersonate). Also use to read or clear existing RBCD settings during enumeration."
    params:
      target:
        type: string
        required: true
        description: "Target IP address or hostname"
      username:
        type: string
        description: "Username for authentication"
      password:
        type: string
        description: "Password for authentication"
