      new_password:
        type: string
        required: true
        description: "New password to set"
      altuser:
        type: string
        description: "Privileged user performing the reset (for ForceChangePassword ACL abuse). Format: domain/user"
      altpass:
        type: string
        description: "Password of the privileged user"
      althash:
        type: string
        description: "NT hash of the privileged user"
      reset:
        type: boolean
        default: false
        description: "Force-reset password with privileges (bypasses some password policies)"
      protocol:
        type: enum
        values: [smb-samr, rpc-samr, kpasswd, ldap]
