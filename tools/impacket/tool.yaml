        description: "Computer with RBCD configured"
      action:
        type: string
        description: "Action performed"

  changepasswd:
    required_ports: [445]
    description: "Change or force-reset a domain user's password via SMB-SAMR, RPC-SAMR, Kerberos kpasswd, or LDAP"
    when_to_use: "When you have ForceChangePassword ACL over a target user. Common in ACL abuse chains: compromise user A who has ForceChangePassword on user B → reset B's password → use B's new credentials. Use -reset flag with -altuser for privilege-based resets."
