name: aws
version: "1.3"
description: "Interactive AWS API client via awslabs aws-api-mcp-server (forked for offensive use). Translates AWS CLI command strings into boto3 API calls. Supports ALL AWS services — IAM, S3, Lambda, DynamoDB, SQS, STS, EC2, Secrets Manager, CloudTrail, and 200+ more. Batch mode (20 commands per call), all-region scanning, automatic pagination. User-Agent fingerprint stripped for OPSEC. Credentials via env vars. For IAM privilege escalation use pacu. For attack path analysis use cloudfox. For cloud security auditing use prowler."
image: "ghcr.io/silicon-works/mcp-tools-aws:latest"
image_size_mb: 400
timeout_seconds: 600

capabilities:
  - aws_api_access
  - iam_enumeration
  - s3_operations
  - lambda_operations
  - cloud_exploitation

phases:
  - reconnaissance
  - enumeration
  - exploitation
  - post-exploitation

requirements:
  network: true
  privileged: false

resources:
  memory_mb: 512
  cpu: 0.5

routing:
  use_for:
    - "execute any AWS CLI command against an AWS account"
    - "enumerate IAM users, roles, policies, and permissions"
    - "list and access S3 buckets and objects"
    - "inspect and invoke Lambda functions"
    - "scan DynamoDB tables and query data"
    - "check STS identity (who am I?) with stolen credentials"
    - "access Secrets Manager and Parameter Store"
    - "enumerate EC2 instances, security groups, and user data"
    - "interact with SQS queues"
    - "disable CloudTrail logging (if authorized)"
  never_use_for:
    - "cloud security auditing/compliance (use prowler)"
    - "IAM privilege escalation analysis (use pacu — it has 21+ privesc modules)"
    - "attack path analysis (use cloudfox — it does cross-service correlation)"
    - "S3 bucket brute-force discovery (use s3scanner)"
    - "secret scanning in S3 contents (use trufflehog)"
  triggers:
    - aws
    - AWS CLI
    - iam
    - s3
    - lambda
    - dynamodb
    - sqs
    - sts
    - ec2
    - secrets manager
    - cloudtrail
    - AWS API
    - cloud
  prefer_over:
    - prowler  # For interactive API access (prowler is read-only compliance)

see_also:
  - tool: pacu
    reason: aws gives raw API access. pacu encodes exploitation knowledge — 21+ IAM privesc paths, persistence modules, evasion techniques. Use aws for manual enumeration, pacu for automated exploitation.
  - tool: cloudfox
    reason: aws makes individual API calls. cloudfox does cross-service attack path analysis (trust chains, role assumptions, env var secrets). Use cloudfox for situational awareness.
  - tool: prowler
    reason: Both interact with AWS APIs but prowler is read-only compliance auditing. aws allows read AND write operations for exploitation.
  - tool: s3scanner
    reason: Use s3scanner to discover unknown S3 buckets by name. Use aws to interact with known/discovered buckets.
  - tool: trufflehog
    reason: Use trufflehog to scan S3 bucket contents for secrets. Use aws for general S3 operations.

methods:
  execute_aws_command:
    description: "Execute any AWS CLI command via boto3. Accepts the full AWS CLI command string (e.g., 'aws sts get-caller-identity', 'aws s3 ls'). Supports batch mode with up to 20 commands per call."
    when_to_use: "For any AWS API interaction — IAM enumeration, S3 access, Lambda inspection, DynamoDB queries, SQS interaction, and 200+ other AWS services. This is the swiss army knife for AWS pentesting."
    params: {}
    returns: {}
