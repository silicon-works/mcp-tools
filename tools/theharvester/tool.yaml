name: theharvester
version: "4.10.1"
description: "Email and subdomain OSINT harvesting — theHarvester v4.10.1 with 51 data sources across 6 categories (certificate, DNS, search engine, threat intel, code repo, email) for discovering emails, subdomains, IPs, and URLs. Two methods: harvest (query certificate databases, search engines, DNS aggregators, breach databases, and threat intelligence platforms for a target domain), list_sources (enumerate all 51 available data sources with API key requirements). 11 free sources work without API keys (crtsh, hackertarget, rapiddns, urlscan, certspotter, otx, robtex, yahoo, duckduckgo, baidu, subdomaincenter). dnsdumpster now requires an API key. ~40 paid sources need API keys (shodan, virustotal, censys, hunter, intelx, dnsdumpster, etc.). For deeper subdomain enumeration with DNS brute-force use amass. For email verification or phishing use separate tools."
image: "ghcr.io/silicon-works/mcp-tools-theharvester:latest"
image_size_mb: 689
timeout_seconds: 300

capabilities:
  - email_harvesting
  - subdomain_discovery
  - osint
  - attack_surface_mapping

routing:
  use_for:
    - "find email addresses for a domain"
    - "harvest emails and subdomains from OSINT sources"
    - "discover employee email addresses for a target company"
    - "gather emails from certificate logs and search engines"
    - "find IPs and hostnames associated with a domain"
    - "passive reconnaissance on a domain using public sources"
    - "collect email addresses before phishing assessment"
    - "enumerate subdomains from DNS databases and certificate transparency"
  never_use_for:
    - "deep subdomain brute-force enumeration (use amass)"
    - "port scanning (use nmap)"
    - "web vulnerability scanning (use nuclei)"
    - "active DNS zone transfers (use amass enum_active)"
    - "social media profiling (not supported)"
  triggers:
    - "theharvester"
    - "the harvester"
    - "email harvest"
    - "email enumeration"
    - "email discovery"
    - "harvest emails"
    - "find emails"
    - "OSINT emails"

phases:
  - reconnaissance

requirements:
  network: true
  privileged: false

resources:
  memory_mb: 256
  cpu: 0.5

see_also:
  - tool: amass
    reason: "Use amass for deeper subdomain enumeration with DNS brute-force and active probing. theHarvester focuses on emails + lightweight subdomain discovery."
  - tool: nmap
    reason: "After discovering hosts with theHarvester, use nmap to port scan them."
  - tool: nuclei
    reason: "After discovering subdomains, use nuclei to scan for web vulnerabilities."
  - tool: web-fingerprint
    reason: "After discovering hosts and subdomains, use web-fingerprint to identify the technology stack (CMS, frameworks, servers) running on each."
  - tool: hydra
    reason: "After harvesting email addresses, use hydra for credential brute-forcing against web logins, OWA, or SSH using discovered email addresses as usernames."

methods:
  harvest:
    description: "Harvest emails, subdomains, IPs, and URLs for a target domain. Runs `theHarvester -d <domain> -b <sources> -l <limit> -f /session/output`. Queries multiple OSINT sources in parallel. Output saved as JSON file under /session/. Free sources (no API key): crtsh, hackertarget, rapiddns, urlscan, certspotter, otx, robtex, yahoo, duckduckgo, baidu. Note: dnsdumpster now requires an API key."
    when_to_use: "(1) Early reconnaissance — gather email addresses for phishing assessment or social engineering. (2) Discover subdomains and IPs as supplement to amass. (3) Quick OSINT scan before deeper enumeration. (4) Use free sources first (crtsh,hackertarget,rapiddns,urlscan,certspotter), add paid sources if API keys available."
    required_ports: []
    params:
      domain:
        type: string
        required: true
        description: "Target domain (e.g., 'example.com'). Can also be a company name for some sources."
      sources:
        type: string
        default: "crtsh,hackertarget,rapiddns,urlscan,certspotter"
        description: "Comma-separated data sources. Use 'all' for all sources (slow, some need API keys). Recommended free: 'crtsh,hackertarget,rapiddns,urlscan,certspotter'. Use list_sources to see all available."
      limit:
        type: integer
        default: 500
        description: "Maximum results per source. Default 500. Increase for thorough harvesting."
      dns_lookup:
        type: boolean
        default: false
        description: "Resolve discovered hosts to IPs. Default false (faster). Enable for IP enumeration."
    returns:
      emails:
        type: array
        description: "Discovered email addresses (capped at 100). Deduplicated."
      total_emails:
        type: integer
        description: "Total unique emails found."
      hosts:
        type: array
        description: "Discovered hostnames/subdomains (capped at 200). Deduplicated."
      total_hosts:
        type: integer
        description: "Total unique hosts found."
      ips:
        type: array
        description: "Discovered IP addresses (capped at 100)."
      sources_used:
        type: array
        description: "Data sources that were queried."
      output_file:
        type: string
        description: "Path to full JSON output file under /session/."

  list_sources:
    description: "List all 51 available theHarvester data sources with API key requirements."
    when_to_use: "Before harvesting — check which sources are available and which need API keys."
    required_ports: []
    params: {}
    returns:
      sources:
        type: array
        description: "All sources. Each: {name, type, api_key: bool}."
      free_sources:
        type: array
        description: "Sources that work without API keys."
      recommended_free:
        type: string
        description: "Comma-separated recommended free sources for quick scans."
