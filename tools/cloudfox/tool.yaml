name: cloudfox
version: "1.0"
description: "AWS attack path enumeration via Bishop Fox CloudFox. 2 methods: run (execute any of 30+ CloudFox AWS modules for cross-service attack path analysis — principals, permissions, role-trusts, env-vars, endpoints, instances, workloads, secrets, etc.), list_commands (show available modules). Read-only enumeration that cross-references data across services to find exploitable paths. For raw AWS API access use aws. For exploitation use pacu."
image: "ghcr.io/silicon-works/mcp-tools-cloudfox:latest"
image_size_mb: 350
timeout_seconds: 600

capabilities:
  - aws_attack_path_analysis
  - iam_enumeration
  - cross_service_correlation
  - trust_analysis

phases:
  - reconnaissance
  - enumeration

requirements:
  network: true
  privileged: false

resources:
  memory_mb: 512
  cpu: 1.0

routing:
  use_for:
    - "enumerate IAM principals, permissions, and role trust relationships"
    - "find AWS attack paths (workloads with admin or path to admin)"
    - "discover secrets in environment variables across Lambda, ECS, CodeBuild"
    - "enumerate API endpoints, instances, databases, and network exposure"
    - "analyze cross-account trust relationships and resource sharing"
    - "find outbound assumed roles for lateral movement"
  never_use_for:
    - "executing AWS API commands (use aws)"
    - "exploiting AWS misconfigurations (use pacu)"
    - "S3 bucket brute-force (use s3scanner)"
    - "secret scanning in files (use trufflehog)"
  triggers:
    - cloudfox
    - AWS attack path
    - cloud attack surface
    - IAM analysis
    - role trust
    - AWS enumeration
    - cloud enumeration
  prefer_over: []

see_also:
  - tool: aws
    reason: cloudfox does read-only cross-service analysis. aws provides interactive API access for exploitation.
  - tool: pacu
    reason: cloudfox identifies attack paths. pacu exploits them (privesc, persistence, evasion).
  - tool: prowler
    reason: Both do AWS analysis but prowler checks compliance. CloudFox finds offensive attack paths.

methods:
  run:
    description: "Run a CloudFox AWS module. 30+ modules available for cross-service attack path analysis."
    when_to_use: "After obtaining AWS credentials — use CloudFox for situational awareness. Start with 'inventory' for account overview, then 'principals' + 'permissions' for IAM analysis, 'role-trusts' for trust relationships, 'env-vars' for leaked secrets, 'workloads' for admin paths."
    params:
      command:
        type: string
        required: true
        description: "CloudFox module name (e.g., 'principals', 'permissions', 'role-trusts', 'env-vars', 'workloads')."
      access_key_id:
        type: string
        description: "AWS access key ID."
      secret_access_key:
        type: string
        description: "AWS secret access key."
      session_token:
        type: string
        description: "AWS session token."
      region:
        type: string
        default: "us-east-1"
        description: "AWS region."
      output:
        type: string
        default: "wide"
        description: "Output format: brief or wide."
      timeout:
        type: integer
        default: 300
        description: "Timeout in seconds."
    returns:
      command:
        type: string
        description: "Module that was executed."

  list_commands:
    description: "List all available CloudFox AWS modules with descriptions."
    when_to_use: "Reference — see which modules are available."
    params: {}
    returns:
      commands:
        type: array
        description: "Available modules with descriptions."
      command_count:
        type: integer
        description: "Total modules."
