updated_at: '2026-03-13T19:22:44Z'
tools:
  amass:
    name: amass
    version: 5.0.0
    description: 'Subdomain discovery and external attack surface mapping — OWASP Amass v5.0 with passive and active enumeration
      modes. Two methods: enum_passive (certificate transparency, DNS databases, web archives, search engines — no target
      contact; passive is the v5 default), enum_active (passive sources plus DNS brute-force, zone transfers, certificate
      crawling — touches target DNS). Outputs text format (one subdomain per line) parsed into structured data with subdomain
      names and parent domain. For email harvesting alongside subdomain discovery use theharvester. For web technology fingerprinting
      on discovered subdomains use web-fingerprint. For port scanning discovered hosts use nmap.'
    image: ghcr.io/silicon-works/mcp-tools-amass:latest
    image_size_mb: 226
    timeout_seconds: 900
    capabilities:
    - subdomain_discovery
    - dns_enumeration
    - attack_surface_mapping
    - osint
    routing:
      use_for:
      - discover subdomains for a target domain
      - enumerate subdomains using passive OSINT sources
      - find all subdomains of a website without touching it
      - active DNS brute-force subdomain enumeration
      - map the external attack surface of an organization
      - discover hidden subdomains before port scanning
      - certificate transparency log subdomain discovery
      never_use_for:
      - port scanning discovered hosts (use nmap)
      - web technology fingerprinting (use web-fingerprint)
      - web vulnerability scanning (use nuclei or nikto)
      - email harvesting (use theharvester)
      - DNS record lookups for known hosts (use nmap or dig via bash)
      triggers:
      - amass
      - subdomain
      - subdomain discovery
      - subdomain enumeration
      - attack surface
      - DNS brute force
      - certificate transparency
      - find subdomains
      - domain enumeration
    phases:
    - reconnaissance
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 512
      cpu: 1.0
    see_also:
    - tool: nmap
      reason: After discovering subdomains with amass, use nmap to port scan the discovered hosts.
    - tool: web-fingerprint
      reason: Use web-fingerprint to identify technologies running on discovered subdomains.
    - tool: theharvester
      reason: Use theharvester for email/employee harvesting. Amass focuses on subdomains, theharvester on emails and people.
    - tool: nuclei
      reason: After discovering subdomains, use nuclei to scan them for web vulnerabilities.
    - tool: ffuf
      reason: After discovering subdomains, use ffuf for directory brute-forcing and content discovery on each subdomain.
    methods:
      enum_passive:
        description: Passive subdomain enumeration — runs `amass enum -d <domain> -o <output> -nocolor -timeout <min>` (passive
          is the v5 default). Queries certificate transparency logs, DNS aggregators, web archives, and search engines. Does
          NOT touch the target's infrastructure directly — all data comes from third-party sources. Returns deduplicated subdomain
          list parsed from text output (one subdomain per line). Progress info and OWASP banner on stderr are filtered out.
        when_to_use: (1) First step in reconnaissance — discover subdomains without alerting the target. (2) Bug bounty scope
          expansion — find all related subdomains. (3) Before active scanning — build target list for nmap, nuclei, web-fingerprint.
          (4) When stealth is required — passive mode leaves no trace on target infrastructure.
        required_ports: []
        params:
          domain:
            type: string
            required: true
            description: Target domain (e.g., 'example.com', 'target.htb'). Must be a valid domain name, not an IP.
          timeout:
            type: integer
            default: 5
            description: Timeout in minutes. Default 5. Increase to 30+ for large domains with many subdomains. Partial results
              returned on timeout.
        returns:
          subdomains:
            type: array
            description: 'Discovered subdomains (capped at 200). Each: {name: str, domain: str}.'
          total_found:
            type: integer
            description: Total unique subdomains discovered.
          mode:
            type: string
            description: Enumeration mode used ('passive' or 'active').
          output_file:
            type: string
            description: Path to text output file under /session/ (one subdomain per line).
      enum_active:
        description: Active subdomain enumeration — runs `amass enum -active -brute -d <domain> -o <output> -nocolor -timeout
          <min>`. Includes all passive sources PLUS DNS brute-force with built-in wordlist, attempted zone transfers, and
          certificate crawling. Directly queries the target's DNS servers.
        when_to_use: (1) When passive enum is not finding enough subdomains. (2) When you have authorization to actively probe
          the target. (3) HTB/CTF — always use active mode since targets are authorized. (4) After passive enum — active adds
          brute-force results to passive findings.
        required_ports: []
        params:
          domain:
            type: string
            required: true
            description: Target domain.
          brute:
            type: boolean
            default: true
            description: Enable DNS brute-force. Default true. Disable with false if only want zone transfer and cert crawling.
          timeout:
            type: integer
            default: 10
            description: Timeout in minutes. Default 10. Active+brute takes longer than passive.
        returns:
          subdomains:
            type: array
            description: Discovered subdomains with IPs and sources.
          total_found:
            type: integer
            description: Total unique subdomains discovered.
  bloodhound:
    name: bloodhound
    version: 1.9.0
    description: 'Active Directory relationship mapping and attack path analysis via bloodhound-python v1.9.0 (dirkjanm/BloodHound.py,
      Kali apt package bloodhound.py). This is BloodHound LEGACY (BloodHound.py) — not BloodHound CE''s built-in ingestor.
      Two methods: collect, collect_stealth. Ingests AD data by querying LDAP (port 389/636) and optionally enumerating computers
      (SMB/RPC) to map users, groups, computers, domains, GPOs, OUs, containers, ACLs, sessions, and trust relationships.
      Output is BloodHound-compatible JSON files (7 types: users, groups, computers, domains, gpos, ous, containers) written
      to /session/ for downstream analysis. Collection presets: ''Default'' (Group, LocalAdmin, Session, Trusts), ''All''
      (everything except LoggedOn), ''DCOnly'' (LDAP-only, no host contact — stealth). Supports NTLM password auth, pass-the-hash
      (--hashes LM:NT), Kerberos ccache (-k), and AES key auth. Requires valid domain credentials — unlike kerbrute which
      needs none. DNS resolution uses DC as nameserver (-ns) with TCP by default for Docker reliability. For unauthenticated
      AD enumeration, use kerbrute first to discover valid usernames, then use bloodhound with obtained credentials.'
    image: ghcr.io/silicon-works/mcp-tools-bloodhound:latest
    image_size_mb: 258
    timeout_seconds: 300
    capabilities:
    - ad_enumeration
    - attack_path_analysis
    - ldap_collection
    - relationship_mapping
    routing:
      use_for:
      - collect Active Directory relationship data for attack path analysis
      - map AD users, groups, computers, and trust relationships using BloodHound
      - enumerate AD group memberships, ACLs, and delegation rights via LDAP
      - collect BloodHound-compatible JSON data from a domain controller
      - stealth AD collection using DCOnly method with no computer enumeration
      - discover attack paths from owned user to Domain Admin via AD relationships
      - ingest AD data after obtaining valid credentials from password spray or hash dump
      - enumerate local admin rights, sessions, and DCOM/RDP/PSRemote access across domain computers
      - collect AD certificate services, GPO, OU, and container objects for privilege escalation analysis
      - map trust relationships between domains in a multi-domain forest
      - generate BloodHound JSON files for import into BloodHound CE or legacy GUI
      never_use_for:
      - username enumeration without credentials (use kerbrute — bloodhound requires valid LDAP bind creds)
      - password spraying (use kerbrute — bloodhound is for data collection, not authentication brute-force)
      - kerberoasting (use impacket.kerberoast — bloodhound collects relationships, not TGS tickets)
      - AS-REP roasting (use impacket.asreproast)
      - credential dumping from memory (use impacket.secretsdump)
      - SMB enumeration without AD context (use netexec — faster for simple share/user enumeration)
      - LDAP search queries (use impacket.get_ad_users or ldapsearch for targeted LDAP queries)
      triggers:
      - bloodhound
      - bloodhound-python
      - BloodHound.py
      - AD collection
      - AD relationship
      - attack path
      - DCOnly
      - AD ingestor
      - domain enumeration
      - SharpHound alternative
    phases:
    - enumeration
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 256
      cpu: 0.5
    see_also:
    - tool: kerbrute
      reason: Enumerate valid usernames without credentials before collecting with bloodhound
    - tool: impacket
      reason: After collection, use impacket for kerberoasting (GetUserSPNs), secretsdump, or targeted LDAP queries
    - tool: netexec
      reason: Validate credentials across protocols before bloodhound collection, or use nxc ldap --bloodhound as lightweight
        alternative
    - tool: certipy
      reason: After bloodhound identifies ADCS, use certipy for certificate-based attack paths (ESC1-ESC8)
    - tool: responder
      reason: After BloodHound identifies forced authentication targets or relay paths, use responder to capture NTLMv2 hashes
        from those targets.
    - tool: evil-winrm
      reason: After BloodHound shows CanPSRemote edges to target hosts, use evil-winrm for WinRM shell access.
    methods:
      collect:
        description: 'Collect AD data using bloodhound-python with configurable collection methods. Runs `bloodhound-python
          -d <domain> -u <user> -p <pass> -c <collection> -ns <dc_ip> --dns-tcp -v -op /session/bh` with optional flags for
          LDAPS, channel binding, hash auth, Kerberos, workers, exclude-dcs, zip, dc_host override, and computerfile scope
          limiting. DC hostname is auto-discovered via DNS using dc_ip as nameserver; dc_host override only needed if auto-discovery
          fails. Output files written as `/session/bh_<timestamp>_<type>.json` — one file per type (users, groups, computers,
          domains, gpos, ous, containers). Each JSON file has `{"data": [...], "meta": {"type": "<type>", "count": <int>,
          "methods": 0, "version": 5}}` structure. Returns structured file summaries including path, filename, size, type,
          and object count for each file. The `collection_types` field lists which AD object types were collected. Success
          is determined by whether any output files were generated — empty output with valid creds usually indicates wrong
          domain name or DNS resolution failure. File rotation occurs at 40000 entries per type. The -v (verbose) flag is
          always enabled, producing indent=1 JSON output.'
        when_to_use: '(1) After obtaining valid domain credentials via password spray (kerbrute), hash dump (impacket.secretsdump),
          or initial foothold — collect comprehensive AD data to discover privilege escalation paths. (2) When you need to
          identify all members of high-value groups (Domain Admins, Enterprise Admins, Backup Operators) and the shortest
          attack paths to reach them. (3) When mapping ACL-based attack chains: who has GenericAll/WriteDACL/AddMember on
          which objects. (4) To discover Kerberoastable accounts (users with SPNs) or AS-REP-roastable accounts for further
          credential attacks. (5) When enumerating trust relationships in a multi-domain forest. (6) Collection=''All'' for
          maximum coverage on first run; collection=''Group'' or ''ACL'' for targeted follow-up. (7) Use with --exclude-dcs
          to avoid ATA/ATP detections on domain controllers.'
        required_ports:
        - 389
        params:
          domain:
            type: string
            required: true
            description: Target AD domain name (e.g., 'corp.local', 'fries.htb'). Case-insensitive. Must resolve via the DC's
              DNS — if bloodhound fails with 'Could not find a domain', verify domain name via nmap LDAP scripts or ldapsearch.
          username:
            type: string
            required: true
            description: 'Username for LDAP bind. Format: bare username (''admin'') or UPN (''admin@corp.local''). Must have
              read access to AD objects — any authenticated domain user works for most collection methods.'
          password:
            type: string
            description: Password for NTLM or Kerberos authentication. Mutually exclusive with hashes (provide one or the
              other). If both password and hashes are omitted, must use kerberos=true with a valid ccache.
          hashes:
            type: string
            description: NTLM hash in LM:NT format for pass-the-hash authentication (e.g., 'aad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0').
              Use when you have extracted hashes but not plaintext passwords.
          kerberos:
            type: boolean
            default: false
            description: Use Kerberos authentication via ccache file (set KRB5CCNAME environment variable). For use after
              obtaining a TGT via impacket.getTGT or certipy authenticate. When kerberos=true and no password is provided,
              -no-pass is automatically added to the command line.
          aes_key:
            type: string
            description: AES key for Kerberos authentication (128 or 256 bit hex string). Alternative to password/hash when
              you have extracted AES keys from a keytab or secretsdump.
          auth_method:
            type: enum
            values:
            - auto
            - ntlm
            - kerberos
            default: auto
            description: Force authentication method. 'auto' tries Kerberos then NTLM fallback. Use 'ntlm' if Kerberos is
              misconfigured or unavailable. Use 'kerberos' to force Kerberos-only (requires valid ccache or password).
          dc_ip:
            type: string
            required: true
            description: Domain controller IP address. Used as DNS nameserver (-ns) for name resolution inside the container.
              The DC hostname is auto-discovered via DNS. Must be an IP, not hostname — Docker containers cannot resolve AD
              hostnames without this nameserver.
          dc_host:
            type: string
            description: DC hostname FQDN (e.g., 'dc01.corp.local'). Optional — if omitted, bloodhound auto-discovers the
              DC hostname via DNS using dc_ip as nameserver. Only needed if DNS auto-discovery fails.
          collection:
            type: string
            default: Default
            description: 'Collection method(s), comma-separated. Presets: ''All'' (everything except LoggedOn — most comprehensive),
              ''Default'' (Group, LocalAdmin, Session, Trusts — good balance), ''DCOnly'' (LDAP-only queries to DC, no computer
              enumeration — stealthiest). Individual methods: Group, LocalAdmin, Session, Trusts, ObjectProps, ACL, DCOM,
              RDP, PSRemote, LoggedOn, Container. Combine with commas: ''Group,ACL,Trusts''. LoggedOn requires admin rights
              on target computers and is excluded from ''All'' due to noise.'
          gc_host:
            type: string
            description: Override Global Catalog server hostname or IP. Needed for multi-domain forest collection where the
              DC is not the GC. If unset, bloodhound auto-selects a GC.
          use_ldaps:
            type: boolean
            default: false
            description: Use LDAP over TLS (port 636 instead of 389). Encrypts all LDAP queries. May bypass network IDS that
              only inspects cleartext LDAP. Required when DC enforces LDAPS-only.
          ldap_channel_binding:
            type: boolean
            default: false
            description: Use LDAP Channel Binding (forces LDAPS protocol). Required when the DC enforces EPA (Extended Protection
              for Authentication). If collection fails with channel binding errors, enable this.
          dns_tcp:
            type: boolean
            default: true
            description: Use TCP for DNS queries instead of UDP. Enabled by default for reliability in Docker containers where
              UDP DNS can be unreliable. Disable only if you need UDP DNS for specific network reasons.
          dns_timeout:
            type: integer
            default: 3
            description: 'DNS query timeout in seconds (bloodhound default: 3). Increase to 10-15 if DNS resolution is slow
              inside Docker or across VPN tunnels.'
          workers:
            type: integer
            default: 10
            description: 'Number of concurrent worker threads for computer enumeration (default: 10). Reduce to 1-2 for stealth
              to minimize concurrent connections. Only affects methods that contact computers (LocalAdmin, Session, RDP, DCOM,
              PSRemote, LoggedOn). DCOnly ignores this.'
          exclude_dcs:
            type: boolean
            default: false
            description: Skip domain controllers during computer enumeration. Avoids Microsoft ATA/ATP detections that trigger
              on enumeration of DC resources. Recommended when stealth is important.
          zip_output:
            type: boolean
            default: false
            description: Compress all output JSON files into a single ZIP archive. Useful for BloodHound CE import which accepts
              ZIP uploads directly.
          computerfile:
            type: string
            description: Path to file containing computer FQDNs (one per line) to limit enumeration scope. File must be in
              /session/ directory. Restricts computer-based methods (LocalAdmin, Session, etc.) to only these hosts.
          timeout:
            type: integer
            default: 300
            description: Maximum execution time in seconds. 300s handles most single-domain collections. Increase for large
              domains (10K+ computers) or when using slow collection methods like LoggedOn.
        returns:
          files:
            type: array
            description: 'Array of file summary objects, one per output file. Each has: path (full path in /session/), filename
              (basename), size_bytes, type (users/groups/computers/domains/gpos/ous/containers), count (number of AD objects
              in file). ZIP files have type=''zip'' and contents array of filenames.'
          file_count:
            type: integer
            description: Total number of output files generated. Typical 'Default' collection produces 4-7 files. 'All' produces
              7 files. Zero files indicates authentication or DNS failure.
          collection_types:
            type: array
            description: List of AD object types collected (e.g., ['users', 'groups', 'computers', 'domains']). Extracted
              from file meta.type fields. Empty when no files generated.
          domain:
            type: string
            description: Domain that was collected
          dc_ip:
            type: string
            description: DC IP that was queried
          collection:
            type: string
            description: Collection method(s) that were used
      collect_stealth:
        description: 'Stealth AD collection using DCOnly method — only LDAP queries to the domain controller, no SMB/RPC connections
          to individual computers. Hardcodes collection=''DCOnly'' which internally expands to group, trusts, objectprops,
          acl, container methods — all resolved via LDAP queries to the DC. Output files include users, groups, domains, gpos,
          ous, containers (but NOT computers since no computer enumeration occurs). Does NOT collect LocalAdmin, Session,
          DCOM, RDP, or PSRemote data (these require contacting each computer). Same JSON output format as collect (`meta.version:
          5`, `meta.type`, `meta.count`). Ideal for initial reconnaissance where network noise must be minimized.'
        when_to_use: (1) First bloodhound run after obtaining creds — minimal network footprint while still getting group
          memberships, ACLs, and trust relationships. (2) When ATA/ATP or EDR is monitoring for lateral movement — DCOnly
          only talks to the DC via LDAP. (3) Before deciding whether a noisier 'All' collection is worth the risk. (4) In
          CTF/HTB scenarios where you want quick results without waiting for computer enumeration.
        required_ports:
        - 389
        params:
          domain:
            type: string
            required: true
            description: Target AD domain name (e.g., 'corp.local', 'fries.htb').
          username:
            type: string
            required: true
            description: Username for LDAP bind.
          password:
            type: string
            description: Password for authentication.
          hashes:
            type: string
            description: NTLM hash in LM:NT format for pass-the-hash.
          kerberos:
            type: boolean
            default: false
            description: Use Kerberos authentication via ccache. When kerberos=true and no password is provided, -no-pass
              is automatically added to the command line.
          aes_key:
            type: string
            description: AES key for Kerberos auth (128 or 256 bit hex string).
          auth_method:
            type: enum
            values:
            - auto
            - ntlm
            - kerberos
            default: auto
            description: Force authentication method.
          dc_ip:
            type: string
            required: true
            description: Domain controller IP address. Used as DNS nameserver (-ns). DC hostname auto-discovered.
          dc_host:
            type: string
            description: DC hostname FQDN. Optional — auto-discovered via DNS if omitted.
          gc_host:
            type: string
            description: Override Global Catalog server for multi-domain forest collection.
          use_ldaps:
            type: boolean
            default: false
            description: Use LDAP over TLS (port 636).
          ldap_channel_binding:
            type: boolean
            default: false
            description: Use LDAP Channel Binding (forces LDAPS). Required when DC enforces EPA.
          dns_tcp:
            type: boolean
            default: true
            description: 'Use TCP for DNS queries (default: true for Docker reliability).'
          dns_timeout:
            type: integer
            default: 3
            description: DNS query timeout in seconds.
          workers:
            type: integer
            default: 10
            description: Worker threads (mostly irrelevant for DCOnly since no computer enumeration occurs).
          exclude_dcs:
            type: boolean
            default: false
            description: Skip DCs during enumeration (irrelevant for DCOnly but accepted for API consistency).
          zip_output:
            type: boolean
            default: false
            description: Compress output JSON files into ZIP archive.
          computerfile:
            type: string
            description: Computer FQDN allowlist file (irrelevant for DCOnly).
          timeout:
            type: integer
            default: 300
            description: Maximum execution time in seconds.
        returns:
          files:
            type: array
            description: Array of file summary objects (same format as collect). DCOnly typically produces fewer files — users,
              groups, domains, gpos, ous, containers but NOT computers (no computer enumeration).
          file_count:
            type: integer
            description: Total output files generated.
          collection_types:
            type: array
            description: AD object types collected.
          domain:
            type: string
            description: Domain that was collected
          dc_ip:
            type: string
            description: DC IP that was queried
          collection:
            type: string
            description: Always 'DCOnly' for this method
  certipy:
    name: certipy
    version: 5.0.4
    description: 'Active Directory Certificate Services (AD CS) enumeration and exploitation via Certipy v5.0.4 (ly4k/Certipy,
      pip certipy-ad). Certipy has 11 subcommands total, and this MCP server exposes 7 methods: find, request, authenticate,
      shadow, forge, template, ca. The account, cert, parse, and relay subcommands exist in certipy but are not yet wrapped
      as MCP methods. Discovers Certificate Authorities and certificate templates, identifies ESC1 through ESC16 vulnerability
      classifications, requests certificates with attacker-controlled Subject Alternative Names (ESC1), performs enrollment
      agent abuse (ESC3), exploits template write access (ESC4), manages Certificate Authority operations for ESC7 (enable/disable
      templates, approve/deny requests), forges Golden Certificates from compromised CA keys (ESC5), authenticates via PKINIT
      to obtain TGTs and NT hashes, and manipulates Shadow Credentials (msDS-KeyCredentialLink) for account takeover. Outputs
      PFX certificates, ccache/kirbi Kerberos tickets, and JSON enumeration reports to /session/certipy/. Authentication supports
      password, NTLM hash (pass-the-hash), Kerberos ccache, and AES keys. Username format is user@domain (NOT domain/user).
      All output files use unique prefixes to avoid certipy''s interactive overwrite prompt. For NTLM relay to AD CS endpoints
      (ESC8/ESC11), use impacket-relay instead — certipy''s relay subcommand is not exposed as an MCP method because it requires
      long-running listener mode with external coercion.'
    image: ghcr.io/silicon-works/mcp-tools-certipy:latest
    image_size_mb: 721
    timeout_seconds: 600
    capabilities:
    - adcs_enumeration
    - certificate_request
    - pkinit_authentication
    - shadow_credentials
    - golden_certificate
    - template_manipulation
    - ca_management
    - esc1_exploitation
    - esc3_exploitation
    - esc4_exploitation
    - esc5_exploitation
    - esc7_exploitation
    routing:
      use_for:
      - enumerate AD Certificate Services to find vulnerable certificate templates (ESC1-ESC16)
      - request a certificate with an attacker-controlled UPN to impersonate domain admin (ESC1)
      - authenticate to Active Directory using a PFX certificate via PKINIT to get a TGT and NT hash
      - exploit Shadow Credentials by adding a key credential to a target account's msDS-KeyCredentialLink
      - forge a Golden Certificate using a compromised CA private key for persistent domain access (ESC5)
      - save and modify certificate template configurations to make them vulnerable (ESC4 exploitation)
      - use enrollment agent certificates to request certs on behalf of other users (ESC3)
      - identify which certificate templates allow enrollee-supplied SANs for user impersonation
      - perform PKINIT authentication with a PFX to obtain Kerberos ccache and NT hash for pass-the-hash
      - check if AD CS Web Enrollment or RPC enrollment interfaces are exposed for relay attacks
      - exploit ESC7 by adding CA officer, enabling SubCA template, and approving pending requests
      - convert a certificate-based authentication into an NT hash for use with other AD tools
      - enumerate Certificate Authorities and their security settings in an Active Directory forest
      - create a backup of certificate template configuration before modifying it for exploitation
      never_use_for:
      - NTLM relay to AD CS HTTP/RPC endpoints (use impacket.ntlmrelayx — certipy relay requires interactive long-running
        listener with external coercion trigger)
      - Kerberoasting or AS-REP roasting (use impacket — certipy handles certificates, not service ticket attacks)
      - LDAP enumeration without ADCS (use bloodhound or netexec — certipy only queries ADCS objects)
      - password spraying or brute-force (use kerbrute — certipy requires valid credentials)
      - cracking NT hashes obtained from PKINIT auth (use john or hashcat — certipy extracts hashes, cracking tools crack
        them)
      - BloodHound data collection (use bloodhound — certipy v5 removed BloodHound zip output)
      - coercing authentication for relay attacks (use PetitPotam/PrinterBug/Coercer — certipy is the relay receiver, not
        the coercion trigger)
      - account creation, cert conversion, or certificate parsing (not yet implemented as MCP methods — use certipy directly
        via bash)
      triggers:
      - certipy
      - ADCS
      - AD CS
      - certificate services
      - ESC1
      - ESC4
      - ESC7
      - ESC8
      - shadow credentials
      - golden certificate
      - PKINIT
      - certificate template
      - PFX
      - enrollment agent
    phases:
    - enumeration
    - exploitation
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 512
      cpu: 0.5
    see_also:
    - tool: impacket
      reason: Use ntlmrelayx for ESC8/ESC11 relay attacks, secretsdump with obtained NT hashes, or getTGT with obtained ccache
        files
    - tool: bloodhound
      reason: Collect AD relationship data to identify which users can enroll in vulnerable templates (enrollment permissions)
    - tool: netexec
      reason: Validate NT hashes obtained from PKINIT authentication across SMB, WinRM, LDAP, MSSQL
    - tool: john
      reason: Crack NT hashes if obtained via PKINIT authentication (hashcat mode 1000)
    - tool: kerbrute
      reason: Enumerate valid AD usernames before attempting certipy operations that require credentials
    - tool: responder
      reason: Capture NTLMv2 hashes via poisoning, then crack to obtain credentials for certipy authentication
    - tool: hashcat
      reason: Certipy authenticate extracts NT hashes (hashcat mode 1000). Use hashcat for cracking NTLM hashes, especially
        with mask or hybrid attacks.
    methods:
      find:
        description: 'Enumerate AD Certificate Services — discovers all Certificate Authorities, certificate templates, and
          their security configurations. Identifies ESC1 through ESC16 vulnerabilities by analyzing template permissions (enrollment
          rights, write access), EKU settings (Any Purpose, Certificate Request Agent), SAN configuration (enrollee-supplied
          subject), CA flags (EDITF_ATTRIBUTESUBJECTALTNAME2, IF_ENFORCEENCRYPTICERTREQUEST), and issuance policies. Runs
          `certipy find -username <user@domain> -dc-ip <ip> -json -text` with unique output prefix. Produces two output files:
          JSON (machine-parseable with CA and template details) and TXT (human-readable summary). JSON structure: `{"Certificate
          Authorities": {"0": {"CA Name": ..., "Vulnerabilities": {"ESC8": ...}}}, "Certificate Templates": {"0": {"Template
          Name": ..., "Vulnerabilities": {"ESC1": ...}}}}`. Use -vulnerable flag to filter to only vulnerable templates. Use
          -dc-only for stealth (LDAP queries to DC only, no host enumeration). The -sid flag improves vulnerability assessment
          accuracy by checking enrollment permissions against a specific user SID.'
        when_to_use: (1) First step in any ADCS attack — run find to discover CAs, templates, and ESC vulnerabilities before
          attempting exploitation. (2) After obtaining valid AD credentials (password, hash, or Kerberos ticket) — enumerate
          ADCS to check for certificate-based privilege escalation paths. (3) When bloodhound shows ADCS objects but you need
          detailed template vulnerability analysis (ESC classifications). (4) Before requesting certificates — identify which
          templates are vulnerable and which CA to target. (5) With -vulnerable flag to quickly filter for exploitable templates
          in large environments. (6) With -dc-only for stealthier enumeration that avoids touching non-DC hosts. (7) After
          exploiting other ESC vulnerabilities — re-run find to check if template modifications (ESC4) or CA changes (ESC7)
          were successful.
        required_ports:
        - 389
        params:
          username:
            type: string
            required: true
            description: Username in user@domain format (e.g., 'web@fries.htb'). The @domain suffix is required for certipy's
              LDAP operations.
          password:
            type: string
            description: Password for authentication.
          hashes:
            type: string
            description: NTLM hash for pass-the-hash (e.g., 'aad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0').
          kerberos:
            type: boolean
            default: false
            description: Use Kerberos authentication from ccache (KRB5CCNAME env). Requires valid TGT.
          aes_key:
            type: string
            description: AES key for Kerberos auth (128 or 256 bit hex).
          dc_ip:
            type: string
            required: true
            description: Domain Controller IP. Used for LDAP connection and as DNS nameserver.
          ns:
            type: string
            description: DNS nameserver IP override. Defaults to dc_ip.
          dns_tcp:
            type: boolean
            default: true
            description: Use TCP for DNS queries. Default true for Docker reliability.
          vulnerable:
            type: boolean
            default: false
            description: Only show vulnerable templates and CAs. Filters to ESC1-ESC16 findings.
          enabled:
            type: boolean
            default: false
            description: Only show enabled templates. Reduces noise.
          dc_only:
            type: boolean
            default: false
            description: DC-only collection — LDAP queries only, no host contact. Stealthier.
          stdout:
            type: boolean
            default: false
            description: Print text summary to console instead of file.
          user_sid:
            type: string
            description: User SID for accurate vulnerability assessment. Certipy checks enrollment permissions against this
              SID.
          timeout:
            type: integer
            default: 300
            description: Maximum execution time in seconds.
        returns:
          certificate_authorities:
            type: array
            description: 'Array of CA objects. Each has: name, dns_name, certificate_subject, web_enrollment (Enabled/Disabled),
              user_specified_san, vulnerabilities (array of ESC IDs like ''ESC6'', ''ESC8'').'
          certificate_templates:
            type: array
            description: 'Array of all template objects. Each has: name, display_name, enabled, client_authentication, enrollee_supplies_subject,
              requires_manager_approval, authorized_signatures_required, enrollment_permissions, vulnerabilities.'
          vulnerable_templates:
            type: array
            description: Subset of certificate_templates that have at least one ESC vulnerability. Each template includes
              vulnerabilities array with ESC classifications.
          vulnerable_count:
            type: integer
            description: Number of vulnerable templates found. Zero means no ADCS misconfigurations detected.
          ca_count:
            type: integer
            description: Total number of Certificate Authorities discovered.
          template_count:
            type: integer
            description: Total number of certificate templates discovered.
          output_files:
            type: array
            description: Paths to output files under /session/certipy/ (JSON and TXT).
          json_file:
            type: string
            description: Path to the JSON output file for programmatic analysis.
          text_file:
            type: string
            description: Path to the human-readable text summary.
      request:
        description: 'Request a certificate from a Certificate Authority — the core exploitation method for ESC1, ESC2, ESC3,
          ESC6, ESC7, ESC9, ESC10, ESC15, ESC16. Runs `certipy req -username <user@domain> -dc-ip <ip> -ca <ca_name> -template
          <template>` with optional SAN injection flags. For ESC1: use -upn to specify the target UPN (e.g., administrator@corp.local)
          to impersonate any user. For ESC3: use -on-behalf-of with an enrollment agent PFX. For ESC7: use -retrieve to fetch
          approved pending requests (approve via the ''ca'' method with issue_request). For ESC15 (EKUwu): use -application-policies
          with OIDs to override template EKU. Output is a PFX file containing the certificate and private key, saved to /session/certipy/
          with a unique prefix. If the request requires manager approval (ESC7 workflow), returns a request_id instead of
          a PFX — use the ''ca'' method with issue_request to approve, then use request -retrieve to fetch the certificate.'
        when_to_use: (1) After find identifies an ESC1-vulnerable template — request a certificate with -upn set to administrator@domain
          to impersonate domain admin. (2) For ESC3 enrollment agent abuse — first request an enrollment agent certificate,
          then use -pfx and -on-behalf-of to request on behalf of another user. (3) For ESC7 CA manager abuse — request with
          SubCA template (will fail with pending), note the request_id, then approve via ca method, then retrieve with -retrieve.
          (4) For ESC15 (EKUwu) — use -application-policies to inject Client Authentication OID into the CSR, overriding template
          EKU on v1 templates. (5) After successful request, pass the PFX to authenticate method for PKINIT auth. (6) With
          -web flag when only Web Enrollment is available. (7) With -sid flag when StrongCertificateBindingEnforcement=2 requires
          SID in the certificate.
        required_ports:
        - 389
        params:
          username:
            type: string
            required: true
            description: Username in user@domain format.
          password:
            type: string
            description: Password for authentication.
          hashes:
            type: string
            description: NTLM hash for pass-the-hash.
          kerberos:
            type: boolean
            default: false
            description: Use Kerberos auth from ccache.
          aes_key:
            type: string
            description: AES key for Kerberos.
          dc_ip:
            type: string
            required: true
            description: Domain Controller IP.
          ns:
            type: string
            description: DNS nameserver override.
          dns_tcp:
            type: boolean
            default: true
            description: TCP DNS queries.
          ca:
            type: string
            required: true
            description: Certificate Authority name (e.g., 'CORP-CA'). Get from find method's certificate_authorities[].name.
          template:
            type: string
            default: User
            description: 'Certificate template name (case-sensitive). Get from find method''s vulnerable_templates[].name.
              Common: ''User'', ''Machine'', ''WebServer'', ''SubCA''.'
          upn:
            type: string
            description: User Principal Name for SAN injection (ESC1). Set to target user (e.g., 'administrator@corp.local')
              to impersonate them.
          dns:
            type: string
            description: DNS hostname for SAN. For machine account impersonation (e.g., 'dc01.corp.local').
          sid:
            type: string
            description: Object SID for SAN. Needed when StrongCertificateBindingEnforcement=2.
          target:
            type: string
            description: CA server hostname or IP. Auto-resolved from LDAP if omitted.
          on_behalf_of:
            type: string
            description: 'Request on behalf of user (ESC3). Format: ''DOMAIN\user''. Requires enrollment agent PFX via pfx_path.'
          pfx_path:
            type: string
            description: PFX file for enrollment agent (ESC3) or renewal. Path under /session/.
          retrieve:
            type: integer
            description: Retrieve pending certificate by request ID (ESC7 workflow).
          key_size:
            type: integer
            default: 2048
            description: RSA key size in bits.
          web:
            type: boolean
            default: false
            description: Use Web Enrollment (HTTP) instead of RPC.
          application_policies:
            type: string
            description: Application policy OIDs for ESC15 exploitation. Comma-separated.
          timeout:
            type: integer
            default: 300
            description: Maximum execution time in seconds.
        returns:
          pfx_path:
            type: string
            description: Path to the output PFX file under /session/certipy/. Contains certificate + private key. Pass to
              authenticate method for PKINIT. Null if request is pending approval.
          request_id:
            type: integer
            description: Request ID for pending requests (ESC7 workflow). Use the 'ca' method with issue_request to approve,
              then use request -retrieve to fetch the issued certificate.
          ca:
            type: string
            description: CA name used.
          template:
            type: string
            description: Template name used.
          upn:
            type: string
            description: UPN injected into SAN, if specified.
          output_files:
            type: array
            description: All output file paths.
      authenticate:
        description: Authenticate using a PFX certificate via Kerberos PKINIT — obtains a Ticket Granting Ticket (TGT) and
          extracts the NT hash via User-to-User (U2U) authentication. Runs `certipy auth -pfx <file> -dc-ip <ip>`. The NT
          hash is extracted from the PAC in the TGT and can be used for pass-the-hash with impacket, netexec, or other tools.
          The TGT is saved as a ccache file (default) or kirbi file (-kirbi flag). The ccache file can be used with KRB5CCNAME
          env for Kerberos-based tools. This method does NOT require additional credentials — the PFX certificate is the authentication
          material.
        when_to_use: (1) After requesting a certificate via the request method — authenticate with the PFX to get a TGT and
          NT hash. (2) After forging a Golden Certificate — authenticate to prove the forged cert works and extract the target's
          NT hash. (3) After shadow credentials auto mode produces a PFX — authenticate to verify the shadow credential attack
          succeeded. (4) The NT hash output is the primary value — use it with impacket secretsdump, netexec, or pass-the-hash
          attacks. (5) The ccache output enables Kerberos-only authentication with tools that support KRB5CCNAME. (6) Use
          -kirbi flag when the output will be used with Windows tools (Rubeus, Mimikatz).
        required_ports:
        - 88
        params:
          pfx_path:
            type: string
            required: true
            description: Path to PFX certificate file (e.g., '/session/certipy/administrator.pfx'). Obtained from request,
              forge, or shadow methods.
          pfx_password:
            type: string
            description: PFX file password. Usually empty for certipy-generated files.
          dc_ip:
            type: string
            required: true
            description: Domain Controller IP for PKINIT authentication.
          domain:
            type: string
            description: Domain name override. Usually auto-extracted from certificate.
          kirbi:
            type: boolean
            default: false
            description: Save TGT as .kirbi (Windows format) instead of .ccache (Linux format).
          no_hash:
            type: boolean
            default: false
            description: Skip NT hash extraction via U2U. Only obtain TGT.
          ldap_shell:
            type: boolean
            default: false
            description: Start LDAP shell after auth. NOT recommended for MCP (interactive).
          timeout:
            type: integer
            default: 120
            description: Maximum execution time in seconds.
        returns:
          nt_hash:
            type: string
            description: NT hash in LM:NT format (e.g., 'aad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0'). Use with impacket
              -hashes, netexec -H, or hashcat mode 1000.
          ccache_path:
            type: string
            description: Path to Kerberos ccache file. Set KRB5CCNAME to this path for Kerberos auth with other tools.
          kirbi_path:
            type: string
            description: Path to Kirbi ticket file (if -kirbi flag used).
          username:
            type: string
            description: Authenticated username extracted from certificate.
          domain:
            type: string
            description: Domain name.
          output_files:
            type: array
            description: All output file paths.
      shadow:
        description: 'Shadow Credentials attack — adds a key credential to a target account''s msDS-KeyCredentialLink attribute,
          authenticates with the resulting certificate, and extracts the NT hash. Runs `certipy shadow <action> -username
          <user@domain> -dc-ip <ip> -account <target>`. The ''auto'' action performs the full attack chain: (1) adds key credential,
          (2) authenticates via PKINIT, (3) extracts NT hash, (4) removes the key credential. The attacker must have write
          access to the target''s msDS-KeyCredentialLink attribute (check with bloodhound: GenericAll, GenericWrite, WriteProperty
          on msDS-KeyCredentialLink). Actions: ''auto'' (full chain), ''list'' (enumerate existing), ''add'' (add only), ''remove''
          (remove by device ID), ''clear'' (remove all), ''info'' (details of specific key).'
        when_to_use: (1) When bloodhound shows GenericAll/GenericWrite/WriteProperty over a target account — use shadow auto
          to get the target's NT hash without knowing their password. (2) For lateral movement — compromise a user with write
          access to a higher-privilege account's msDS-KeyCredentialLink. (3) Use 'auto' for the full attack (add → auth →
          hash → cleanup). (4) Use 'list' to check existing key credentials before attacking (avoid disrupting legitimate
          key credentials). (5) Use 'add' + separate 'authenticate' for more control over each step. (6) Use 'clear' with
          caution — removes ALL key credentials, may break Windows Hello for Business. (7) Requires the domain to have a CA
          for PKINIT — if no CA exists, shadow credentials won't work.
        required_ports:
        - 389
        - 88
        params:
          username:
            type: string
            required: true
            description: Attacker username in user@domain format. Must have write access to target's msDS-KeyCredentialLink.
          password:
            type: string
            description: Attacker password.
          hashes:
            type: string
            description: NTLM hash for pass-the-hash.
          kerberos:
            type: boolean
            default: false
            description: Kerberos auth from ccache.
          aes_key:
            type: string
            description: AES key for Kerberos.
          dc_ip:
            type: string
            required: true
            description: Domain Controller IP.
          ns:
            type: string
            description: DNS nameserver override.
          dns_tcp:
            type: boolean
            default: true
            description: TCP DNS queries.
          account:
            type: string
            required: true
            description: Target account SAM name (e.g., 'administrator', 'DC01$'). Must have write access via GenericAll/GenericWrite/WriteProperty.
          action:
            type: enum
            values:
            - auto
            - list
            - add
            - remove
            - clear
            - info
            default: auto
            description: '''auto'' = full chain (add→auth→hash→remove). ''list'' = show key credentials. ''add'' = add only.
              ''remove'' = remove by device_id. ''clear'' = remove all. ''info'' = show details.'
          device_id:
            type: string
            description: Device ID UUID for 'remove'/'info' actions. Get from 'list' action.
          timeout:
            type: integer
            default: 300
            description: Maximum execution time in seconds.
        returns:
          nt_hash:
            type: string
            description: Target account's NT hash (from auto action). Use for pass-the-hash.
          pfx_path:
            type: string
            description: PFX file path (from auto/add actions). Can be used with authenticate method separately.
          device_id:
            type: string
            description: Device ID of the added key credential (from add action). Use with remove action for cleanup.
          key_credentials:
            type: array
            description: List of existing key credentials (from list action). Each has device_id and owner.
          output_files:
            type: array
            description: All output file paths.
      forge:
        description: 'Forge certificates using a compromised CA private key — creates Golden Certificates for persistent domain
          access (ESC5). Runs `certipy forge -ca-pfx <ca_file> -upn <target@domain>`. Given the CA''s certificate and private
          key (obtained from a compromised CA server via certipy''s ca subcommand or other means, or from ESC5 exploitation),
          forges arbitrary certificates that the CA''s chain will trust. Note: the ca subcommand is not wrapped as an MCP
          method — extract the CA private key via bash if needed. Forged certificates can impersonate any user or computer
          in the domain. Use with authenticate method to obtain TGTs and NT hashes. This is the AD CS equivalent of a Golden
          Ticket — persists until the CA certificate expires or is revoked. Output is a PFX file saved to /session/certipy/.'
        when_to_use: (1) After compromising a CA server and extracting its certificate + private key — forge certificates
          for any domain user/computer. (2) For persistent access — Golden Certificates survive password resets (unlike Golden
          Tickets which need krbtgt hash). (3) After ESC5 exploitation where CA object ACLs allow extracting the CA private
          key. (4) Combine with -crl for a more realistic certificate that includes a CRL distribution point. (5) Use -sid
          when StrongCertificateBindingEnforcement=2 requires SID in the certificate. (6) After forging, use authenticate
          method to obtain TGT + NT hash from the forged certificate.
        required_ports: []
        params:
          ca_pfx:
            type: string
            required: true
            description: Path to CA certificate + private key PFX file (e.g., '/session/certipy/CORP-CA.pfx'). Obtained from
              a compromised CA server (via certipy ca subcommand in bash) or ESC5 exploitation.
          ca_password:
            type: string
            description: Password for the CA PFX file.
          upn:
            type: string
            description: UPN for forged cert (e.g., 'administrator@corp.local'). Primary way to impersonate users.
          dns:
            type: string
            description: DNS hostname for machine impersonation (e.g., 'dc01.corp.local').
          sid:
            type: string
            description: Object SID for certificate. Required for StrongCertificateBindingEnforcement=2.
          subject:
            type: string
            description: Certificate subject DN.
          crl:
            type: string
            description: CRL distribution point URL (e.g., 'ldap:///'). Makes certificate look legitimate.
          serial:
            type: string
            description: Custom serial number.
          key_size:
            type: integer
            default: 2048
            description: RSA key size.
          validity_period:
            type: integer
            default: 365
            description: Certificate validity in days.
          timeout:
            type: integer
            default: 120
            description: Maximum execution time in seconds.
        returns:
          pfx_path:
            type: string
            description: Path to forged PFX file. Pass to authenticate method for PKINIT.
          upn:
            type: string
            description: UPN embedded in the forged certificate.
          dns:
            type: string
            description: DNS hostname embedded.
          validity_days:
            type: integer
            description: Validity period in days.
          output_files:
            type: array
            description: All output file paths.
      template:
        description: 'View or modify Active Directory certificate template configurations. Runs `certipy template -username
          <user@domain> -dc-ip <ip> -template <name>` with action-specific flags. Actions: ''read'' displays current template
          properties (default). ''save_config'' saves the template''s current configuration to a JSON file for backup before
          exploitation. ''write_default'' overwrites the template with an ESC1-vulnerable default configuration (enables enrollee-supplied
          subject, client authentication EKU, low-privilege enrollment — used for ESC4 exploitation). ''write_config'' restores
          a template from a previously saved JSON file. The -force flag is automatically added for write operations to skip
          certipy''s confirmation prompt. IMPORTANT: Always save_config before write_default so the template can be restored
          after exploitation to avoid detection.'
        when_to_use: '(1) ESC4 exploitation — when bloodhound/find shows write access to a template: save_config (backup)
          → write_default (make vulnerable) → request cert via request method → write_config (restore). (2) Before any template
          modification — save_config to create a backup JSON for later restoration. (3) To inspect template properties — use
          read action to see enrollment permissions, EKU settings, SAN configuration. (4) After exploitation — write_config
          with the saved JSON to restore original template settings and reduce detection footprint. (5) The read action is
          useful for verifying that write_default or write_config changes were applied correctly.'
        required_ports:
        - 389
        params:
          username:
            type: string
            required: true
            description: Username in user@domain format. Must have write access to template for modification actions.
          password:
            type: string
            description: Password.
          hashes:
            type: string
            description: NTLM hash for pass-the-hash.
          kerberos:
            type: boolean
            default: false
            description: Kerberos auth.
          aes_key:
            type: string
            description: AES key.
          dc_ip:
            type: string
            required: true
            description: Domain Controller IP.
          ns:
            type: string
            description: DNS nameserver override.
          dns_tcp:
            type: boolean
            default: true
            description: TCP DNS queries.
          template:
            type: string
            required: true
            description: Template name (case-sensitive). Get from find method.
          action:
            type: enum
            values:
            - read
            - save_config
            - write_default
            - write_config
            default: read
            description: '''read'' = display properties. ''save_config'' = save to JSON. ''write_default'' = overwrite with
              ESC1-vulnerable config (ESC4). ''write_config'' = restore from JSON.'
          config_path:
            type: string
            description: JSON config file path for write_config action. Must be under /session/.
          timeout:
            type: integer
            default: 300
            description: Maximum execution time.
        returns:
          template:
            type: string
            description: Template name operated on.
          action:
            type: string
            description: Action performed.
          config:
            type: object
            description: Template configuration (from save_config action). JSON object with all template properties.
          config_path:
            type: string
            description: Path to saved configuration JSON file.
          output_files:
            type: array
            description: All output file paths.
      ca:
        description: 'Manage Certificate Authority operations — enable/disable certificate templates, approve/deny pending
          certificate requests. Core method for ESC7 exploitation when you have ManageCA rights on a CA. Runs `certipy ca
          -username <user@domain> -dc-ip <ip> -ca <ca_name>` with action flags. Use in the ESC7 workflow: find (identify ManageCA)
          → ca (enable SubCA template) → request (request SubCA cert, gets pending) → ca (issue/approve the request) → request
          -retrieve (fetch issued cert) → authenticate (get TGT + NT hash).'
        when_to_use: 'ESC7 exploitation: when you have ManageCA rights on a CA, use this to enable the SubCA template, then
          request a certificate, then approve your own request. Workflow: find → ca (enable SubCA) → request (SubCA cert,
          gets request_id) → ca (issue-request with request_id) → request (retrieve with request_id) → authenticate. Also
          useful to disable templates after exploitation for cleanup.'
        required_ports:
        - 389
        params:
          username:
            type: string
            required: true
            description: Username in user@domain format.
          password:
            type: string
            description: Password for authentication.
          hashes:
            type: string
            description: NTLM hash for pass-the-hash.
          kerberos:
            type: boolean
            default: false
            description: Use Kerberos auth from ccache.
          aes_key:
            type: string
            description: AES key for Kerberos.
          dc_ip:
            type: string
            required: true
            description: Domain Controller IP.
          ns:
            type: string
            description: DNS nameserver override.
          dns_tcp:
            type: boolean
            default: true
            description: TCP DNS queries.
          ca_name:
            type: string
            required: true
            description: Certificate Authority name (e.g., 'pirate-DC01-CA'). Get from find method's certificate_authorities[].name.
          enable_template:
            type: string
            description: Template name to enable on the CA (e.g., 'SubCA' for ESC7).
          disable_template:
            type: string
            description: Template name to disable on the CA.
          issue_request:
            type: integer
            description: Request ID to approve/issue. Get from request method's request_id output.
          deny_request:
            type: integer
            description: Request ID to deny.
          timeout:
            type: integer
            default: 300
            description: Maximum execution time in seconds.
        returns:
          ca_name:
            type: string
            description: CA name operated on.
          action:
            type: string
            description: Action performed (enable template, disable template, issue request, deny request).
          enable_template:
            type: string
            description: Template that was enabled (if applicable).
          disable_template:
            type: string
            description: Template that was disabled (if applicable).
          issue_request:
            type: integer
            description: Request ID that was approved (if applicable).
          deny_request:
            type: integer
            description: Request ID that was denied (if applicable).
  chisel:
    name: chisel
    version: 1.11.4
    description: 'HTTP-based tunneling and SOCKS proxy via Chisel v1.11.4 (jpillora/chisel). Six methods: server (start chisel
      listener), client_forward (forward tunnel — access server-side services locally), client_reverse (reverse tunnel — expose
      client-side services on server), client_socks (SOCKS5 proxy through server''s network), list (show active tunnels),
      close (terminate a process). Tunnels over HTTP/WebSocket with mandatory SSH encryption, traverses proxies and firewalls
      that block raw SSH. Single Go binary, no dependencies. Server and client run as long-lived background processes tracked
      in-memory by PID. Supports authentication (--auth user:pass), TLS, server fingerprint verification, and backend HTTP
      proxying to hide chisel behind legitimate web servers. Client auto-reconnects with exponential backoff (100ms to 5min).
      For SSH-based tunneling when SSH is available, use the tunnel tool instead — chisel is for when SSH ports are blocked
      but HTTP/HTTPS is open.'
    image: ghcr.io/silicon-works/mcp-tools-chisel:latest
    image_size_mb: 195
    timeout_seconds: 600
    service: true
    service_name: chisel
    capabilities:
    - http_tunneling
    - port_forwarding
    - reverse_tunneling
    - socks_proxy
    - pivoting
    - tunnel_management
    routing:
      use_for:
      - create HTTP-based tunnel when SSH port is blocked but HTTP/HTTPS is open
      - set up forward port forwarding through chisel to access internal services
      - create reverse tunnel to expose a compromised host's service on the attacker machine
      - establish SOCKS5 proxy through chisel for pivoting into internal networks via HTTP
      - tunnel through web proxies and firewalls that only allow HTTP/HTTPS traffic
      - set up a chisel server with --reverse to receive reverse shells tunneled over HTTP
      - access localhost-only services on a remote host by forwarding ports through chisel
      - create an HTTP tunnel that looks like normal web traffic to evade network detection
      - pivot through a compromised host to reach internal network segments via HTTP tunnel
      - hide chisel traffic behind a legitimate website using --backend reverse proxy
      never_use_for:
      - SSH tunneling when SSH is available (use tunnel — SSH is simpler and doesn't need a server component)
      - port scanning through a tunnel (use nmap with proxychains after establishing SOCKS)
      - file transfer (use ssh copy_to/copy_from or curl)
      - reverse shell listeners (use netcat — chisel is for tunneling, not shell handling)
      - IPsec VPN connections (use ike-scan for VPN discovery) — chisel is per-port tunneling, not full network VPN
      triggers:
      - chisel
      - HTTP tunnel
      - HTTPS tunnel
      - WebSocket tunnel
      - reverse tunnel HTTP
      - SOCKS over HTTP
      - firewall bypass tunnel
      - pivot HTTP
      - chisel server
      - chisel client
    phases:
    - post-exploitation
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 128
      cpu: 0.25
    see_also:
    - tool: tunnel
      reason: Use SSH-based tunneling (ssh -L, ssh -D) when SSH is available — simpler and doesn't require running a server
        component
    - tool: netcat
      reason: Use for raw reverse shell listeners, then tunnel the shell through chisel if needed
    - tool: nmap
      reason: After establishing a chisel SOCKS proxy, use nmap with proxychains to scan internal networks
    methods:
      server:
        description: Start a chisel server that listens for client connections over HTTP/WebSocket. Runs `chisel server --host
          <host> --port <port>` as a background process. The server accepts chisel client connections and multiplexes SSH-encrypted
          tunnels over the HTTP transport. By default enables --reverse (allow reverse tunnels) and --socks5 (allow SOCKS
          proxy) for maximum flexibility. Optional --auth enforces username:password authentication. Optional --backend proxies
          non-chisel HTTP requests to a real web server, making the chisel server appear as a normal website. The server prints
          its SSH fingerprint on startup — share this with clients for MITM detection. Runs indefinitely until closed via
          the close method.
        when_to_use: (1) First step before any chisel client connection — start the server on the attacker machine. (2) With
          --reverse enabled to receive reverse tunnels from compromised hosts. (3) With --socks5 to allow clients to create
          SOCKS proxies for pivoting. (4) With --backend to hide chisel behind a legitimate website on an engagement. (5)
          With --auth when multiple operators share the same chisel server. (6) On a VPS or redirector that has HTTP/HTTPS
          open when the target network blocks SSH.
        required_ports: []
        params:
          port:
            type: integer
            default: 8080
            description: HTTP listening port. Use 80 or 443 to blend with normal web traffic.
          host:
            type: string
            default: 0.0.0.0
            description: 'Network interface to bind to. Default: all interfaces.'
          reverse:
            type: boolean
            default: true
            description: 'Allow clients to use reverse port forwarding (R: prefix remotes).'
          socks5:
            type: boolean
            default: true
            description: Enable internal SOCKS5 proxy for clients.
          auth:
            type: string
            description: Authentication in 'user:pass' format. Clients must match.
          backend:
            type: string
            description: URL to proxy non-chisel requests to (e.g., 'http://example.com'). Hides chisel behind a real website.
          verbose:
            type: boolean
            default: false
            description: Enable verbose logging.
        returns:
          id:
            type: string
            description: Server process ID for list and close.
          port:
            type: integer
            description: Port the server is listening on.
          fingerprint:
            type: string
            description: SSH public key fingerprint (base64 SHA256). Share with clients for --fingerprint verification.
          status:
            type: string
            description: Process status (running/exited).
      client_forward:
        description: 'Create a forward tunnel — the chisel client listens on a local port and forwards traffic through the
          chisel server to a remote host:port. Runs `chisel client <server_url> <local_port>:<remote_host>:<remote_port>`
          as a background process. Traffic flow: local_port → chisel client → HTTP/WebSocket → chisel server → remote_host:remote_port.
          The remote_host is resolved from the server''s network perspective, so ''127.0.0.1'' means the server''s localhost
          and internal IPs are reachable if the server can reach them. Auto-assigns local_port if set to 0. Client auto-reconnects
          with exponential backoff on disconnection. Note: chisel''s --proxy flag (route client traffic through an HTTP CONNECT
          proxy to reach the chisel server) is not exposed — use bash for proxy-chained scenarios.'
        when_to_use: (1) To access a service on the chisel server's localhost (e.g., MySQL 3306, web app 8080) from the attacker
          machine. (2) To reach internal network services that the chisel server can access but the attacker cannot directly.
          (3) When SSH port forwarding is blocked but HTTP is open. (4) After running 'server' method — connect a forward
          tunnel to it. (5) Use local_port=0 for auto-assignment when the specific port doesn't matter.
        required_ports: []
        params:
          server_url:
            type: string
            required: true
            description: Chisel server URL (e.g., 'http://10.10.16.24:8080'). Must be a running chisel server.
          local_port:
            type: integer
            default: 0
            description: Local port to listen on (0 = auto-assign).
          remote_host:
            type: string
            default: 127.0.0.1
            description: Remote host from server's perspective. '127.0.0.1' = server localhost. Set to internal IP for pivoting.
          remote_port:
            type: integer
            required: true
            description: Remote port to forward to.
          auth:
            type: string
            description: Auth 'user:pass' matching server.
          fingerprint:
            type: string
            description: Server fingerprint for MITM verification.
          max_retry_count:
            type: integer
            default: 3
            description: Max reconnection attempts. Chisel's default is unlimited retries, but this is capped to 3 to prevent
              infinite hangs in MCP context. Set to 0 for unlimited.
          verbose:
            type: boolean
            default: false
            description: Verbose logging.
        returns:
          id:
            type: string
            description: Tunnel ID for list and close.
          local_port:
            type: integer
            description: Local port the tunnel listens on.
          connect_to:
            type: string
            description: Address to connect to (e.g., '127.0.0.1:9999').
          mapping:
            type: string
            description: Chisel remote spec (e.g., '9999:127.0.0.1:3306').
      client_reverse:
        description: 'Create a reverse tunnel — the chisel SERVER listens on a port and forwards incoming traffic through
          the tunnel to the CLIENT''s local service. Runs `chisel client <server_url> R:<remote_port>:<local_host>:<local_port>`
          as a background process. Traffic flow: server:remote_port → HTTP/WebSocket → chisel client → local_host:local_port.
          The chisel server must have --reverse enabled. Useful for exposing a compromised host''s local service back to the
          attacker through HTTP. Note: chisel''s --proxy flag (route client traffic through an HTTP CONNECT proxy to reach
          the chisel server) is not exposed — use bash for proxy-chained scenarios.'
        when_to_use: (1) To expose a service running on the compromised host (e.g., a reverse shell listener) back to the
          attacker via the chisel server. (2) When the compromised host can reach the chisel server over HTTP but the attacker
          can't reach the compromised host directly. (3) For callback channels that traverse firewalls — outbound HTTP from
          target → chisel server → reverse tunnel back to target's local service. (4) Use with R:2222:localhost:22 to get
          SSH access to a host that only has outbound HTTP.
        required_ports: []
        params:
          server_url:
            type: string
            required: true
            description: Chisel server URL. Server must have --reverse enabled.
          remote_port:
            type: integer
            required: true
            description: Port the SERVER will listen on. Incoming connections here are tunneled to the client.
          local_host:
            type: string
            default: 127.0.0.1
            description: 'Local host to forward to (client-side). Default: client''s localhost.'
          local_port:
            type: integer
            required: true
            description: Local port on the client side. Traffic from server:remote_port reaches this port.
          auth:
            type: string
            description: Auth 'user:pass' matching server.
          fingerprint:
            type: string
            description: Server fingerprint.
          max_retry_count:
            type: integer
            default: 3
            description: Max reconnection attempts. Chisel's default is unlimited retries, but this is capped to 3 to prevent
              infinite hangs in MCP context. Set to 0 for unlimited.
          verbose:
            type: boolean
            default: false
            description: Verbose logging.
        returns:
          id:
            type: string
            description: Tunnel ID.
          remote_port:
            type: integer
            description: Port the server is listening on.
          server_listens_on:
            type: string
            description: Server-side listener address (e.g., '0.0.0.0:2222').
          mapping:
            type: string
            description: Chisel remote spec (e.g., 'R:2222:127.0.0.1:22').
      client_socks:
        description: 'Create a SOCKS5 proxy through a chisel server — all traffic sent through the local SOCKS port is tunneled
          over HTTP to the chisel server and exits from the server''s network. Runs `chisel client <server_url> <socks_port>:socks`
          as a background process. The chisel server must have --socks5 enabled. Use the returned proxy_url with proxychains
          or tool-specific SOCKS settings to route traffic through the server''s network. Enables full network pivoting —
          any tool that supports SOCKS5 can reach any host the chisel server can reach. Note: chisel''s --proxy flag (route
          client traffic through an HTTP CONNECT proxy to reach the chisel server) is not exposed — use bash for proxy-chained
          scenarios.'
        when_to_use: (1) When you need to reach multiple services on an internal network through a compromised host over HTTP.
          (2) Instead of creating individual forward tunnels — one SOCKS proxy handles all destinations. (3) For network scanning
          through the tunnel — set up SOCKS then use nmap with proxychains. (4) When SSH is blocked but HTTP is open and you
          need SOCKS-style pivoting. (5) Default port 1080 — configure proxychains to use socks5://127.0.0.1:1080.
        required_ports: []
        params:
          server_url:
            type: string
            required: true
            description: Chisel server URL. Server must have --socks5 enabled.
          socks_port:
            type: integer
            default: 1080
            description: Local port for the SOCKS5 proxy.
          auth:
            type: string
            description: Auth 'user:pass' matching server.
          fingerprint:
            type: string
            description: Server fingerprint.
          max_retry_count:
            type: integer
            default: 3
            description: Max reconnection attempts. Chisel's default is unlimited retries, but this is capped to 3 to prevent
              infinite hangs in MCP context. Set to 0 for unlimited.
          verbose:
            type: boolean
            default: false
            description: Verbose logging.
        returns:
          id:
            type: string
            description: Tunnel ID.
          socks_port:
            type: integer
            description: Local SOCKS5 proxy port.
          proxy_url:
            type: string
            description: SOCKS5 proxy URL (e.g., 'socks5://127.0.0.1:1080'). Use in proxychains or tool configs.
      list:
        description: List all active chisel servers and client tunnels with their type, ports, mappings, and process status.
          Automatically prunes dead processes from the tracking list.
        when_to_use: To check which chisel processes are running, verify tunnel status, find local ports or process IDs.
        required_ports: []
        params: {}
        returns:
          processes:
            type: array
            description: 'Array of active process objects. Each has: id, type (server/forward/reverse/socks), ports, mappings,
              status.'
          count:
            type: integer
            description: Number of active processes.
      close:
        description: Close a specific chisel server or client tunnel by its process ID. Sends SIGTERM then SIGKILL after 5
          seconds if needed. Frees the ports used by the process.
        when_to_use: When a specific tunnel or server is no longer needed. Free ports for reuse.
        required_ports: []
        params:
          id:
            type: string
            required: true
            description: Process ID to close (from list output, e.g., 'server-1', 'fwd-2').
        returns:
          id:
            type: string
            description: ID of the closed process.
          type:
            type: string
            description: Type of the closed process (server/forward/reverse/socks).
          status:
            type: string
            description: Always 'closed'.
  curl:
    name: curl
    version: '8.18'
    description: 'HTTP client (curl 8.18.0 with HTTP/2, HTTP/3, NTLM, Kerberos support) wrapped in 5 specialized methods:
      request (any HTTP method with timing/debug), inject (RCE payload delivery with {PAYLOAD} placeholder and auto-encoding),
      upload (multipart file upload for web shells), download (small files as base64), and download_to_file (large files with
      auto .gz decompression). Returns structured response data: status code, parsed headers, body (50KB cap), timing breakdown
      (DNS/connect/TLS/TTFB/total), and error classification. Default User-Agent mimics Chrome on Windows. For login forms
      and JS pages, use playwright-mcp instead.'
    image: ghcr.io/silicon-works/mcp-tools-curl:latest
    image_size_mb: 100
    timeout_seconds: 60
    capabilities:
    - http_requests
    - file_download
    - exploit_testing
    - api_interaction
    see_also:
    - playwright-mcp
    - ffuf
    - zap
    routing:
      use_for:
      - make a single HTTP request to test an endpoint or check headers
      - deliver exploit payloads to web RCE endpoints with auto-encoding
      - upload web shells or malicious files via multipart form
      - download wordlists or exploit scripts to session directory
      - interact with a deployed web shell via command injection
      - check server response headers for version fingerprinting
      - send POST data to test for SQL injection or command injection
      - download files from target (configs SSH keys databases)
      - API request with authentication cookies or bearer tokens
      never_use_for:
      - directory brute-forcing
      - web fuzzing
      - automated scanning
      - login form filling
      - JavaScript rendered pages
      - pages that return empty bodies
      triggers:
      - download wordlist
      - get rockyou
      - fetch wordlist
      - download to session
      - api request
      - exploit payload
      prefer_over: []
    warnings:
    - Returns raw HTTP response - does NOT execute JavaScript
    - If response body is empty, the page likely requires JavaScript - use playwright-mcp instead
    - For login forms, playwright-mcp is usually better (handles cookies, CSRF, JS validation)
    - Cannot see rendered page content - use playwright-mcp browser_snapshot for that
    phases:
    - reconnaissance
    - enumeration
    - exploitation
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 128
      cpu: 0.25
    methods:
      request:
        description: Make an HTTP request with any method (GET/POST/PUT/DELETE/HEAD/OPTIONS/PATCH). Uses curl -s -S -i under
          the hood with response header parsing, redirect following (up to 10), and structured timing breakdown. Returns parsed
          status code, response headers as dict, body text (capped at 50KB), and timing (DNS lookup, TCP connect, TLS handshake,
          TTFB, total in ms, remote IP/port). Supports cookies, basic auth, custom headers, SSL bypass, and 4 debug levels.
          Body is NOT returned as base64 by default — use raw_response=true for binary content.
        when_to_use: 'For any single HTTP request: testing an endpoint, checking response headers, verifying a vulnerability,
          sending API calls, or confirming exploit success. Common pentest uses: (1) Check server headers for version info
          (HEAD request), (2) Test for open redirects or SSRF by checking redirect chains, (3) Send POST data to test for
          injection, (4) Verify web shell was uploaded by requesting it, (5) Interact with REST APIs. Use inject method instead
          when you need automatic payload encoding for RCE. Use playwright-mcp for JavaScript-rendered pages or when response
          body is empty.'
        params:
          url:
            type: string
            required: true
            description: Target URL
          method:
            type: enum
            values:
            - GET
            - POST
            - PUT
            - DELETE
            - HEAD
            - OPTIONS
            - PATCH
            default: GET
            description: HTTP method
          headers:
            type:
            - object
            - array
            description: 'Custom headers as key-value pairs (object) or array of ''Header: value'' strings'
          data:
            type: string
            description: Request body data
          body:
            type: string
            description: Request body data (alias for 'data')
          follow_redirects:
            type: boolean
            default: true
            description: Follow HTTP redirects
          timeout:
            type: integer
            default: 30
            description: Request timeout in seconds
          connect_timeout:
            type: integer
            default: 10
            description: Connection timeout in seconds
          insecure:
            type: boolean
            default: false
            description: Skip SSL certificate verification
          user_agent:
            type: string
            description: Custom User-Agent header
          cookie:
            type: string
            description: Cookie header value
          auth:
            type: string
            description: Basic auth in user:password format
          debug_level:
            type: integer
            enum:
            - 0
            - 1
            - 2
            - 3
            default: 0
            description: 'Debug level: 0=none, 1=request headers, 2=verbose output, 3=full trace'
          raw_response:
            type: boolean
            default: false
            description: Return raw binary response as base64 (for binary downloads)
        returns:
          status_code:
            type: integer
            description: HTTP response status code
          headers:
            type: object
            description: Response headers
          body:
            type: string
            description: Response body
          body_length:
            type: integer
            description: Length of response body in bytes
          timing:
            type: object
            description: Request timing breakdown
            properties:
              dns_lookup_ms:
                type: integer
                description: DNS lookup time in milliseconds
              connect_ms:
                type: integer
                description: TCP connection time in milliseconds
              tls_handshake_ms:
                type: integer
                description: TLS handshake time in milliseconds
              first_byte_ms:
                type: integer
                description: Time to first byte in milliseconds
              total_ms:
                type: integer
                description: Total request time in milliseconds
              remote_ip:
                type: string
                description: IP address of the remote server
              remote_port:
                type: integer
                description: Port of the remote server
          debug:
            type: object
            description: Debug information (when debug_level >= 1)
            properties:
              request_headers:
                type: object
                description: Headers sent in the request
              verbose_output:
                type: string
                description: Full verbose output (debug_level >= 2)
          error:
            type: object
            description: Error details (on failure)
            properties:
              type:
                type: string
                description: Error type (e.g., 'connection_refused', 'timeout', 'could_not_resolve_host')
              message:
                type: string
                description: Human-readable error message
              curl_exit_code:
                type: integer
                description: Curl exit code
      download:
        description: Download a file from a URL and return contents as base64-encoded string. Uses curl -s -S -L (follows
          redirects). Filename extracted from URL path. For large files (>10MB), use download_to_file instead — this method
          loads the entire file into memory and base64-encodes it.
        when_to_use: 'For downloading small files (<10MB) that you need to inspect or process: exploit scripts, configuration
          files, SSH keys, small binaries. The base64 content can be decoded and written to disk. For wordlists, large binaries,
          or files >10MB, use download_to_file instead (writes directly to disk).'
        params:
          url:
            type: string
            required: true
            description: URL to download from
          timeout:
            type: integer
            default: 120
            description: Download timeout in seconds
          insecure:
            type: boolean
            default: false
            description: Skip SSL certificate verification
        returns:
          filename:
            type: string
            description: Extracted filename
          size_bytes:
            type: integer
            description: File size in bytes
          content_base64:
            type: string
            description: File contents as base64
      download_to_file:
        description: Download a large file directly to a filesystem path using curl -o (no memory buffering). Follows redirects,
          shows progress bar. Auto-decompresses .gz files when decompress=true (default). Creates parent directories automatically.
          For text files (.txt), counts lines after download. 10-minute default timeout for large files.
        when_to_use: 'For downloading wordlists, large exploit tools, or binaries directly to disk. Common workflow: (1) Use
          web_search to find a wordlist URL (e.g., rockyou.txt, SecLists), (2) download_to_file to save to /session/wordlists/.
          Example: url=''https://github.com/.../rockyou.txt.gz'', output_path=''/session/wordlists/rockyou.txt'' (auto-decompresses
          .gz). Also useful for downloading large exploit scripts or toolkits that need to be saved locally before execution.'
        params:
          url:
            type: string
            required: true
            description: URL to download from
          output_path:
            type: string
            required: true
            description: Path to save file (e.g., /session/wordlists/rockyou.txt)
          timeout:
            type: integer
            default: 600
            description: Download timeout in seconds (default 10 minutes for large files)
          insecure:
            type: boolean
            default: false
            description: Skip SSL certificate verification
          decompress:
            type: boolean
            default: true
            description: Auto-decompress .gz files after download
        returns:
          output_path:
            type: string
            description: Path where file was saved
          size_bytes:
            type: integer
            description: File size in bytes
          size_mb:
            type: number
            description: File size in MB
          line_count:
            type: integer
            description: Number of lines (for text files)
          decompressed:
            type: boolean
            description: Whether file was decompressed
      inject:
        description: Send a command to a web RCE endpoint via {PAYLOAD} placeholder substitution with automatic encoding (URL,
          double-URL, base64, or none). Replaces {PAYLOAD} in both URL and POST body with the encoded command. Extracts command
          output from the response using optional start/end markers, strips HTML tags by default. Built on the request method
          — inherits timing, error handling, and redirect following.
        when_to_use: 'For exploiting confirmed web RCE vulnerabilities — command injection, PHP code injection, template injection,
          etc. Typical workflow: (1) Confirm RCE via request method with manual payload, (2) Switch to inject for repeated
          command execution with auto-encoding. The {PAYLOAD} placeholder goes in the URL for GET-based injection (e.g., url=''http://target/vuln.php?cmd={PAYLOAD}'')
          or in the POST body (data=''cmd={PAYLOAD}''). Use output_markers to extract clean output from noisy HTML responses.
          Use encoding=''double-url'' for WAF bypass, ''base64'' for payloads with special characters.'
        params:
          url:
            type: string
            required: true
            description: Target URL (use {PAYLOAD} as placeholder for command)
          command:
            type: string
            required: true
            description: Command to execute
          method:
            type: enum
            values:
            - GET
            - POST
            default: GET
            description: HTTP method
          encoding:
            type: enum
            values:
            - url
            - double-url
            - base64
            - none
            default: url
            description: Payload encoding method
          output_markers:
            type: object
            description: 'Start/end markers to extract output: {start: str, end: str}'
          strip_html:
            type: boolean
            default: true
            description: Strip HTML tags from output
          headers:
            type:
            - object
            - array
            description: 'Custom headers as key-value pairs (object) or array of ''Header: value'' strings'
          data:
            type: string
            description: POST body (use {PAYLOAD} as placeholder)
          body:
            type: string
            description: POST body (alias for 'data', use {PAYLOAD} as placeholder)
          cookie:
            type: string
            description: Cookie header value
          timeout:
            type: integer
            default: 30
            description: Request timeout in seconds
          connect_timeout:
            type: integer
            default: 10
            description: Connection timeout in seconds
          insecure:
            type: boolean
            default: false
            description: Skip SSL certificate verification
          debug_level:
            type: integer
            enum:
            - 0
            - 1
            - 2
            - 3
            default: 0
            description: 'Debug level: 0=none, 1=request headers, 2=verbose output, 3=full trace'
        returns:
          output:
            type: string
            description: Extracted command output
          status_code:
            type: integer
            description: HTTP response status code
          raw_body_length:
            type: integer
            description: Length of raw response body
          timing:
            type: object
            description: Request timing breakdown (same as request method)
          debug:
            type: object
            description: Debug information (when debug_level >= 1)
          error:
            type: object
            description: Error details (on failure)
      upload:
        description: Upload a file via multipart/form-data POST request. Content can be plain text (for web shells, scripts)
          or base64-encoded (for binary files). Uses curl -F with automatic temp file creation and cleanup. Supports custom
          MIME type spoofing, extra form fields, cookies, and custom headers. Returns parsed response including status code,
          headers, body, and timing.
        when_to_use: 'For exploiting file upload vulnerabilities: (1) Upload a PHP/JSP/ASP web shell through a file upload
          form, (2) Upload a reverse shell binary, (3) Exploit unrestricted file upload for RCE. You need to know the form
          field name (inspect the HTML form for the <input type=''file'' name=''...''> attribute). Common field names: ''file'',
          ''upload'', ''avatar'', ''image'', ''attachment''. Set content_type to ''image/jpeg'' or ''image/png'' to bypass
          MIME type checks. Use extra_fields for additional required form parameters.'
        params:
          url:
