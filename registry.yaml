  prowler:
    name: prowler
    version: 5.18.3
    description: 'Multi-cloud security auditing tool — Prowler v5.18 with 920+ security checks across 14 providers: AWS (572
      checks, 84 services, 41 compliance frameworks), Azure (165 checks, 21 services), GCP (100 checks), Kubernetes (83 checks,
      8 services), M365, GitHub, Cloudflare, Oracle Cloud, OpenStack, Alibaba Cloud, IaC, LLM, NHN, and MongoDB Atlas. Three
      methods: scan (full provider audit with severity/service/compliance/region filtering), list_checks (enumerate checks/services/compliance
      frameworks without credentials), scan_service (focused single-service audit for faster results). Outputs OCSF JSON findings
      with pass/fail status, severity, resource details, and compliance mapping. Requires cloud credentials via environment
      variables. For container/IaC scanning use trivy instead. For AWS post-exploitation enumeration use bash with AWS CLI
      or impacket.'
    image: ghcr.io/silicon-works/mcp-tools-prowler:latest
    image_size_mb: 1820
    timeout_seconds: 900
    capabilities:
    - cloud_security_audit
    - compliance_scanning
    - misconfiguration_detection
    - multi_cloud
    routing:
      use_for:
      - audit an AWS account for security misconfigurations
      - check Azure subscription security posture
      - scan GCP project for security issues
      - audit Kubernetes cluster security configuration
      - run CIS benchmark compliance checks against AWS
      - find IAM misconfigurations in cloud accounts
      - check S3 bucket security and public access settings
      - audit cloud security posture across multiple providers
      - find security groups with overly permissive rules
      - check cloud encryption settings and key management
      - verify cloud logging and monitoring configuration
      - run PCI DSS compliance audit on cloud infrastructure
      - check for publicly exposed cloud resources
      - audit Microsoft 365 tenant security configuration
      - scan GitHub organization for security misconfigurations
      never_use_for:
      - container image vulnerability scanning (use trivy)
      - IaC file misconfiguration scanning (use trivy)
      - web application vulnerability scanning (use nuclei or nikto)
      - network port scanning (use nmap)
      - AWS post-exploitation enumeration (not supported — use bash with AWS CLI or impacket)
      - CVE research and lookup (use cve-lookup)
      triggers:
      - prowler
      - cloud audit
      - cloud security
      - AWS security
      - Azure security
      - GCP security
      - CIS benchmark
      - compliance scan
      - cloud misconfiguration
      - S3 security
      - IAM audit
      - M365 security
      - Microsoft 365 audit
      - GitHub security audit
    phases:
    - enumeration
    requirements:
      network: true
      privileged: false
    environment:
    - name: AWS_ACCESS_KEY_ID
      description: AWS access key for authentication
      required: false
    - name: AWS_SECRET_ACCESS_KEY
      description: AWS secret key for authentication
      required: false
    - name: AWS_SESSION_TOKEN
      description: AWS session token for temporary credentials
      required: false
    - name: AZURE_SUBSCRIPTION_ID
      description: Azure subscription ID
      required: false
    - name: AZURE_TENANT_ID
      description: Azure tenant ID
      required: false
    - name: GOOGLE_APPLICATION_CREDENTIALS
      description: Path to GCP service account JSON key file
      required: false
    resources:
      memory_mb: 512
      cpu: 1.0
    see_also:
    - tool: trivy
      reason: Use trivy for container image CVE scanning and IaC misconfiguration detection. Prowler audits live cloud accounts,
        trivy scans artifacts.
    - tool: nmap
      reason: After prowler finds exposed cloud resources with public IPs or open security groups, use nmap to scan those
        exposed endpoints.
    - tool: cve-lookup
      reason: Use cve-lookup to research specific CVEs found in cloud audit findings.
    methods:
      scan:
        description: Run a full Prowler security audit against a cloud provider. Executes `prowler <provider> --output-formats
          json-ocsf --output-directory /session/` with optional severity, service, compliance, and region filters. Returns
          OCSF findings parsed into structured format with pass/fail status, severity, resource details. Only failed findings
          returned to save context (pass findings are informational noise). Output files written to /session/ for reference.
        when_to_use: (1) Full cloud account security audit during enumeration phase — run with no filters first to get overview.
          (2) Compliance-specific audit — use compliance parameter with framework name (e.g., 'cis_3.0_aws', 'pci_3.2.1_aws').
          (3) Targeted audit — combine service and severity filters for focused results (e.g., service='iam', severity='critical,high').
          (4) Multi-region AWS audit — specify regions to limit scope. (5) After gaining cloud credentials in post-exploitation
          — audit what the compromised identity can see.
        required_ports: []
        params:
          provider:
            type: string
            required: true
            description: 'Cloud provider: ''aws'' (572 checks, 84 services), ''azure'' (165 checks, 21 services), ''gcp''
              (100 checks), ''kubernetes'' (83 checks, 8 services), ''m365'', ''github'', ''cloudflare'', ''oraclecloud'',
              ''openstack'', ''alibabacloud'', ''iac'', ''llm'', ''nhn'', or ''mongodbatlas''. Credentials must be set via
              environment variables before scan.'
          severity:
            type: string
            description: 'Comma-separated severity filter (e.g., ''critical,high''). Options: critical, high, medium, low,
              informational. Omit for all severities.'
          service:
            type: string
            description: Comma-separated services to scan (e.g., 's3,iam,ec2'). Omit for all services. Use list_checks with
              list_type='services' to see available services for the provider.
          compliance:
            type: string
            description: Compliance framework name (e.g., 'cis_3.0_aws', 'pci_3.2.1_aws', 'hipaa_aws'). Use list_checks with
              list_type='compliance' to see available frameworks.
          region:
            type: string
            description: Comma-separated AWS regions (e.g., 'us-east-1,eu-west-1'). AWS only. Omit for all regions.
        returns:
          findings:
            type: array
            description: 'Failed findings (capped at 100). Each: {check_id, check_title, severity, status, status_detail,
              resource, service, region}.'
          total_findings:
            type: integer
            description: Total findings (pass + fail + manual).
          total_failed:
            type: integer
            description: Count of failed checks.
          summary:
            type: object
            description: 'Breakdown: {total, by_status: {PASS, FAIL, MANUAL, MUTED}, by_severity: {CRITICAL, HIGH, ...}, failed_by_service:
              {service: count}}.'
          output_directory:
            type: string
            description: Path to /session/ subdirectory containing full OCSF JSON output files.
      list_checks:
        description: List available Prowler checks, services, or compliance frameworks for a provider. Runs `prowler <provider>
          --list-checks-json` (checks), `--list-services` (services), or `--list-compliance` (compliance). Does NOT require
          cloud credentials.
        when_to_use: (1) Before scanning — discover what checks are available for the target provider. (2) Find service names
          to use with scan_service. (3) Discover compliance frameworks available for targeted audits.
        required_ports: []
        params:
          provider:
            type: string
            required: true
            description: 'Cloud provider: ''aws'', ''azure'', ''gcp'', ''kubernetes'', ''m365'', ''github'', ''cloudflare'',
              ''oraclecloud'', ''openstack'', ''alibabacloud'', ''iac'', ''llm'', ''nhn'', or ''mongodbatlas''.'
          list_type:
            type: string
            default: checks
            description: '''checks'' (all security checks with IDs, titles, severity), ''services'' (scannable service names),
              or ''compliance'' (compliance framework names).'
        returns:
          checks:
            type: array
            description: 'For list_type=''checks'': array of {id, title, service, severity}. Capped at 200.'
          items:
            type: array
            description: 'For list_type=''services'' or ''compliance'': array of item names.'
          total:
            type: integer
            description: Total count of items.
      scan_service:
        description: Scan a specific cloud service — wrapper around scan with service pre-set. Faster than full scan because
          it only runs checks for one service.
        when_to_use: (1) Quick targeted audit of a specific service (e.g., 's3' for bucket security, 'iam' for identity misconfigs).
          (2) When full scan is too slow — focus on high-value services first. (3) After discovering a service in enumeration
          — deep-dive into its security posture.
        required_ports: []
        params:
          provider:
            type: string
            required: true
            description: Cloud provider.
          service:
            type: string
            required: true
            description: Service to audit (e.g., 's3', 'iam', 'ec2', 'rds', 'lambda', 'cloudtrail'). Use list_checks with
              list_type='services' to see available services.
          severity:
            type: string
            description: Comma-separated severity filter.
        returns:
          findings:
            type: array
            description: Failed findings for the specified service.
          summary:
            type: object
            description: Status and severity breakdown for the service.
  responder:
    name: responder
    version: 3.2.2.0
    description: 'LLMNR/NBT-NS/MDNS poisoning and NTLMv2 hash capture via Responder v3.2.2 (lgandx/Responder, Kali apt package
      responder). Three methods: poison, analyze, capture_smb. Poisons broadcast name resolution protocols (LLMNR port 5355,
      NBT-NS port 137, MDNS port 5353) to redirect authentication to rogue servers, capturing NTLMv2/NTLMv1 hashes in hashcat-compatible
      format (mode 5600/5500). Runs 18 rogue servers simultaneously: SMB, HTTP, HTTPS, DNS, LDAP, FTP, POP, SMTP, IMAP, MSSQL,
      RDP, WinRM, Kerberos, DCERPC, SNMP, MQTT, MYSQL, QUIC. Analyze mode (-A) passively observes traffic without poisoning.
      capture_smb disables all poisoners and servers except SMB for SSRF-triggered hash capture. Duration-bounded execution
      — runs for a fixed number of seconds then terminates and returns parsed results. Hash output parsed from SQLite database
      (Responder.db) with fallback to log file parsing. Captured hashes are hashcat-ready: NTLMv2 → mode 5600, NTLMv1 → mode
      5500, AS-REP → mode 7500. Requires privileged mode and host networking for raw socket access and broadcast/multicast
      visibility.'
    image: ghcr.io/silicon-works/mcp-tools-responder:latest
    image_size_mb: 250
    timeout_seconds: 600
    capabilities:
    - hash_capture
    - llmnr_poisoning
    - nbtns_poisoning
    - mdns_poisoning
    routing:
      use_for:
      - capture NTLMv2 hashes via LLMNR/NBT-NS/MDNS poisoning on the local network
      - poison broadcast name resolution to intercept Windows authentication requests
      - set up SMB listener to capture hashes from SSRF or forced authentication attacks
      - passively analyze broadcast protocol activity on a network segment without poisoning
      - capture NetNTLMv2 hashes for offline cracking with hashcat or john
      - perform LLMNR poisoning to obtain domain user credentials on an internal network
      - capture NTLMv1 hashes with LM downgrade for easier offline cracking
      - run rogue WPAD proxy to capture browser proxy authentication
      - capture cleartext credentials via HTTP Basic auth downgrade
      - set up hash capture listener for coerced authentication attacks (PetitPotam, PrinterBug, DFSCoerce)
      - force proxy authentication on all HTTP clients with -P (ProxyAuth) to capture NTLMv2 hashes
      - poison IPv6 name resolution via DHCPv6 or RDNSS Router Advertisement on dual-stack networks
      - capture WebDAV authentication by returning STATUS_LOGON_FAILURE with -E (ErrorCode)
      never_use_for:
      - NTLM relay attacks (use impacket.ntlmrelayx — Responder captures hashes, ntlmrelayx relays them)
      - password cracking (use john or hashcat — Responder captures hashes, cracking tools crack them)
      - port scanning (use nmap — Responder is a listener, not a scanner)
      - credential spraying (use kerbrute — Responder is passive capture, not active authentication)
      - SMB enumeration (use netexec — Responder runs rogue servers, not SMB client queries)
      - ARP poisoning (use bettercap/ettercap — Responder poisons name resolution, not ARP)
      triggers:
      - responder
      - LLMNR
      - NBT-NS
      - MDNS poisoning
      - hash capture
      - NTLMv2 capture
      - NetNTLM
      - WPAD
      - broadcast poisoning
      - SMB capture
      - forced authentication
    phases:
    - exploitation
    requirements:
      network: true
      privileged: true
      privileged_reason: Requires raw sockets (NET_RAW) for LLMNR/NBT-NS/MDNS poisoning, network admin (NET_ADMIN) for multicast
        group membership, and privileged ports (<1024) for rogue servers. Must run with --network=host for Layer 2 broadcast/multicast
        visibility.
    resources:
      memory_mb: 256
      cpu: 0.5
    see_also:
    - tool: john
      reason: Crack captured NTLMv2 hashes (hashcat mode 5600) or NTLMv1 hashes (mode 5500) after Responder captures them
    - tool: impacket
      reason: Use ntlmrelayx to relay captured authentication instead of cracking, or use secretsdump with cracked credentials
    - tool: netexec
      reason: Validate cracked credentials across SMB, WinRM, LDAP, MSSQL after obtaining them via Responder
    - tool: hashcat
      reason: Responder captures NTLMv2 hashes in hashcat mode 5600 format. Use hashcat for GPU-accelerated cracking of captured
        hashes, especially with combinator or hybrid attacks.
    - tool: bloodhound
      reason: After obtaining valid credentials via hash cracking, collect AD relationship data for attack path analysis
    methods:
      poison:
        description: 'Run Responder in full poisoning mode — responds to LLMNR (port 5355), NBT-NS (port 137), and MDNS (port
          5353) broadcast queries with attacker''s IP, causing clients to authenticate to rogue servers. Runs for exactly
          `duration` seconds then terminates. After termination, parses captured hashes from Responder''s SQLite database
          (Responder.db) with fallback to log file parsing (logs/*-NTLMv*.txt). Captured hashes are in hashcat-compatible
          format: NTLMv2 as `username::DOMAIN:challenge:ntproofstr:blob` (mode 5600), NTLMv1 as `username::DOMAIN:lmresponse:ntresponse:challenge`
          (mode 5500). Copies hash files and DB to /session/responder/ for persistence. Supports WPAD poisoning (-w), HTTP
          Basic auth downgrade (-b), LM hash downgrade (--lm), NTLMv1 downgrade (--disable-ess), DHCPv4 poisoning (-d), DHCPv6
          poisoning (--dhcpv6), RDNSS Router Advertisement poisoning (--rdnss), forced proxy authentication (-P), custom external
          IPv4 (-e) and IPv6 (-6), custom TTL for poisoned answers (-t), and WebDAV auth capture via STATUS_LOGON_FAILURE
          (-E). Interface auto-detected via `ip -j addr` if not specified.'
        when_to_use: (1) After gaining access to an internal network segment (via VPN, pivot, or initial foothold) — poison
          LLMNR/NBT-NS to capture credentials from Windows clients resolving non-existent hostnames. (2) When a Windows client
          tries to resolve a hostname that DNS doesn't know — LLMNR/NBT-NS fallback broadcasts the query, and Responder answers
          with attacker IP. (3) To capture domain user NTLMv2 hashes for offline cracking with john or hashcat. (4) Combined
          with WPAD poisoning (-w) to capture browser proxy authentication from all clients on the segment. (5) Use --disable-ess
          to force NTLMv1 downgrade for easier cracking (hashcat mode 5500 is faster than 5600). (6) After capturing hashes,
          crack with john/hashcat, then use credentials with bloodhound, netexec, or impacket for further AD enumeration.
        required_ports: []
        params:
          interface:
            type: string
            description: Network interface to listen on (e.g., 'eth0', 'tun0'). If omitted, auto-detects the first non-loopback
              interface with an IPv4 address. Use the interface on the target network segment.
          duration:
            type: integer
            required: true
            description: How long to run Responder in seconds. Minimum 5 seconds. Use 60-300s for network poisoning (need
              time for clients to make broadcast queries). Use 15-30s for SSRF capture where the trigger is immediate.
          verbose:
            type: boolean
            default: true
            description: Enable verbose output (-v). Shows poisoning activity and captured hash details.
          wpad:
            type: boolean
            default: false
            description: Start rogue WPAD proxy server (-w). Captures HTTP proxy authentication from browsers that auto-detect
              proxy settings.
          force_wpad_auth:
            type: boolean
            default: false
            description: Force NTLM/Basic auth on wpad.dat retrieval (-F). More aggressive — may show authentication prompt
              to users.
          basic_auth:
            type: boolean
            default: false
            description: Return HTTP Basic auth instead of NTLM (-b). Captures cleartext passwords instead of hashes. Easier
              to use but users see a login prompt.
          lm_downgrade:
            type: boolean
            default: false
            description: Force LM hashing downgrade (--lm). Produces weaker hashes that crack faster but only old Windows
              clients (XP/2003) support this.
          disable_ess:
            type: boolean
            default: false
            description: Disable Extended Session Security (--disable-ess). Forces NTLMv1 downgrade — hashcat mode 5500 cracks
              much faster than NTLMv2 mode 5600.
          dhcp:
            type: boolean
            default: false
            description: 'Enable DHCPv4 poisoning with WPAD injection (-d). WARNING: may disrupt DHCP on the network segment.'
          external_ip:
            type: string
            description: Custom IPv4 address to poison responses with (-e). Use when Responder runs on a different host than
              the one clients should connect to. Defaults to the listening interface's IP.
          external_ip6:
            type: string
            description: Custom IPv6 address to poison responses with (-6). Use for IPv6-enabled networks when Responder should
              direct authentication to a different IPv6 address.
          proxy_auth:
            type: boolean
            default: false
            description: Force NTLM/Basic proxy authentication on all HTTP requests (-P). Highly effective — forces clients
              to authenticate to the rogue proxy. Cannot be combined with wpad (-w).
          dhcpv6:
            type: boolean
            default: false
            description: Enable DHCPv6 poisoning (--dhcpv6). Responds to DHCPv6 Solicit messages with the attacker's DNS server.
              Effective on dual-stack networks where IPv6 is autoconfigured.
          rdnss:
            type: boolean
            default: false
            description: Enable Router Advertisement RDNSS poisoning (--rdnss). Injects attacker IP as recursive DNS server
              via IPv6 Router Advertisements. Effective on networks with IPv6 enabled.
          error_code:
            type: boolean
            default: false
            description: Return STATUS_LOGON_FAILURE for authentication requests (-E). Forces WebDAV clients to re-authenticate,
              enabling WebDAV NTLMv2 hash capture. Used when targeting WebDAV-enabled clients.
          ttl:
            type: integer
            description: Custom TTL (time-to-live) for poisoned answers (-t). Controls how long clients cache the poisoned
              response. Lower values mean clients re-query sooner; higher values persist longer.
        returns:
          captured_hashes:
            type: array
            description: 'Array of captured hash objects. Each has: timestamp, module (SMB/HTTP/LDAP/etc.), hash_type (NTLMv2/NTLMv1/ClearText),
              client_ip, hostname, username, hash (hashcat-compatible full hash string). Cleartext entries also have ''cleartext''
              field. Empty if no authentication was captured during the duration.'
          hash_count:
            type: integer
            description: Number of unique hashes captured. Zero on quiet networks.
          interface_used:
            type: string
            description: Network interface that was used (specified or auto-detected).
          duration_seconds:
            type: integer
            description: Actual duration Responder ran for.
          copied_files:
            type: array
            description: Paths of hash files, logs, and DB copied to /session/responder/ for persistence.
      analyze:
        description: Passive analysis mode (-A flag) — Responder listens for LLMNR/NBT-NS/MDNS broadcast queries on the network
          but does NOT respond to them and does NOT poison. This is safe reconnaissance that identifies what hostnames clients
          are trying to resolve, which protocols are active, and which clients are making requests. Output logged to Analyzer-Session.log.
          No rogue servers are started. No hashes are captured.
        when_to_use: (1) First step on an internal network — assess broadcast protocol activity before deciding whether to
          poison. (2) When you need to understand the attack surface without triggering any alerts. (3) To identify which
          hostnames are being queried (potential poisoning targets). (4) When the engagement rules prohibit active poisoning
          but allow passive monitoring.
        required_ports: []
        params:
          interface:
            type: string
            description: Network interface to listen on. Auto-detected if omitted.
          duration:
            type: integer
            required: true
            description: How long to monitor in seconds. Use 30-120s for a quick assessment.
          verbose:
            type: boolean
            default: true
            description: Enable verbose output.
        returns:
          detected_protocols:
            type: array
            description: Lines from Analyzer-Session.log showing observed broadcast protocol activity. Each line contains
              timestamp, protocol type, queried hostname, and source IP.
          detection_count:
            type: integer
            description: Number of protocol events detected.
          interface_used:
            type: string
            description: Network interface that was monitored.
          duration_seconds:
            type: integer
            description: Duration of the monitoring period.
      capture_smb:
        description: 'SMB-only hash capture mode — disables ALL poisoners (LLMNR, NBT-NS, MDNS) and ALL rogue servers except
          SMB. Only the SMB server (port 445) listens for incoming authentication. Designed for SSRF-triggered authentication
          capture: trigger a server-side request to \\ATTACKER_IP\share from a web app, file inclusion, or other vulnerability,
          and Responder''s SMB server captures the NTLMv2 hash. Also used for coerced authentication attacks (PetitPotam,
          PrinterBug, DFSCoerce) where the target machine is forced to authenticate to the attacker''s SMB server. Modifies
          Responder.conf before execution to disable all protocols except SMB.'
        when_to_use: (1) When you have an SSRF vulnerability that allows UNC path injection (\\attacker\share) — set up capture_smb
          first, then trigger the SSRF. (2) When using PetitPotam, PrinterBug, or DFSCoerce to coerce machine authentication
          — run capture_smb to catch the NTLMv2 hash. (3) When you only need SMB authentication capture and want to avoid
          binding to other ports (prevents port conflicts and reduces noise). (4) Safer than full poison mode because no broadcast
          poisoning occurs.
        required_ports: []
        params:
          interface:
            type: string
            description: Network interface to listen on. Auto-detected if omitted.
          duration:
            type: integer
            required: true
            description: How long to listen in seconds. Use 15-30s for SSRF capture (trigger should be immediate). Use 60s+
              if waiting for coerced authentication.
          verbose:
            type: boolean
            default: true
            description: Enable verbose output.
        returns:
          captured_hashes:
            type: array
            description: Array of captured SMB hash objects (same format as poison method). Only SMB hashes since other protocols
              are disabled.
          hash_count:
            type: integer
            description: Number of SMB hashes captured.
          interface_used:
            type: string
            description: Network interface used.
          duration_seconds:
            type: integer
            description: Duration of the capture period.
          smb_only:
            type: boolean
            description: Always true for this method — confirms only SMB was enabled.
          copied_files:
            type: array
            description: Paths of hash files copied to /session/responder/.
  scapy:
    name: scapy
    version: '2.5'
    description: 'Packet crafting and low-level network testing via Scapy 2.5. 8 methods: udp_send (send/receive UDP packets),
      udp_probe (UDP service discovery with protocol-specific probes), tcp_syn (SYN scan single port), icmp_ping (ICMP echo),
      dns_query (DNS lookups with A/AAAA/MX/NS/TXT/SOA/ANY types), craft_packet (custom TCP/UDP/ICMP with hex payloads and
      TCP flags), arp_scan (local network host discovery with MAC addresses), snmp_get (SNMP community string testing). Requires
      NET_RAW and NET_ADMIN capabilities for raw socket access.'
    image: ghcr.io/silicon-works/mcp-tools-scapy:latest
    image_size_mb: 200
    timeout_seconds: 300
    capabilities:
    - packet_crafting
    - udp_testing
    - protocol_manipulation
    - raw_sockets
    - arp_scanning
    - dns_queries
    - snmp_testing
    routing:
      use_for:
      - send and receive UDP packets for protocol testing and service interaction
      - probe UDP ports with service-specific payloads for service discovery
      - craft custom TCP UDP or ICMP packets with specific flags and hex payloads
      - ARP scan local network to discover hosts and MAC addresses
      - DNS query with specific record types (A, MX, NS, TXT, SOA, ANY)
      - test SNMP community strings against target devices
      - protocol fuzzing with raw socket packet crafting
      - single-port TCP SYN check when full nmap scan is overkill
      never_use_for:
      - HTTP requests (use curl)
      - port scanning (use nmap)
      triggers:
      - UDP
      - packet craft
      - raw socket
      - ARP scan
      - SNMP
      - DNS query
      - protocol fuzz
      - scapy
      prefer_over:
      - netcat for UDP
    phases:
    - reconnaissance
    - enumeration
    - exploitation
    requirements:
      network: true
      privileged: true
      privileged_reason: Requires raw sockets (NET_RAW, NET_ADMIN) for packet crafting and ARP operations
      capabilities:
      - NET_RAW
      - NET_ADMIN
    resources:
      memory_mb: 256
      cpu: 0.5
    methods:
      udp_send:
        description: Send a UDP packet and receive response
        when_to_use: For UDP protocol testing, service interaction, or custom payloads
        params:
          target:
            type: string
            required: true
            description: Target IP address
          port:
            type: integer
            required: true
            description: Target UDP port
          data:
            type: string
            required: true
            description: Payload data (string or hex with 0x prefix)
          sport:
            type: integer
            default: 0
            description: Source port (0 = random)
          timeout:
            type: integer
            default: 5
            description: Response timeout in seconds
        returns:
          received:
            type: boolean
            description: Whether response was received
          payload_hex:
            type: string
            description: Response payload as hex
          payload_ascii:
            type: string
            description: Response payload as ASCII
      udp_probe:
        description: Probe UDP ports to discover services
        when_to_use: For UDP service discovery when nmap UDP scan is insufficient
        params:
          target:
            type: string
            required: true
            description: Target IP
          ports:
            type: string
            required: true
            description: Ports to probe (comma-separated or range)
          probe_data:
            type: string
            default: ''
            description: Custom probe data (empty for service-specific defaults)
          timeout:
            type: integer
            default: 3
            description: Timeout per probe
        returns:
          results:
            type: array
            description: Per-port probe results
          open_ports:
            type: array
            description: Potentially open ports
      tcp_syn:
        description: Send TCP SYN packet for custom port probing
        when_to_use: For stealthy single-port checks or custom TCP testing
        params:
          target:
            type: string
            required: true
            description: Target IP
          port:
            type: integer
            required: true
            description: Target port
          timeout:
            type: integer
            default: 3
            description: Response timeout
        returns:
          state:
            type: string
            description: Port state (open, closed, filtered)
          response:
            type: object
            description: Response packet summary
      icmp_ping:
        description: Send ICMP echo request
        when_to_use: For host discovery when regular ping is blocked
        params:
          target:
            type: string
            required: true
            description: Target IP
          count:
            type: integer
            default: 1
            description: Number of pings
          timeout:
            type: integer
            default: 3
            description: Response timeout
        returns:
          received:
            type: integer
            description: Number of responses
          loss_percent:
            type: number
            description: Packet loss percentage
      dns_query:
        description: Send DNS query to a server
        when_to_use: For DNS enumeration, zone transfer testing, or custom DNS queries
        params:
          server:
            type: string
            required: true
            description: DNS server IP
          domain:
            type: string
            required: true
            description: Domain to query
          query_type:
            type: string
            enum:
            - A
            - AAAA
            - MX
            - NS
            - TXT
            - SOA
            - CNAME
            - PTR
            - ANY
            default: A
            description: DNS query type
          timeout:
            type: integer
            default: 5
            description: Response timeout
        returns:
          answers:
            type: array
            description: DNS answers
          answer_count:
            type: integer
            description: Number of answers
      craft_packet:
        description: Craft and send a custom packet
        when_to_use: For protocol testing, fuzzing, or when no specialized tool exists
        params:
          target:
            type: string
            required: true
            description: Target IP
          protocol:
            type: string
            enum:
            - tcp
            - udp
            - icmp
            required: true
            description: Protocol layer
          port:
            type: integer
            description: Destination port (for TCP/UDP)
          flags:
            type: string
            default: S
            description: TCP flags (S=SYN, A=ACK, F=FIN, R=RST, P=PSH, U=URG)
          payload_hex:
            type: string
            description: Payload as hex string
          payload_ascii:
            type: string
            description: Payload as ASCII string
          timeout:
            type: integer
            default: 5
            description: Response timeout
        returns:
          response:
            type: object
            description: Response packet summary
      arp_scan:
        description: Perform ARP scan on local network
        when_to_use: For local network host discovery
        params:
          network:
            type: string
            required: true
            description: Network range (e.g., 192.168.1.0/24)
          timeout:
            type: integer
            default: 3
            description: Response timeout
        returns:
          hosts:
            type: array
            description: Discovered hosts with IP and MAC
          host_count:
            type: integer
            description: Number of hosts found
      snmp_get:
        description: Send SNMP GET request for community string testing
        when_to_use: To test SNMP community strings
        params:
          target:
            type: string
            required: true
            description: Target IP
          community:
            type: string
            default: public
            description: SNMP community string to test
          oid:
            type: string
            default: 1.3.6.1.2.1.1.1.0
            description: OID to query
          port:
            type: integer
            default: 161
            description: SNMP port
          timeout:
            type: integer
            default: 5
            description: Response timeout
        returns:
          valid_community:
            type: boolean
            description: Whether community string is valid
          response:
            type: string
            description: SNMP response data
  searchsploit:
    name: searchsploit
    version: latest
    description: Offline search of the Exploit Database (exploit-db.com) using the searchsploit CLI. Contains 45,000+ public
      exploits, shellcodes, and security papers indexed locally — no network required. Searches exploit titles and file paths
      with fuzzy version range matching (e.g., '2.4' matches '2.0 < 2.5'). Supports JSON output parsing, CVE-based search
      (--cve), exact matching, and full exploit source code retrieval. Exploit code is stored at /usr/share/exploitdb/exploits/.
      Includes the full ExploitDB mirror.
    image: ghcr.io/silicon-works/mcp-tools-searchsploit:latest
    image_size_mb: 500
    timeout_seconds: 60
    capabilities:
    - exploit_search
    - vulnerability_research
    phases:
    - exploitation
    requirements:
      network: false
      privileged: false
    resources:
      memory_mb: 256
      cpu: 0.5
    routing:
      use_for:
      - find public exploits for a software version or CVE
      - search ExploitDB for known vulnerabilities
      - find exploit code for Apache Nginx WordPress Drupal
      - search for privilege escalation exploits by kernel version
      - look up CVE exploit availability
      - find remote code execution exploits for identified services
      - retrieve exploit source code by EDB-ID
      - check if a service version has known exploits
      triggers:
      - CVE-\d{4}-\d+
      - exploit.*search
      - searchsploit
      - exploitdb
      - find exploit
      - known exploit
      never_use_for:
      - writing custom exploits (use exploit-runner)
      - payload generation (use payload tool)
      - active vulnerability scanning (use nuclei or nmap vuln)
    methods:
      search:
        description: Search the local ExploitDB mirror (45,000+ entries) for exploits matching query terms. Uses searchsploit
          with --json output. By default, performs case-insensitive AND matching across all terms with fuzzy version range
          detection (e.g., searching '2.4' will match entries for '2.0 < 2.5'). Parses JSON output into structured results
          with EDB-ID, title, path, date, and type (exploit/shellcode/paper). Search terms are split on spaces and matched
          independently — word order doesn't matter.
        when_to_use: 'After service_scan identifies service versions (e.g., ''Apache httpd 2.4.49'', ''OpenSSH 7.2p2'', ''ProFTPD
          1.3.5''). The standard workflow is: nmap service_scan → searchsploit with the product and version. Search tips:
          (1) Use product name + version: ''apache 2.4.49'', not ''Apache httpd 2.4.49 Ubuntu''. (2) Start broad, then narrow:
          first ''apache 2.4'', then ''apache 2.4.49'' if too many results. (3) For Windows: search by MS bulletin ''ms17-010''
          or KB number. (4) For kernels: ''linux kernel 5.4'' or ''linux privilege escalation''. (5) Use exact=true for precise
          version matching when fuzzy results are too broad. (6) Filter by type=''exploit'' to exclude papers and shellcodes.
          After finding relevant results, use get_exploit to retrieve the exploit source code.'
        params:
          query:
            type: string
            description: 'Space-separated search terms. Each term must appear in the exploit title or path. Examples: ''apache
              2.4.49'' (product + version), ''wordpress 5.0'' (CMS + version), ''linux kernel 5.4 privilege'' (kernel + version
              + type), ''ms17-010'' (MS bulletin), ''eternalblue'' (exploit name), ''ssh'' (service). Fewer, more specific
              terms give better results. Mutually exclusive with cve.'
          cve:
            type: string
            description: Search by CVE ID (e.g., '2021-44228' for Log4Shell, '2021-41773' for Apache path traversal). Omit
              the 'CVE-' prefix. More precise than free-text search because it searches the CVE field specifically. Mutually
              exclusive with query.
          exact:
            type: boolean
            default: false
            description: Exact order match on exploit title (searchsploit --exact). With exact=false (default), terms are
              matched independently in any order with fuzzy version ranges. With exact=true, the query string must appear
              exactly as-is in the title. Use exact=true when default search returns too many irrelevant results. Only applies
              to text search (query), not CVE search.
          type:
            type: enum
            values:
            - all
            - exploit
            - shellcode
            - paper
            default: all
            description: Filter by result type. 'exploit' = working exploit code (Python, C, Ruby, etc.), 'shellcode' = standalone
              shellcode (assembly, machine code), 'paper' = writeups and advisories (no exploit code). Use 'exploit' for actionable
              results. Only applies to text search (query), not CVE search.
          strict:
            type: boolean
            default: false
            description: Strict version matching — '1.1' only matches '1.1', not '1.0 < 1.3'. Use when the default fuzzy matching
              returns too many irrelevant version results. Only applies to text search (query), not CVE search.
          exclude:
            type: string
            description: 'Exclude results matching these terms (pipe-separated). Examples: ''(PoC)|/dos/'' (exclude proof-of-concepts
              and DoS), ''/windows/'' (exclude Windows exploits), ''/linux/'' (exclude Linux exploits). Useful for filtering
              out irrelevant platforms or non-functional PoCs. Only applies to text search (query), not CVE search.'
        returns:
          results:
            type: array
            description: 'Matching entries, each with: id (EDB-ID number), title (exploit description), path (local file path
              under /usr/share/exploitdb/), date (publication date), type (''exploit'', ''shellcode'', or ''paper'')'
          count:
            type: integer
            description: Number of matching results
          query:
            type: string
            description: The search query or CVE ID that was used
          search_type:
            type: string
            description: '''text'' for query-based search, ''cve'' for CVE-based search'
      get_exploit:
        description: Retrieve the full source code of an exploit by its EDB-ID number or file path. Resolves the exploit ID
          to a local file path (/usr/share/exploitdb/exploits/...) via JSON search, then reads the file. Exploit code can
          be Python, C, Ruby, PHP, Perl, shell script, or text. The full content is returned for review before use.
        when_to_use: 'After search identifies a relevant exploit, use this to retrieve its source code. Review the code to
          understand: (1) what it does, (2) what parameters it needs (target IP, port, paths), (3) whether it needs compilation
          or modification, (4) any dependencies. For Python exploits: may need to be adapted and run via exploit-runner. For
          C exploits: need compilation (gcc). For Metasploit modules (Ruby): use the metasploit tool instead. Always review
          exploit code before execution — public exploits may contain backdoors or be unreliable.'
        params:
          exploit_id:
            type: string
            required: true
            description: Either the EDB-ID number (e.g., '50383', '39446') from search results, or the full file path (e.g.,
              '/usr/share/exploitdb/exploits/linux/remote/50383.py'). EDB-ID is preferred — the tool resolves it to the full
              path automatically.
        returns:
          exploit_id:
            type: string
            description: The exploit ID that was requested
          path:
            type: string
            description: Full local path to the exploit file
          content:
            type: string
            description: Complete exploit source code as text
      mirror:
        description: Copy an exploit file to the session working directory for modification. Resolves the EDB-ID to a local
          file path, then copies the exploit source to the current working directory. Useful when you need to modify exploit
          code before execution — e.g., changing hardcoded IPs, adjusting payloads, or adapting the exploit for the target
          environment.
        when_to_use: 'After reviewing an exploit with get_exploit and determining it needs modification before use. Common
          modifications: (1) changing target IP/port, (2) adjusting payload (reverse shell callback IP), (3) adding missing
          dependencies or imports, (4) fixing Python 2 vs 3 compatibility issues, (5) adapting for the specific target version.
          After mirroring, the exploit can be edited and run via exploit-runner.'
        params:
          exploit_id:
            type: string
            required: true
            description: EDB-ID of the exploit to copy (e.g., '50383' from search results). The exploit file will be copied
              to the current working directory with its original filename.
        returns:
          exploit_id:
            type: string
            description: The exploit ID that was copied
          source_path:
            type: string
            description: Original file path in the ExploitDB mirror
          filename:
            type: string
            description: Name of the copied file in the working directory
  shell-session:
    name: shell-session
    version: '1.0'
    description: 'Persistent shell session manager (paramiko for SSH, raw sockets for reverse shells) for maintaining interactive
      sessions on compromised targets. Unlike the ssh tool (which reconnects per command), shell-session keeps a single SSH
      connection open for multiple commands via exec. 9 methods: ssh_connect (persistent SSH via paramiko), exec (run command
      on SSH session), upload/download (SFTP file transfer), listen (reverse shell TCP listener), shell_exec (send command
      to reverse shell with output stability detection), list_sessions, close, upgrade_shell (dumb shell to PTY via python3
      pty.spawn). Supports password and base64-encoded private key authentication. Multiple concurrent sessions identified
      by session_id.'
    image: ghcr.io/silicon-works/mcp-tools-shell-session:latest
    image_size_mb: 150
    timeout_seconds: 600
    service: true
    service_name: shell-session
    capabilities:
    - persistent_shell_sessions
    - ssh_session_management
    - reverse_shell_handling
    - file_transfer
    - command_execution
    routing:
      use_for:
      - maintain persistent SSH session for multiple commands on target
      - interact with reverse shell connection
      - upload and download files via SFTP on persistent session
      - post-exploitation enumeration with many sequential commands
      - upgrade dumb reverse shell to interactive PTY
      - manage multiple concurrent sessions across targets
      never_use_for:
      - initial SSH connection test (use ssh exec)
      - single one-off command execution (use ssh exec)
      - SSH tunneling or port forwarding (use tunnel)
      triggers:
      - persistent shell
      - reverse shell session
      - interactive shell
      - multiple commands on target
      - shell session
      - upgrade shell
      - SFTP transfer
      prefer_over:
      - ssh
    phases:
    - exploitation
    - post-exploitation
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 256
      cpu: 0.5
    methods:
      ssh_connect:
        description: Establish a persistent SSH session to a target using paramiko. The connection stays open until close()
          is called or the server disconnects. Supports password and base64-encoded private key authentication. Returns a
          session_id for use with exec, upload, download.
        when_to_use: 'When you have valid SSH credentials and plan to run many commands — avoids the reconnection overhead
          of the ssh tool''s per-command model. Typical post-exploitation workflow: ssh_connect → exec(''id'') → exec(''cat
          /etc/passwd'') → upload(linpeas.sh) → exec(''./linpeas.sh'') → download(''/root/root.txt''). Use the ssh tool instead
          for single one-off commands.'
        params:
          host:
            type: string
            required: true
            description: Target hostname or IP address.
          port:
            type: integer
            default: 22
            description: SSH port.
          username:
            type: string
            required: true
            description: SSH username.
          password:
            type: string
            description: SSH password. Provide either password or private_key.
          private_key:
            type: string
            description: Base64-encoded SSH private key. Decoded and loaded by paramiko.
          timeout:
            type: integer
            default: 30
            description: Connection timeout in seconds.
        returns:
          session_id:
            type: string
            description: Session ID for exec, upload, download, and close.
          banner:
            type: string
            description: SSH server banner (if available).
      exec:
        description: Execute a command on an established SSH session. Uses paramiko's exec_command (or invoke_shell with get_pty=true
          for interactive commands like sudo). Returns stdout, stderr, and exit code. The session remains open for more commands.
        when_to_use: For running commands on a persistent SSH session. Use get_pty=true for commands that need a terminal
          (sudo, su, interactive prompts). For commands that produce large output (linpeas, find), increase timeout.
        params:
          session_id:
            type: string
            required: true
            description: Session ID from ssh_connect.
          command:
            type: string
            required: true
            description: Shell command to execute.
          timeout:
            type: integer
            default: 120
            description: Command execution timeout in seconds.
          get_pty:
            type: boolean
            default: false
            description: Request a pseudo-terminal. Required for sudo, su, and other interactive commands.
        returns:
          stdout:
            type: string
            description: Command standard output.
          stderr:
            type: string
            description: Command standard error.
          exit_code:
            type: integer
            description: Command exit code.
      upload:
        description: Upload a file to the target via SFTP on an existing SSH session. Supports text content or base64-encoded
          binary. Sets file permissions (default 0755 for executables).
        when_to_use: To upload enumeration scripts (linpeas, pspy), compiled exploits, or web shells to the target. Faster
          than ssh copy_to because it reuses the existing connection. Set mode='0644' for non-executable files.
        params:
          session_id:
            type: string
            required: true
            description: Session ID from ssh_connect.
          content:
            type: string
            required: true
            description: File content (plain text or base64-encoded binary).
          remote_path:
            type: string
            required: true
            description: Destination path on target (e.g., '/tmp/linpeas.sh').
          mode:
            type: string
            default: '0755'
            description: File permissions in octal (e.g., '0755' for executable, '0644' for read-only).
          is_base64:
            type: boolean
            default: false
            description: Set true if content is base64-encoded (for binary files).
        returns:
          size:
            type: integer
            description: Uploaded file size in bytes.
      download:
        description: Download a file from the target via SFTP on an existing SSH session. Returns content as text or base64.
        when_to_use: 'To retrieve files from the target: flags (user.txt, root.txt), configs, SSH keys, database files. Use
          as_base64=true for binary files.'
        params:
          session_id:
            type: string
            required: true
            description: Session ID from ssh_connect.
          remote_path:
            type: string
            required: true
            description: Absolute path to file on target.
          as_base64:
            type: boolean
            default: false
            description: Return content as base64 (for binary files).
        returns:
          content:
            type: string
            description: File content (text or base64).
          size:
            type: integer
            description: File size in bytes.
      listen:
        description: Start a TCP listener for catching reverse shell connections. Blocks until a connection is received or
          timeout expires. The connected shell becomes a session accessible via shell_exec.
        when_to_use: 'Alternative to netcat listen for reverse shells. The advantage is that the session integrates directly
          with shell_exec for command execution and upgrade_shell for PTY upgrade — no separate listener_read/listener_write
          needed. Workflow: listen(port=4444) → trigger reverse shell → shell_exec(''id'') → upgrade_shell() → shell_exec(''sudo
          -l'').'
        params:
          port:
            type: integer
            required: true
            description: Port to listen on (>1024 for non-privileged).
          timeout:
            type: integer
            default: 300
            description: Timeout waiting for a connection in seconds.
        returns:
          session_id:
            type: string
            description: Session ID for shell_exec and upgrade_shell.
          remote_ip:
            type: string
            description: IP address of the connecting target.
      shell_exec:
        description: Execute a command on a reverse shell session with output stability detection. Sends the command, waits
          for output to stabilize (no new data for a period), then returns all collected output. More reliable than raw socket
          read/write.
        when_to_use: For running commands on a reverse shell session created via listen. The stability detection handles commands
          with varying output speeds. For interactive commands (sudo), upgrade_shell first.
        params:
          session_id:
            type: string
            required: true
            description: Session ID from listen.
          command:
            type: string
            required: true
            description: Command to execute on the reverse shell.
          timeout:
            type: integer
            default: 60
            description: Command timeout in seconds.
        returns:
          output:
            type: string
            description: Command output (stdout + stderr combined).
      list_sessions:
        description: List all active sessions (SSH and reverse shell) with their type, host, status, and creation time.
        when_to_use: To check which sessions are active, find a session_id you forgot, or verify a session is still connected.
        params: {}
        returns:
          sessions:
            type: array
            description: 'Active sessions with: id, type (ssh/shell), host, status, created_at.'
      close:
        description: Close a session gracefully. For SSH sessions, disconnects the paramiko client. For reverse shells, closes
          the socket.
        when_to_use: When done with a target — always close sessions to free resources and avoid stale connections.
        params:
          session_id:
            type: string
            required: true
            description: Session ID to close.
        returns:
          success:
            type: boolean
            description: Whether the session was closed successfully.
      upgrade_shell:
        description: Upgrade a dumb reverse shell to a fully interactive PTY by sending 'python3 -c "import pty;pty.spawn("/bin/bash")"'.
          Enables features like sudo, su, tab completion, and arrow keys that don't work in raw shells.
        when_to_use: After catching a reverse shell via listen, before running interactive commands like sudo or su. The upgrade
          enables PTY features needed by many privilege escalation techniques. Only works if python3 is available on the target.
        params:
          session_id:
            type: string
            required: true
            description: Reverse shell session ID from listen.
        returns:
          success:
            type: boolean
            description: Whether the shell was upgraded to PTY.
  sqlite:
    name: sqlite
    version: '1.0'
    description: 'SQLite database client (v3.46.1 with FTS5) for post-exploitation extraction of data from .db and .sqlite
      files. Accepts database files by path (mounted volume) or base64-encoded content (downloaded from target via ssh/shell-session).
      Includes automated credential hunting that pattern-matches table names (users, accounts, admin, login, members, employees)
      and column names (password, hash, token, api_key, secret) to extract username/password pairs. Common targets: WordPress/Drupal
      user databases, Firefox/Chrome stored credentials and history, mobile app databases, application config stores, session
      databases, and any web framework using SQLite as backend.'
    image: ghcr.io/silicon-works/mcp-tools-sqlite:latest
    image_size_mb: 100
    timeout_seconds: 120
    capabilities:
    - database_extraction
    - credential_extraction
    - data_analysis
    phases:
    - post-exploitation
    requirements:
      network: false
      privileged: false
    resources:
      memory_mb: 128
      cpu: 0.25
    routing:
      use_for:
      - SQLite database extraction and analysis
      - extract credentials usernames passwords hashes from SQLite database
      - analyze downloaded .db .sqlite database file from target
      - post-exploitation database enumeration and data extraction
      - browser data extraction Firefox Chrome history passwords bookmarks cookies
      - CMS database analysis WordPress Drupal user tables
      - application config and secret extraction from SQLite
      - enumerate database schema tables columns row counts
      - execute SQL queries on local SQLite database file
      - mobile app database analysis Android iOS SQLite
      never_use_for:
      - remote database access (use mysql or mongodb)
      - SQL injection (use sqlmap)
      - port scanning
      triggers:
      - SQLite
      - .db file
      - .sqlite
      - database file
      - local database
      - extract from database
    methods:
      query:
        description: Execute an arbitrary SQL query on a SQLite database and return structured results. Supports any valid
          SQLite SQL including SELECT, PRAGMA, and aggregate functions. Automatically appends LIMIT to SELECT queries that
          don't already have one to prevent memory exhaustion on large tables. Returns column names and rows as dictionaries
          for easy parsing.
        when_to_use: 'When you need to run a specific SQL query that isn''t covered by the other convenience methods (list_tables,
          describe_table, dump_table, find_credentials). Use for: custom JOINs across tables, aggregate queries (COUNT, GROUP
          BY), LIKE/GLOB pattern searches for specific data, PRAGMA commands for database metadata, or any complex query.
          Also use when you need to search for specific values (e.g., SELECT * FROM users WHERE role=''admin'').'
        params:
          database:
            type: string
            required: true
            description: 'Path to SQLite database file inside the container (e.g., ''/data/app.db'' if volume-mounted), OR
              base64-encoded database content if is_base64=true. For databases downloaded from target, use base64 encoding:
              first download via ssh.download or shell-session, then pass the base64 content here.'
          query:
            type: string
            required: true
            description: 'SQL query to execute. Any valid SQLite SQL is accepted. SELECT queries without LIMIT get an automatic
              LIMIT appended (controlled by limit param). Examples: ''SELECT * FROM users'', ''SELECT username, password FROM
              accounts WHERE active=1'', ''PRAGMA table_info("users")'', ''SELECT name, sql FROM sqlite_master''.'
          is_base64:
            type: boolean
            default: false
            description: Set to true when the database parameter contains base64-encoded file content instead of a file path.
              The server decodes it to a temp file, queries it, then cleans up.
          limit:
            type: integer
            default: 1000
            description: Maximum rows to return for SELECT queries. Auto-appended as 'LIMIT N' if the query doesn't already
              contain a LIMIT clause. Set higher for large extractions.
        returns:
          columns:
            type: array
            description: Column names from the query result
          rows:
            type: array
            description: 'Query results as array of dictionaries (column_name: value)'
          row_count:
            type: integer
            description: Number of rows returned
      list_tables:
        description: List all tables in a SQLite database with row counts for each table. Queries sqlite_master for table
          names and runs COUNT(*) on each. Provides a quick overview of database contents to guide further extraction.
        when_to_use: First step when analyzing any SQLite database — run this to see what tables exist and how many rows each
          contains before deciding what to extract. Large row counts in tables named 'users', 'accounts', 'sessions', 'logs'
          etc. indicate high-value targets for extraction.
        params:
          database:
            type: string
            required: true
            description: Path to SQLite database file, or base64-encoded content (set is_base64=true)
          is_base64:
            type: boolean
            default: false
            description: Set to true when database parameter contains base64-encoded file content
        returns:
          tables:
            type: array
            description: List of tables, each with 'name' and 'row_count' fields
          count:
            type: integer
            description: Total number of tables in the database
      describe_table:
        description: Get detailed schema of a specific table using PRAGMA table_info(). Returns each column's name, data type,
          NOT NULL constraint, default value, and whether it's a primary key. Also returns the table's row count.
        when_to_use: 'After list_tables identifies interesting tables, use this to understand column structure before querying
          or dumping. Helps identify: which columns contain credentials (password, hash, token), which columns are primary
          keys for JOINs, data types for proper querying, and nullable fields.'
        params:
          database:
            type: string
            required: true
            description: Path to SQLite database file, or base64-encoded content (set is_base64=true)
          table:
            type: string
            required: true
            description: Table name to describe (exact name as shown by list_tables)
          is_base64:
            type: boolean
            default: false
            description: Set to true when database parameter contains base64-encoded file content
        returns:
          columns:
            type: array
            description: 'Column definitions, each with: cid (column index), name, type (e.g., TEXT, INTEGER, BLOB), notnull
              (boolean), default (default value or null), pk (boolean, is primary key)'
          column_count:
            type: integer
            description: Number of columns in the table
          row_count:
            type: integer
            description: Number of rows in the table
      dump_table:
        description: Extract rows from a specific table with optional column selection. Runs 'SELECT [columns] FROM table
          LIMIT N' and returns results as dictionaries. Use the columns parameter to select only relevant columns (e.g., username
          and password) instead of dumping everything.
        when_to_use: After identifying interesting tables via list_tables or describe_table, use this to extract the actual
          data. Prefer this over query for simple full-table or column-filtered extractions since it handles quoting and limiting
          automatically. For credential tables, consider using find_credentials instead which auto-detects credential columns.
        params:
          database:
            type: string
            required: true
            description: Path to SQLite database file, or base64-encoded content (set is_base64=true)
          table:
            type: string
            required: true
            description: Table name to dump (exact name as shown by list_tables)
          columns:
            type: array
            description: Array of column names to select (e.g., ['username', 'password', 'email']). Omit to select all columns.
              Use describe_table first to see available columns.
          limit:
            type: integer
            default: 100
            description: Maximum rows to return. Default 100. Increase for full extraction of small tables, keep low for initial
              sampling of large tables.
          is_base64:
            type: boolean
            default: false
            description: Set to true when database parameter contains base64-encoded file content
        returns:
          columns:
            type: array
            description: Column names in the result set
          rows:
            type: array
            description: 'Table contents as array of dictionaries (column_name: value)'
          row_count:
            type: integer
            description: Number of rows returned (may be less than total if limited)
      find_credentials:
        description: Automatically search for credential-related data by pattern-matching table and column names. Scans table
          names against 14 patterns (user, users, account, accounts, member, members, admin, admins, login, logins, auth,
          credential, customer, employee) and column names against username patterns (username, user, login, email, name,
          account, user_name, user_id) and password patterns (password, passwd, pass, pwd, hash, secret, token, api_key, apikey,
          auth, credential). If no credential-pattern tables are found, falls back to searching ALL tables for credential-pattern
          columns. Returns extracted username/password pairs with source table.
        when_to_use: 'First thing to run on any database found during post-exploitation. Automatically identifies and extracts
          credentials without needing to know the schema. Works on: CMS databases (WordPress wp_users, Drupal users), custom
          web app databases, configuration stores, session databases. If this returns no results, fall back to list_tables
          → describe_table → dump_table for manual analysis.'
        params:
          database:
            type: string
            required: true
            description: Path to SQLite database file, or base64-encoded content (set is_base64=true)
          is_base64:
            type: boolean
            default: false
            description: Set to true when database parameter contains base64-encoded file content
          limit:
            type: integer
            default: 100
            description: Maximum rows to extract per matching table
        returns:
          credential_tables:
            type: array
            description: Table names that matched credential patterns (or all tables if no pattern matches found)
          credentials:
            type: array
            description: Extracted credential data, each with 'table' (source table name) and matched column values (e.g.,
              username, password, hash, email, token)
          count:
            type: integer
            description: Total number of credential rows extracted across all tables
      schema:
        description: Get complete database schema including all tables, their columns (name, type, constraints), row counts,
          and original CREATE TABLE SQL statements. Provides a comprehensive overview of the entire database structure in
          one call.
        when_to_use: When you want the full picture of a database in a single call rather than running list_tables followed
          by describe_table on each. Returns more detail than list_tables (includes column definitions and CREATE SQL) but
          can produce large output for databases with many tables. Prefer list_tables for initial quick look, use schema when
          you need the complete structure.
        params:
          database:
            type: string
            required: true
            description: Path to SQLite database file, or base64-encoded content (set is_base64=true)
          is_base64:
            type: boolean
            default: false
            description: Set to true when database parameter contains base64-encoded file content
        returns:
          tables:
            type: object
            description: 'Dictionary keyed by table name, each with: ''columns'' (array of {name, type, notnull, pk}), ''row_count''
              (integer), ''create_sql'' (original CREATE TABLE statement)'
          table_count:
            type: integer
            description: Total number of tables in the database
  sqlmap:
    name: sqlmap
    version: '2.0'
    description: 'Automatic SQL injection detection and exploitation tool (v1.10#stable). Supports 6 injection techniques:
      Boolean-based blind (B), Error-based (E), Union query-based (U), Stacked queries (S), Time-based blind (T), Inline queries
      (Q). Detects and exploits MySQL, PostgreSQL, Oracle, MSSQL, SQLite, DB2, MariaDB, and more. Beyond database enumeration,
      provides OS command execution (--os-cmd/--os-shell), file read/write on the target server, raw SQL query execution,
      and password hash dumping. Includes 60+ WAF bypass tamper scripts. Handles CSRF tokens, HTTP auth, custom HTTP methods,
      second-order injection. Streams progress notifications during long-running operations. Runs non-interactively with --batch
      flag.'
    image: ghcr.io/silicon-works/mcp-tools-sqlmap:latest
    image_size_mb: 150
    timeout_seconds: 7200
    capabilities:
    - sql_injection
    - database_enumeration
    - data_extraction
    - os_shell
    routing:
      use_for:
      - SQL injection detection and exploitation
      - test GET POST parameters for SQL injection vulnerabilities
      - enumerate databases tables columns via SQL injection
      - dump database contents through SQL injection
      - OS command execution via SQL injection
      - read files from target server via SQL injection
      - write files webshells to target via SQL injection
      - extract password hashes from database via SQL injection
      - boolean error union stacked time-based blind injection
      - WAF bypass with tamper scripts for SQL injection
      - execute custom SQL queries through injection
      - second-order injection testing
      - CSRF-protected forms with SQL injection
      - HTTP Basic Digest NTLM authenticated SQL injection
      never_use_for:
      - NoSQL injection (use nosqlmap)
      - MongoDB (use mongodb or nosqlmap)
      - directory enumeration (use ffuf)
      triggers:
      - sql injection
      - sqli
      - sqlmap
      - database dump
      - union injection
      - blind injection
      - sql query
      - second-order injection
      - csrf sql injection
      - http auth sql injection
      prefer_over: []
    phases:
    - exploitation
    requirements:
      network: true
      privileged: false
    resources:
      memory_mb: 512
      cpu: 0.5
    _common_params:
      data: &id001
        type: string
        description: 'POST request body data. Switches sqlmap to POST method. Format: ''param1=value1&param2=value2''. Use
          * to mark injection point in POST data: ''username=admin&password=*''.'
      cookie: &id002
        type: string
        description: HTTP Cookie header value (e.g., 'PHPSESSID=abc123; session=xyz'). Required for testing authenticated
          endpoints. At level >= 2, sqlmap also tests cookie values for injection.
      headers: &id003
        type: string
        description: 'Additional HTTP headers, semicolon-separated (e.g., ''Authorization: Bearer eyJ...;X-Custom: value'').'
      method: &id004
        type: enum
        values:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        description: Force HTTP method. By default sqlmap uses GET (or POST if --data is set). Use for REST APIs that require
          PUT/PATCH/DELETE.
      auth_type: &id005
        type: enum
        values:
        - Basic
        - Digest
        - NTLM
        - PKI
        description: HTTP authentication type. Use with auth_cred.
      auth_cred: &id006
        type: string
        description: 'HTTP authentication credentials. Format: ''user:password''. Use with auth_type.'
      csrf_token: &id007
        type: string
        description: Parameter name holding the anti-CSRF token (e.g., 'csrf_token', '_token'). Sqlmap auto-fetches a fresh
          token before each request.
      csrf_url: &id008
        type: string
        description: URL to fetch the anti-CSRF token from, if different from the target URL.
      dbms: &id009
        type: string
        description: Force DBMS type to skip detection (e.g., 'MySQL', 'PostgreSQL', 'Microsoft SQL Server'). Speeds up exploitation
          when DBMS is known.
      ignore_code: &id010
        type: string
        description: Ignore problematic HTTP status codes (e.g., '401' or '401,500'). Critical when the target endpoint returns
          non-200 status — without this, sqlmap may refuse to test. Use for endpoints behind authentication that return 401/403.
      string: &id011
        type: string
        description: 'String that is always present in TRUE responses (boolean-based detection). Dramatically speeds up blind
          injection when set correctly. Example: if successful queries show ''Welcome'', set string=''Welcome''.'
      not_string: &id012
        type: string
        description: String that is always present in FALSE responses. The inverse of --string.
      code: &id013
        type: integer
        description: HTTP status code that indicates TRUE response (e.g., 200). Alternative to --string for boolean-based
          detection.
      text_only: &id014
        type: boolean
        default: false
        description: Compare pages based only on textual content (strip HTML tags). Useful when pages have dynamic non-text
          content (ads, JS, etc.).
      titles: &id015
        type: boolean
        default: false
        description: Compare pages based only on their titles. Useful when page body is highly dynamic but title changes predictably.
      level: &id016
        type: integer
        default: 1
        description: 'Test level 1-5. Level 1: tests GET/POST params. Level 2: adds Cookie testing. Level 3: adds User-Agent/Referer
          testing. Level 4-5: adds more payloads. Higher = slower but more thorough. Start with 1, increase if no results.'
      risk: &id017
        type: integer
        default: 1
        description: 'Risk level 1-3. Risk 1: safe tests only. Risk 2: adds heavy time-based tests. Risk 3: adds OR-based
          tests (can modify/delete data — use with caution). For CTF/HTB use risk=2 freely, risk=3 on non-production targets
          only.'
      technique: &id018
        type: string
        default: BEUSTQ
        description: SQL injection techniques to test. B=Boolean-based blind, E=Error-based, U=Union query, S=Stacked queries
          (needed for os_shell/file_write), T=Time-based blind, Q=Inline queries. Default 'BEUSTQ' tests all. Use 'BEU' for
          faster testing if you don't need stacked queries. Use 'T' alone for time-based only when other methods fail.
      param: &id019
        type: string
        description: Specific parameter to test (e.g., 'id'). Without this, sqlmap tests all parameters.
      tamper: &id020
        type: string
        description: 'Tamper script(s) for WAF bypass. Comma-separated. Common: ''space2comment'' (spaces→/**/), ''between''
          (>→BETWEEN), ''charencode'' (URL-encode), ''randomcase'' (random keyword case). Use multiple for layered bypass.'
      prefix: &id021
        type: string
        description: Injection payload prefix (e.g., "')"). Use when you know the exact SQL context from manual testing.
      suffix: &id022
        type: string
        description: Injection payload suffix (e.g., '-- -'). Use when you know the exact SQL context.
      union_cols: &id023
        type: string
        description: Range of columns to test for UNION query injection (e.g., '5-10'). Narrows search when you know approximate
          column count from manual testing.
      second_url: &id024
        type: string
        description: URL where the injection result appears (second-order injection). The injection is sent to the target
          URL but the result is read from this URL.
      eval: &id025
        type: string
        description: Python code evaluated before each request (e.g., "import hashlib; token=hashlib.md5(id.encode()).hexdigest()").
          Use for computed parameters.
      time_sec: &id026
        type: integer
        default: 5
        description: Seconds to delay for time-based blind injection. Increase to 10-15 on high-latency targets to avoid false
          negatives.
      threads: &id027
        type: integer
        default: 4
        description: Number of concurrent HTTP requests (1-10). Default 4. Increase for faster extraction on stable targets.
          Reduce to 1 if target has rate limiting.
      delay: &id028
        type: number
        default: 0
        description: Delay in seconds between each HTTP request. Use 1-3 to avoid rate limiting or WAF bans.
      retries: &id029
        type: integer
        default: 3
        description: Retries on connection failure.
      safe_url: &id030
        type: string
        description: URL to visit between injection requests to keep session alive or avoid detection patterns.
      safe_freq: &id031
        type: integer
        description: How often to visit --safe-url (every N requests).
      null_connection: &id032
        type: boolean
        default: false
        description: Use HTTP Range/HEAD to detect boolean responses without downloading full pages. Faster but may not work
          on all targets.
      proxy: &id033
        type: string
        description: HTTP/SOCKS proxy (e.g., 'http://127.0.0.1:8080', 'socks5://127.0.0.1:1080'). Use for scanning through
          tunnels or Burp interception.
      random_agent: &id034
        type: boolean
        default: false
        description: Use random HTTP User-Agent to avoid WAF detection. Sqlmap's default UA is commonly blocked.
      flush_session: &id035
        type: boolean
        default: false
        description: Clear cached session data and re-test from scratch.
    methods:
      test_injection:
        description: Test URL parameters for SQL injection vulnerabilities using sqlmap's detection engine. Runs with --batch
          (non-interactive) and 4 threads by default. Tests all 6 injection techniques by default (BEUSTQ). Parses output
          for vulnerability confirmation, injectable parameters, injection types, and detected DBMS. Sqlmap caches results
          in session files — subsequent calls to the same URL skip already-tested parameters. Sends progress notifications
          for [INFO]/[WARNING]/[CRITICAL] lines.
        when_to_use: When you've identified a potentially injectable parameter in a web application — either from manual testing,
          web fuzzing (ffuf), or source code review. Mark the injection point with * in the URL (e.g., 'http://target/page?id=1*')
          or let sqlmap auto-detect GET parameters. For POST injection, use the data parameter. Start with level=1/risk=1
          (default), increase to level=3/risk=2 if no results, and level=5/risk=3 as last resort (risk=3 may use OR-based
          tests that can modify data). If the target uses a WAF, use tamper scripts. Use param to test a specific parameter
          and skip others. If the endpoint returns 401/500, use ignore_code to prevent sqlmap from refusing to test. Use string/code
          for faster boolean-based detection when you know the TRUE response signature.
        params:
          data: *id001
          cookie: *id002
          headers: *id003
          method: *id004
          auth_type: *id005
          auth_cred: *id006
          csrf_token: *id007
          csrf_url: *id008
          dbms: *id009
          ignore_code: *id010
          string: *id011
          not_string: *id012
          code: *id013
          text_only: *id014
          titles: *id015
          level: *id016
          risk: *id017
          technique: *id018
          param: *id019
          tamper: *id020
          prefix: *id021
          suffix: *id022
          union_cols: *id023
          second_url: *id024
          eval: *id025
          time_sec: *id026
          threads: *id027
          delay: *id028
          retries: *id029
          safe_url: *id030
          safe_freq: *id031
          null_connection: *id032
          proxy: *id033
          random_agent: *id034
          flush_session: *id035
          url:
            type: string
            required: true
            description: 'Target URL with parameters. Use * to mark specific injection point (e.g., ''http://target/page?id=1*'').
              Without *, sqlmap tests all GET parameters. For REST-style URLs: ''http://target/api/users/1*/profile''.'
          timeout:
            type: integer
            default: 1800
            description: Process timeout in seconds. Full level=1 testing typically takes 1-5 minutes. Level=3+ or slow targets
              may take 15-30 minutes. Default 1800s (30 min).
        returns:
          vulnerable:
            type: boolean
            description: Whether SQL injection was confirmed
          injection_type:
            type: string
            description: Type of injection found (e.g., 'boolean-based blind', 'UNION query', 'time-based blind')
          dbms:
            type: string
            description: Detected DBMS (e.g., 'MySQL >= 5.0', 'PostgreSQL', 'Microsoft SQL Server 2019')
          parameters:
            type: array
            description: List of injectable parameter names
          details:
            type: array
            description: Relevant detail lines from sqlmap output (injection info, payloads, techniques)
      enumerate_dbs:
        description: Enumerate all databases on a confirmed vulnerable target using sqlmap's --dbs flag. Sqlmap reuses the
          cached injection point and technique from prior test_injection calls (stored in session files), so no re-detection
          is needed. Parses the '[*] database_name' output lines. Sends progress notifications during extraction.
        when_to_use: 'Immediately after test_injection confirms SQL injection. This is the standard next step in the SQL injection
          exploitation workflow: test_injection → enumerate_dbs → dump_table. The URL must be the same one used in test_injection
          so sqlmap can reuse its cached session. System databases (information_schema, mysql, master, postgres, etc.) are
          normal — look for application databases.'
        params:
          data: *id001
          cookie: *id002
          headers: *id003
          method: *id004
          auth_type: *id005
          auth_cred: *id006
          csrf_token: *id007
          csrf_url: *id008
          dbms: *id009
          ignore_code: *id010
          string: *id011
          not_string: *id012
          code: *id013
          text_only: *id014
          titles: *id015
          level: *id016
          risk: *id017
          technique: *id018
          param: *id019
          tamper: *id020
          prefix: *id021
          suffix: *id022
          union_cols: *id023
          second_url: *id024
          eval: *id025
          time_sec: *id026
          threads: *id027
          delay: *id028
          retries: *id029
          safe_url: *id030
          safe_freq: *id031
          null_connection: *id032
          proxy: *id033
          random_agent: *id034
          flush_session: *id035
          url:
